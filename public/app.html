<!DOCTYPE html>
<html lang="fr" data-theme="light" data-view="12">
<head>
<meta charset="UTF-8">
<title>Planning CCI 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f6f7fb;
  --panel: #ffffff;
  --text: #111827;
  --text-soft: #4b5563;       /* V16 QW1 : 7.4:1 sur --bg, meets WCAG AAA */
  --text-muted: #71717a;      /* V16 QW1 : 4.65:1 sur --bg, meets WCAG AA (au lieu de 3.0:1) */
  --border: #e5e7eb;
  --border-soft: #f1f5f9;
  --today: #3b82f6;
  --shadow-xs: 0 1px 2px rgba(15,23,42,.05);
  --shadow-sm: 0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.04);
  --shadow: 0 4px 12px rgba(15,23,42,.06), 0 2px 4px rgba(15,23,42,.04);
  --shadow-lg: 0 10px 30px rgba(15,23,42,.08);
  --radius: 16px;

  --pill-h: 25px;
  --lane-h: 30px;
  --label-space: 20px;

  --mco-bg: #fff5f7;
  --mco-bg-alt: #ffeef1;
  --mco-strong: #be185d;
  --ceos-bg: #f0f7ff;
  --ceos-bg-alt: #e6f1ff;
  --ceos-strong: #1d4ed8;
  --cfpi-bg: #fff8f0;
  --cfpi-bg-alt: #fff0e0;
  --cfpi-strong: #c2410c;
  --nse-bg: #f1fbf4;
  --nse-bg-alt: #e3f6ea;
  --nse-strong: #15803d;
  --easy-bg: #f7f4ff;
  --easy-bg-alt: #eee8ff;
  --easy-strong: #6d28d9;
  --digi-bg: #eff2ff;
  --digi-bg-alt: #e3e7ff;
  --digi-strong: #4338ca;
  --o2c-bg: #f0faff;
  --o2c-bg-alt: #e0f3ff;
  --o2c-strong: #0369a1;
  --ia-bg: #f4f5f7;
  --ia-bg-alt: #eaecef;
  --ia-strong: #374151;
  --einv-bg: #f8f7f4;
  --einv-bg-alt: #ede9e3;
  --einv-strong: #44403c;

  --m-livraison: #0d9488;
  --m-pmep: #312e81;
  --m-cab: #65a30d;
  --m-cab-text: #fff;
  --m-mep: #1e3a8a;
  --m-custom: #7c3aed;
}
[data-theme="dark"] {
  --bg: #0b1220;
  --panel: #0f172a;
  --text: #e5e7eb;
  --text-soft: #94a3b8;
  --text-muted: #64748b;
  --border: #1e293b;
  --border-soft: #15202e;

  --mco-bg: #2a0e17;
  --mco-bg-alt: #360f1c;
  --mco-strong: #fbcfe8;
  --ceos-bg: #0c1f3a;
  --ceos-bg-alt: #0f2445;
  --ceos-strong: #bfdbfe;
  --cfpi-bg: #2a1608;
  --cfpi-bg-alt: #35190a;
  --cfpi-strong: #fed7aa;
  --nse-bg: #0a2516;
  --nse-bg-alt: #0d2c1b;
  --nse-strong: #bbf7d0;
  --easy-bg: #1c1336;
  --easy-bg-alt: #22173f;
  --easy-strong: #ddd6fe;
  --digi-bg: #111535;
  --digi-bg-alt: #141a40;
  --digi-strong: #c7d2fe;
  --o2c-bg: #062638;
  --o2c-bg-alt: #082c41;
  --o2c-strong: #bae6fd;
  --ia-bg: #151a23;
  --ia-bg-alt: #1a202a;
  --ia-strong: #e5e7eb;
  --einv-bg: #1a1612;
  --einv-bg-alt: #201c16;
  --einv-strong: #e7e5e4;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 12px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01", "ss03";
  letter-spacing: -0.005em;
}
.topbar h1, .domain-row .label, .header-months .month, .header-weeks .quarter {
  font-family: "Poppins", "Inter", system-ui, sans-serif;
}
.phase, .ms-chip {
  font-family: "Poppins", "Inter", system-ui, sans-serif;
  font-feature-settings: "ss01";
}

/* TOP BAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; gap: 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.topbar h1 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.topbar .subtitle { font-size: 11px; color: var(--text-soft); margin-left: 10px; font-weight: 500; }
.controls { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; }
/* V16 QW4 / QW7 : groupes visuels dans la topbar avec dividers verticaux explicites
   (border-right ne fonctionnait pas correctement avec flex-wrap) */
.controls .group {
  display: inline-flex; gap: 6px; align-items: center;
}
.controls .divider {
  width: 1px;
  background: var(--border);
  align-self: stretch;
  margin: 2px 0;
  flex: 0 0 auto;
}
[data-theme="dark"] .controls .divider { background: var(--border-soft); }
.view-switch {
  display: inline-flex; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 2px;
}
.view-switch button {
  border: none; background: transparent; color: var(--text-soft);
  padding: 6px 14px; font-size: 12px; font-weight: 500;
  border-radius: 8px; cursor: pointer; transition: all .15s;
}
.view-switch button.active { background: var(--panel); color: var(--text); box-shadow: var(--shadow-sm); }

/* V13.5: plage de dates personnalisée */
.custom-range {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 2px 8px;
  transition: border-color .15s, box-shadow .15s;
}
.custom-range.active { border-color: var(--today); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
.custom-range .cr-icon { font-size: 12px; }
.custom-range .cr-sep { font-size: 11px; color: var(--text-soft); }
.custom-range input[type="date"] {
  border: none; background: transparent; color: var(--text);
  font-size: 11px; font-family: inherit; padding: 4px 2px;
  outline: none; cursor: pointer;
}
.custom-range input[type="date"]:hover { color: var(--today); }
.btn {
  border: 1px solid var(--border); background: var(--panel); color: var(--text);
  padding: 6px 12px; font-size: 12px; font-weight: 500; border-radius: 10px;
  cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--bg); border-color: var(--text-muted); }
.btn.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
.btn.primary:hover { background: #1d4ed8; }
.btn.danger { color: #ef4444; }
/* V16 QW3 : focus-visible cohérent sur tous les contrôles interactifs (accessibilité clavier WCAG 2.4.7) */
.btn:focus-visible,
.view-switch button:focus-visible,
.drawer-tabs button:focus-visible,
.icon-btn:focus-visible,
.add-row:focus-visible,
.settings-subtabs button:focus-visible {
  outline: 2px solid var(--today);
  outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
}
.btn:focus, .view-switch button:focus, .drawer-tabs button:focus,
.icon-btn:focus, .add-row:focus, .settings-subtabs button:focus { outline: none; }
.custom-range:focus-within,
.search-input:focus {
  border-color: var(--today);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.18);
}

/* GANTT */
.viewport { padding: 24px; overflow-x: auto; }
.gantt {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 0 24px 0;
  position: relative;
  width: fit-content;
  min-width: 100%;
}
.gantt { --week-w: 23; --label-w: 210; }

.gantt { --total-w: calc(var(--label-w) * 1px + var(--weeks, 52) * var(--week-w) * 1px); width: var(--total-w); }

/* Header rows use grid for simple alignment */
.header-row {
  display: grid;
  grid-template-columns: calc(var(--label-w) * 1px) repeat(var(--weeks, 52), calc(var(--week-w) * 1px));
  align-items: center;
}
.header-months { min-height: 34px; }
.header-months .label { padding: 0 16px; font-weight: 700; font-size: 13px; }
.month-cell {
  text-align: center; font-weight: 700; font-size: 12px; color: var(--text);
  border-left: 1px solid var(--border); padding: 8px 2px;
  letter-spacing: 0.01em;
}
.month-cell.quarter { border-left: 2px solid var(--text-soft); }
.header-weeks {
  min-height: 36px;
  background: rgba(15,23,42,0.025);
  border-bottom: 1px solid var(--border);
}
[data-theme="dark"] .header-weeks { background: rgba(255,255,255,0.03); }
.header-weeks .label { padding: 0 16px; font-size: 10px; color: var(--text-soft); font-weight: 600; }
.week-cell {
  /* V13.9 : alignement à gauche pour que le label "Sxx jj/mm" soit pile au-dessus du bord gauche
     de la colonne, qui correspond visuellement à la date affichée. Cela élimine le décalage perçu
     entre les jalons (placés au bord gauche selon la date) et les en-têtes (qui étaient centrés). */
  text-align: left; font-size: 10px; color: var(--text-soft); font-weight: 600;
  border-left: 1px solid var(--border-soft); padding: 5px 0 5px 3px;
  white-space: nowrap; overflow: hidden;
  letter-spacing: 0.01em;
}
.week-cell.quarter-start { border-left: 2px solid var(--border); }
.week-cell.month-start { border-left: 1.5px solid var(--border); color: var(--text); }
[data-view="12"] .week-cell { font-size: 9px; }

/* Domain header */
.domain-row {
  display: grid;
  grid-template-columns: calc(var(--label-w) * 1px) 1fr;
  background: var(--domain-bg);
  border-top: 1px solid var(--border-soft);
  margin-top: 6px;
  min-height: 28px;
  align-items: center;
}
.domain-row { min-height: 24px; }
.domain-row .label {
  padding: 4px 16px; font-weight: 800; font-size: 13px;
  color: var(--domain-strong); letter-spacing: 0.1em; text-transform: uppercase;
}
body.print-fit .domain-row { min-height: 20px; }
body.print-fit .domain-row .label { padding: 2px 12px; font-size: 11.5px; letter-spacing: 0.08em; }
body.print-fit .header-months { min-height: 26px; }
body.print-fit .header-months .label { font-size: 11px; }
body.print-fit .header-months .month-cell { font-size: 10.5px; padding: 5px 2px; }
body.print-fit .header-weeks { min-height: 22px; }
body.print-fit .header-weeks .label { font-size: 9px; }
body.print-fit .header-weeks .week-cell { font-size: 8px; padding: 2px 1px; }
body.print-fit .project-row .label { padding: 4px 12px 4px 16px; font-size: 10px; }
body.print-fit .project-row .label .subtitle { font-size: 8.5px; }

/* Project row — absolute positioning */
.project-row {
  position: relative;
  background: var(--domain-bg);
  overflow: visible;
}
.project-row.alt { background: var(--domain-bg-alt); }

.project-row .label {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: calc(var(--label-w) * 1px);
  padding: 6px 16px 6px 22px;
  font-size: 11px; line-height: 1.3;
  display: flex; flex-direction: column; justify-content: center;
  z-index: 4;
  background: var(--proj-bg, inherit);
  border-right: 1px solid rgba(0,0,0,0.04);
  overflow: hidden;
}
[data-theme="dark"] .project-row .label { border-right-color: rgba(255,255,255,0.04); }
.project-row .label .name {
  font-weight: 600; color: var(--proj-text, var(--text)); display: block;
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
}
.project-row .label .subtitle {
  font-size: 9.5px; color: var(--text-soft); margin-top: 1px;
  line-height: 1.2; display: block;
  white-space: normal; overflow-wrap: anywhere; word-break: break-word;
}

.week-grid {
  position: absolute;
  top: 0; bottom: 0;
  left: calc(var(--label-w) * 1px);
  right: 0;
  pointer-events: none;
  z-index: 0;
}
.week-grid .gridline {
  position: absolute;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--border-soft);
}
.week-grid .gridline.month-start { background: var(--border); }
.week-grid .month-stripe {
  position: absolute;
  top: 0; bottom: 0;
  background: rgba(0,0,0,0.018);
  pointer-events: none;
}
/* V14 Lot 2 : zones fériés / périodes fermées (visualisation) */
.week-grid .closed-zone {
  position: absolute;
  top: 0; bottom: 0;
  background: repeating-linear-gradient(45deg, rgba(100,116,139,0.10), rgba(100,116,139,0.10) 4px, rgba(100,116,139,0.18) 4px, rgba(100,116,139,0.18) 8px);
  pointer-events: none;
  z-index: 1;
}
.week-grid .holiday-zone {
  position: absolute;
  top: 0; bottom: 0;
  background: rgba(239,68,68,0.06);
  pointer-events: none;
  z-index: 1;
}
[data-theme="dark"] .week-grid .closed-zone { background: repeating-linear-gradient(45deg, rgba(148,163,184,0.10), rgba(148,163,184,0.10) 4px, rgba(148,163,184,0.18) 4px, rgba(148,163,184,0.18) 8px); }
[data-theme="dark"] .week-grid .holiday-zone { background: rgba(239,68,68,0.10); }
[data-theme="dark"] .week-grid .month-stripe { background: rgba(255,255,255,0.025); }

/* Phase pills */
.phase {
  position: absolute;
  height: var(--pill-h);
  border-radius: calc(var(--pill-h) / 2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 600;
  padding: 0 12px;
  cursor: pointer;
  z-index: 2;
  overflow: hidden;
  white-space: nowrap; text-overflow: ellipsis;
  transition: transform .15s, box-shadow .15s, filter .15s;
  box-shadow: var(--shadow-xs);
  letter-spacing: 0.01em;
}
.phase:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow);
  filter: brightness(1.06);
  z-index: 5;
}

/* V14 Lot 4a (#6) : ligne secondaire repliable dans l'éditeur de phases */
.phase-secondary { display: none; background: rgba(15,23,42,0.025); }
[data-theme="dark"] .phase-secondary { background: rgba(255,255,255,0.025); }
.project-edit.show-advanced .phase-secondary { display: table-row; }
.phase-secondary > td {
  padding: 4px 4px !important;
  font-size: 10px;
}
.phase-secondary .secondary-fields {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 6px;
  align-items: center;
}
.phase-secondary .secondary-fields label {
  font-size: 9.5px; color: var(--text-soft); font-weight: 600;
  display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.04em;
}
.phase-secondary .secondary-fields input,
.phase-secondary .secondary-fields select { font-size: 10.5px; padding: 3px 5px; }

.advanced-toggle {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; font-size: 10px; font-weight: 600;
  background: var(--panel); border: 1px solid var(--border); color: var(--text-soft);
  border-radius: 6px; cursor: pointer; user-select: none;
  margin-left: auto;
}
.advanced-toggle:hover { color: var(--today); border-color: var(--today); }
.project-edit.show-advanced .advanced-toggle { color: var(--today); border-color: var(--today); background: rgba(59,130,246,0.05); }

/* V17 : onglet Ressources — charge par responsable */
.resources-tab { font-size: 11.5px; }
.resources-tab .res-charts {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel);
  overflow: hidden;
}
.resources-tab .res-row {
  display: grid;
  grid-template-columns: 200px 1fr 50px;
  gap: 6px;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border-soft);
  align-items: center;
  transition: background .12s;
}
.resources-tab .res-row:last-child { border-bottom: 0; }
.resources-tab .res-row:not(.res-header):hover { background: var(--bg); cursor: pointer; }
.resources-tab .res-row.res-header {
  background: var(--bg);
  font-size: 9.5px;
  font-weight: 700;
  color: var(--text-soft);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  position: sticky; top: -16px; z-index: 2;
}
.resources-tab .res-name {
  display: flex; align-items: center; gap: 6px;
  font-weight: 600; color: var(--text); font-size: 11px;
}
.resources-tab .res-name .res-initials {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px;
  background: var(--today); color: #fff;
  border-radius: 50%; font-size: 10px; font-weight: 700;
  font-family: "Poppins", sans-serif;
  flex: 0 0 26px;
}
.resources-tab .res-name .res-fullname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.resources-tab .res-name .res-active-badge {
  background: #15803d; color: #fff;
  padding: 1px 6px; border-radius: 8px;
  font-size: 9px; font-weight: 700;
}
.resources-tab .res-months {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 2px;
  align-items: end;
  min-height: 32px;
}
.resources-tab .res-month-cell {
  display: flex; align-items: end; justify-content: center;
  min-height: 32px;
  font-size: 9px; color: var(--text-soft);
}
.resources-tab .res-row.res-header .res-month-cell {
  align-items: center; font-weight: 700;
}
.resources-tab .res-bar {
  width: 100%;
  background: var(--today);
  color: #fff;
  font-size: 9px; font-weight: 700;
  text-align: center;
  border-radius: 3px 3px 0 0;
  line-height: 1;
  padding: 2px 0;
  min-height: 14px;
  display: flex; align-items: center; justify-content: center;
}
.resources-tab .res-bar.overload { background: #f59e0b; }
.resources-tab .res-total {
  text-align: right;
  font-weight: 700;
  font-size: 11px;
  color: var(--text);
}

/* V14 (Lot 3) : Tableau de bord — KPI tiles, listes, barres de progression par domaine */
.synthesis-tab { font-size: 11.5px; }
.synthesis-tab .kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
  margin-bottom: 18px;
}
.synthesis-tab .kpi {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  text-align: center;
}
.synthesis-tab .kpi .k-val { font-size: 22px; font-weight: 800; line-height: 1.2; color: var(--text); font-family: "Poppins", sans-serif; }
.synthesis-tab .kpi .k-lab { font-size: 10px; color: var(--text-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.synthesis-tab .kpi.alert .k-val { color: #ef4444; }
.synthesis-tab .kpi.warn .k-val { color: #f59e0b; }
.synthesis-tab .kpi.ok .k-val { color: #15803d; }
.synthesis-tab .kpi.info .k-val { color: #2563eb; }

/* V14 Lot 4b (#2) : KPI cliquables avec scroll-to-section + surbrillance temporaire */
.synthesis-tab .kpi[data-action="kpi-goto"] { cursor: pointer; transition: transform .12s, box-shadow .12s; }
.synthesis-tab .kpi[data-action="kpi-goto"]:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.synthesis-tab .section-h.kpi-target-flash { animation: kpi-flash 1.6s ease-out; }
@keyframes kpi-flash {
  0% { background: rgba(59,130,246,0.25); border-radius: 6px; padding: 4px 8px; }
  100% { background: transparent; padding: 0; }
}
.synthesis-tab .section-h {
  font-size: 11px; font-weight: 700; color: var(--text); margin: 16px 0 6px 0;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.synthesis-tab .section-h .badge { font-size: 9px; padding: 2px 8px; background: var(--bg); border-radius: 8px; color: var(--text-soft); font-weight: 600; }

.synthesis-tab .domain-prog { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border-soft); }
.synthesis-tab .domain-prog .d-name { width: 130px; font-weight: 600; font-size: 10.5px; }
.synthesis-tab .domain-prog .d-bar { flex: 1; height: 12px; background: var(--bg); border-radius: 6px; overflow: hidden; position: relative; border: 1px solid var(--border-soft); }
.synthesis-tab .domain-prog .d-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--d-color, #3b82f6); border-radius: 6px; transition: width .3s; }
.synthesis-tab .domain-prog .d-pct { width: 50px; text-align: right; font-size: 10px; font-weight: 700; }

.synthesis-tab .item-list { list-style: none; padding: 0; margin: 0; }
.synthesis-tab .item-list li {
  padding: 6px 8px;
  display: flex; gap: 10px; align-items: center;
  border-bottom: 1px solid var(--border-soft);
  font-size: 11px;
}
.synthesis-tab .item-list li:hover { background: var(--bg); cursor: pointer; }
.synthesis-tab .item-list li .it-date { width: 80px; font-family: ui-monospace, monospace; font-size: 10px; color: var(--text-soft); }
.synthesis-tab .item-list li .it-tag { padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; color: #fff; flex: 0 0 auto; }
.synthesis-tab .item-list li .it-name { flex: 1; font-weight: 600; }
.synthesis-tab .item-list li .it-sub { color: var(--text-soft); font-size: 10px; }
.synthesis-tab .item-list .empty { padding: 12px; color: var(--text-soft); text-align: center; font-style: italic; font-size: 10.5px; }

/* V14 (Lot 1) : statut + avancement par phase */
.phase[data-status="planned"] { opacity: 0.55; }
.phase[data-status="done"] { filter: saturate(0.6); border: 1.5px solid #15803d; }
.phase[data-status="risk"] { box-shadow: 0 0 0 2px #f59e0b, var(--shadow-xs); }
.phase[data-status="late"] { box-shadow: 0 0 0 2px #ef4444, var(--shadow-xs); animation: late-pulse 2s ease-in-out 3; }
@keyframes late-pulse { 0%,100% { box-shadow: 0 0 0 2px #ef4444, var(--shadow-xs); } 50% { box-shadow: 0 0 0 3px #ef4444, var(--shadow); } }
/* V16 QW2 : respect du préférence système "reduce motion" (WCAG 2.3.3, vestibulaire) */
@media (prefers-reduced-motion: reduce) {
  .phase[data-status="late"] { animation: none; }
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

.phase-progress {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: rgba(255,255,255,0.32);
  border-top-left-radius: inherit;
  border-bottom-left-radius: inherit;
  pointer-events: none;
}
.phase-status-icon {
  position: absolute;
  right: 4px; top: 50%; transform: translateY(-50%);
  font-size: 9px;
  pointer-events: none;
  text-shadow: 0 0 2px rgba(0,0,0,0.3);
}
/* V18 : icône note sur les pilules (en haut à droite) */
.phase-note-icon {
  position: absolute;
  top: -6px; right: -2px;
  font-size: 11px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
  pointer-events: none;
  z-index: 3;
}
/* V18 : note sur jalons (badge à côté de la chip) */
.ms-chip.has-note::after {
  content: '📝';
  position: absolute;
  right: -14px; top: -6px;
  font-size: 10px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
}

/* V14 (Lot 1) : icône par projet */
.project-row .label .name .proj-icon {
  margin-right: 5px;
  font-size: 1em;
  display: inline-block;
}

/* V14 (Lot 1) : recherche dans le bandeau */
.search-input {
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  padding: 5px 10px 5px 26px; font-size: 12px; border-radius: 10px;
  width: 180px; font-family: inherit; outline: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
  background-repeat: no-repeat; background-position: 7px center;
}
.search-input:focus { border-color: var(--today); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
.search-info {
  font-size: 10px; color: var(--text-soft);
  padding: 2px 8px; background: var(--bg); border-radius: 6px;
}

/* V14.2 (Lot 1) : mode présentation — barre escamotée hors flux + révélée au hover JS */
body.presentation-mode .topbar {
  position: fixed; top: 0; left: 0; right: 0;
  transform: translateY(-100%);
  transition: transform .25s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  z-index: 30;
}
body.presentation-mode .topbar.revealed { transform: translateY(0); }
body.presentation-mode .viewport { padding: 8px 16px; }
body.presentation-mode .gantt { box-shadow: none; border: 1px solid var(--border-soft); }
.topbar-hover-zone { display: none; }

/* V13.7 : libellé déporté à l'extérieur de la pilule (phases trop courtes pour contenir le texte) */
.phase-outside-label {
  position: absolute;
  white-space: nowrap;
  font-weight: 600;
  font-size: 9px;
  color: var(--text);
  background: rgba(255,255,255,0.92);
  padding: 1px 5px;
  border-radius: 4px;
  z-index: 4;
  pointer-events: none;
  transform: translateX(-50%);
  letter-spacing: 0.01em;
  box-shadow: 0 0 0 1px rgba(15,23,42,.06);
  font-family: "Poppins", "Inter", system-ui, sans-serif;
}
[data-theme="dark"] .phase-outside-label { background: rgba(15,23,42,0.92); color: var(--text); }
.phase-outside-label::before {
  content: '';
  position: absolute;
  left: 50%; top: -2px;
  width: 1px; height: 2px;
  background: var(--text-muted);
  transform: translateX(-50%);
}
.phase-outside-label.above::before { top: auto; bottom: -2px; }

/* Milestone — V5: drop pin (chip hors pilule + trait fin touchant le bord de la pilule) */
.ms-chip {
  position: absolute;
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  cursor: pointer;
  line-height: 1.3;
  letter-spacing: 0.01em;
  box-shadow: var(--shadow-xs);
  pointer-events: auto;
  transform: translateX(-50%);
  transition: filter .15s;
  z-index: 6;
}
.ms-chip:hover { filter: brightness(1.1); }
.ms-pin {
  position: absolute;
  width: 1.5px;
  border-radius: 1px;
  z-index: 6;
  pointer-events: none;
  opacity: 0.9;
}
.ms-diamond {
  position: absolute;
  width: 8px; height: 8px;
  transform: rotate(45deg);
  border: 1.25px solid var(--panel);
  pointer-events: auto;
  cursor: pointer;
  z-index: 7;
  box-sizing: content-box;
}
.gantt.compact .ms-chip { font-size: 8.5px; padding: 1.5px 5px; }
.gantt.compact .ms-diamond { width: 7px; height: 7px; }

.ms-chip.ms-livraison, .ms-pin.ms-livraison, .ms-diamond.ms-livraison { background: var(--m-livraison); }
.ms-chip.ms-pmep, .ms-pin.ms-pmep, .ms-diamond.ms-pmep { background: var(--m-pmep); }
.ms-chip.ms-cab { background: var(--m-cab); color: var(--m-cab-text); }
.ms-pin.ms-cab, .ms-diamond.ms-cab { background: var(--m-cab); }
.ms-chip.ms-mep, .ms-pin.ms-mep, .ms-diamond.ms-mep { background: var(--m-mep); }
.ms-chip.ms-custom, .ms-pin.ms-custom, .ms-diamond.ms-custom { background: var(--m-custom); }

/* Today line */
.today-line {
  position: absolute;
  top: 58px;
  bottom: 10px;
  width: 2px;
  background: var(--today);
  z-index: 7;
  pointer-events: none;
  opacity: 0.65;
}
.today-line::before {
  content: "Aujourd'hui";
  position: absolute;
  top: -20px;
  left: -30px;
  background: var(--today);
  color: #fff; font-size: 9px;
  padding: 2px 6px; border-radius: 4px; font-weight: 600;
  box-shadow: var(--shadow-sm);
}

/* DRAWER */
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 780px;
  background: var(--panel); border-left: 1px solid var(--border);
  box-shadow: var(--shadow-lg);
  transform: translateX(100%); transition: transform .25s ease;
  z-index: 20; display: flex; flex-direction: column; overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.drawer-head h2 { margin: 0; font-size: 14px; }
/* V14 Lot 4f : onglets sans wrap, taille basée sur contenu, scroll horizontal de secours */
.drawer-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.drawer-tabs button {
  flex: 1 1 auto;
  white-space: nowrap;
  border: none; background: transparent;
  padding: 10px 12px; font-size: 12px; font-weight: 500;
  color: var(--text-soft); cursor: pointer; border-bottom: 2px solid transparent;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.drawer-tabs button.active { color: var(--text); border-bottom-color: var(--today); }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.drawer-body table { width: 100%; border-collapse: collapse; font-size: 11px; }
.drawer-body th {
  text-align: left; padding: 6px 4px; font-weight: 600;
  color: var(--text-soft); border-bottom: 1px solid var(--border);
  position: sticky; top: -16px; background: var(--panel); z-index: 2;
}
.drawer-body td { padding: 4px 4px; border-bottom: 1px solid var(--border-soft); vertical-align: middle; }
.drawer-body input, .drawer-body select {
  width: 100%; border: 1px solid var(--border); background: var(--panel); color: var(--text);
  padding: 4px 6px; font-size: 11px; border-radius: 6px; font-family: inherit;
}
.drawer-body input:focus, .drawer-body select:focus { outline: 2px solid var(--today); outline-offset: -1px; }
.drawer-foot {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; gap: 8px; align-items: center;
}
.add-row {
  margin-top: 10px; width: 100%; padding: 8px;
  border: 1px dashed var(--border); background: transparent; color: var(--text-soft);
  border-radius: 8px; font-size: 11px; cursor: pointer;
}
.add-row:hover { border-color: var(--today); color: var(--today); }
.icon-btn { background: transparent; border: none; color: var(--text-soft); cursor: pointer; padding: 2px 6px; font-size: 14px; }
.icon-btn:hover { color: #ef4444; }
/* V18 : bouton note (sur jalon). État "vide" = ✎ discret ; état "renseigné" = 📝 + halo coloré */
.icon-btn.note-btn { font-size: 13px; opacity: 0.45; transition: opacity .12s, background .12s; border-radius: 4px; }
.icon-btn.note-btn:hover { opacity: 1; background: rgba(59,130,246,0.10); color: var(--today); }
.icon-btn.note-btn.has-note { opacity: 1; color: var(--today); background: rgba(59,130,246,0.10); }
.icon-btn.note-btn.has-note:hover { background: rgba(59,130,246,0.20); }
/* V14 Lot 4f : boutons d'actions Mes plannings — SVG 16x16 alignés et harmonisés */
.icon-btn.pl-action-icon {
  width: 30px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: background .12s, color .12s;
  vertical-align: middle;
  margin-left: 2px;
}
.icon-btn.pl-action-icon:hover { background: rgba(15,23,42,0.06); color: var(--text); }
.icon-btn.pl-action-icon[data-action="pl-delete"]:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
.icon-btn.pl-action-icon[disabled] { opacity: 0.4; cursor: not-allowed; }
.icon-btn.pl-action-icon[disabled]:hover { background: transparent; color: var(--text-soft); }
.project-edit { border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 12px; background: var(--bg); }
.project-edit-head { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
.project-edit-head input { flex: 1; }
.project-edit-head select { width: 110px; }
.project-section-title { font-size: 10px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.05em; margin: 12px 0 4px 0; }
.toggle-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 8px 14px; margin: 8px 0;
  font-size: 11px; color: var(--text-soft);
  align-items: center;
}
.toggle-row .field { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.toggle-row .field > label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.toggle-row .field > .pair { display: flex; gap: 4px; align-items: center; }
.toggle-row .field > .pair > select { flex: 1 1 60%; min-width: 0; }
.toggle-row .field > .pair > input[type="number"] { flex: 0 0 56px; width: 56px; }
.toggle-row .field > .pair > input[type="color"] { flex: 0 0 32px; width: 32px; height: 26px; padding: 1px 2px; cursor: pointer; }

/* Palette de couleurs rapide */
.color-control { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.color-control input[type="color"] { width: 32px; height: 26px; padding: 1px 2px; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; background: var(--panel); }
.color-control input[type="text"] { width: 80px !important; font-family: ui-monospace, monospace; font-size: 10px !important; }
.color-control button.swatch {
  width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border);
  cursor: pointer; padding: 0; background-clip: content-box;
}
.color-control button.swatch.clear { background: transparent !important; position: relative; }
.color-control button.swatch.clear::after { content: "✕"; position: absolute; inset: 0; font-size: 10px; line-height: 14px; color: var(--text-soft); }

/* Filtre & Templates tabs */
.filter-tab { font-size: 11px; }
.filter-tab .filter-actions { display: flex; gap: 6px; margin-bottom: 12px; }
.filter-tab .domain-block { margin-bottom: 12px; padding: 8px; background: var(--bg); border-radius: 8px; }
.filter-tab .domain-block > h4 { margin: 0 0 6px 0; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); display: flex; align-items: center; justify-content: space-between; }
.filter-tab .filter-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.filter-tab .filter-row input[type="checkbox"] { width: auto; }
.filter-tab .filter-row label { flex: 1; font-size: 11px; cursor: pointer; }
.filter-tab .filter-row .ms-count { font-size: 10px; color: var(--text-soft); }
/* V14 Lot 4d : sous-onglets dans l'onglet Paramètres */
.settings-subtabs {
  display: flex; gap: 4px; flex-wrap: wrap;
  padding: 6px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 14px;
}
.settings-subtabs button {
  border: 1px solid transparent; background: transparent; color: var(--text-soft);
  padding: 6px 12px; font-size: 11px; font-weight: 500;
  border-radius: 8px; cursor: pointer; font-family: inherit;
}
.settings-subtabs button:hover { background: var(--panel); color: var(--text); }
.settings-subtabs button.active {
  background: var(--panel); color: var(--text);
  border-color: var(--border); box-shadow: var(--shadow-xs);
}

.template-tab .tpl-card { border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; background: var(--bg); }
.template-tab .tpl-card h4 { margin: 0 0 4px 0; font-size: 12px; }
.template-tab .tpl-card p { margin: 0 0 8px 0; font-size: 10.5px; color: var(--text-soft); }
.template-tab .tpl-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* V13: onglet Aide — mockups visuels */
.help-tab { font-size: 11.5px; line-height: 1.5; }
.help-tab nav { position: sticky; top: -16px; background: var(--panel); padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 14px; z-index: 3; display: flex; flex-wrap: wrap; gap: 4px; }
.help-tab nav a { font-size: 10.5px; padding: 4px 8px; background: var(--bg); border-radius: 6px; text-decoration: none; color: var(--text); border: 1px solid var(--border); }
.help-tab nav a:hover { background: var(--today); color: #fff; border-color: var(--today); }
.help-tab section { margin-bottom: 26px; padding-top: 8px; }
.help-tab section h3 { font-size: 13px; font-weight: 700; margin: 0 0 8px 0; color: var(--text); padding-bottom: 4px; border-bottom: 2px solid var(--today); display: inline-block; }
.help-tab section p { margin: 8px 0; }
.help-tab section ol, .help-tab section ul { margin: 8px 0; padding-left: 20px; }
.help-tab section li { margin: 4px 0; }
.help-tab .tip { background: linear-gradient(180deg, #fef3c7, #fde68a); color: #78350f; padding: 8px 10px; border-radius: 8px; border-left: 3px solid #f59e0b; margin: 10px 0; font-size: 10.5px; }
[data-theme="dark"] .help-tab .tip { background: #2d2208; color: #fde68a; }
.help-tab .warn { background: #fee2e2; color: #7f1d1d; padding: 8px 10px; border-radius: 8px; border-left: 3px solid #ef4444; margin: 10px 0; font-size: 10.5px; }
[data-theme="dark"] .help-tab .warn { background: #2d0d0d; color: #fecaca; }
.help-tab .info { background: #dbeafe; color: #1e3a8a; padding: 8px 10px; border-radius: 8px; border-left: 3px solid #3b82f6; margin: 10px 0; font-size: 10.5px; }
[data-theme="dark"] .help-tab .info { background: #0c1f3a; color: #bfdbfe; }
.help-tab .mock { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 10px 0; box-shadow: var(--shadow-xs); }
.help-tab .mock-title { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
.help-tab .mock-bar { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.help-tab .fake-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; font-size: 11px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel); color: var(--text); white-space: nowrap; }
.help-tab .fake-btn.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
.help-tab .fake-btn.danger { color: #ef4444; }
.help-tab .fake-tab { display: inline-block; padding: 6px 10px; font-size: 11px; color: var(--text-soft); border-bottom: 2px solid transparent; }
.help-tab .fake-tab.active { color: var(--text); border-bottom-color: var(--today); }
.help-tab .fake-pill { display: inline-block; padding: 3px 10px; font-size: 10px; font-weight: 600; border-radius: 12px; color: #fff; }
.help-tab .step-num { display: inline-block; width: 18px; height: 18px; background: var(--today); color: #fff; border-radius: 50%; text-align: center; font-size: 11px; font-weight: 700; line-height: 18px; margin-right: 6px; }
.help-tab .keys { display: inline-flex; gap: 3px; }
.help-tab .keys kbd { background: var(--panel); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 4px; padding: 1px 6px; font-family: ui-monospace, monospace; font-size: 10px; }
.help-tab .arrow { color: var(--today); font-weight: 700; }
.help-tab table.compact { width: 100%; font-size: 10.5px; margin: 8px 0; border-collapse: collapse; }
.help-tab table.compact th { text-align: left; padding: 4px 8px; background: var(--bg); border-bottom: 1px solid var(--border); }
.help-tab table.compact td { padding: 4px 8px; border-bottom: 1px solid var(--border-soft); vertical-align: top; }
.help-tab .gantt-mini { display: flex; align-items: center; gap: 4px; padding: 6px; background: #fff5f7; border-radius: 6px; margin: 6px 0; }
.help-tab .gantt-mini .label { width: 90px; font-size: 10px; font-weight: 600; }
.help-tab .gantt-mini .row { flex: 1; height: 18px; background: #ffeef1; border-radius: 4px; position: relative; }
.help-tab .gantt-mini .pill { position: absolute; height: 14px; top: 2px; border-radius: 7px; font-size: 9px; line-height: 14px; padding: 0 6px; color: #fff; font-weight: 600; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 15; }
.overlay.show { opacity: 1; pointer-events: auto; }
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #111827; color: #fff; padding: 10px 16px; border-radius: 10px;
  font-size: 12px; z-index: 100; opacity: 0; transition: opacity .25s;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; }

/* Print — V7: ajustement auto pour tenir sur une seule page */
@media print {
  @page { size: A3 landscape; margin: 0; }
  .topbar, .drawer, .overlay, #toast { display: none !important; }
  .today-line::before { display: none !important; }
  .viewport { padding: 0; overflow: visible; }
  .gantt { box-shadow: none; border: none; padding: 0; }
  body.print-fit .gantt { padding: 0; margin: 0; }
  html, body { background: #fff !important; }
  .phase, .ms-chip, .ms-pin, .ms-diamond, .month-stripe {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  .phase, .ms-chip { box-shadow: none !important; }
  /* V13.6 — approche hybride : ajuster aspect ratio du canevas (A3 paysage) + zoom CSS final.
     Le zoom CSS est respecté par le moteur d'impression Chrome (contrairement à transform:scale)
     et garantit que le contenu remplit exactement la page A3, sans débordement ni bande blanche. */
  body.print-fit, body.print-fit html { margin: 0 !important; padding: 0 !important; }
  body.print-fit .viewport {
    overflow: visible !important; padding: 0 !important; margin: 0 !important;
  }
  body.print-fit .gantt {
    min-width: 0 !important;
    zoom: var(--print-scale, 1);
    page-break-inside: avoid;
    break-inside: avoid;
  }
}

/* V19 C : Styles pour la gestion des responsables */
.responsable-multi-select {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.chips-container {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--border-soft);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}

.chip-remove {
  background: none;
  border: none;
  color: var(--text-soft);
  cursor: pointer;
  padding: 0;
  font-weight: 700;
  width: 16px;
  height: 16px;

/* V13: système multi-plannings.
   Storage scheme :
   - cci-pl-ns       : namespace (par défaut 'default', changé pour les exports HTML autonomes)
   - <ns>:cci-pl-index   : array de {id, name, updatedAt}
   - <ns>:cci-pl-active  : id du planning actif
   - <ns>:cci-pl-data-<id> : données du planning d'id <id>
   - cci-planning-2026-v3 : ancienne clé (migrée à la première ouverture).        */
const STORAGE_KEY = 'cci-planning-2026-v3'; // legacy, conservée pour la migration
const PL_NS = (window.PLANNING_NAMESPACE || 'default'); // surchargé par les exports HTML autonomes
const PL_INDEX_KEY = PL_NS + ':cci-pl-index';
const PL_ACTIVE_KEY = PL_NS + ':cci-pl-active';
const PL_DATA_PREFIX = PL_NS + ':cci-pl-data-';

// ===== PHASE 1: STORAGE CONFIG & INDEXEDDB INITIALIZATION =====
const STORAGE_CONFIG = {
  dbName: 'CCI_Planning_DB',
  storeName: 'plannings',
  syncInterval: 10000, // 10 seconds (configurable 5000-30000)
  syncTimeout: 5000,   // 5 seconds max per sync attempt
  enableAutoSync: true,
  enableLocalStorage: true, // Fallback
  localStorageRetention: 24 * 3600 * 1000, // 24 hours
  maxRetries: 3,
  retryDelay: 2000
};

let idbInstance = null; // Global reference to IndexedDB instance

// Initialize IndexedDB on startup
async function initIndexedDB() {
  return new Promise((resolve, reject) => {
    // Always open without version to get current database version
    const request = indexedDB.open(STORAGE_CONFIG.dbName);

    request.onerror = () => {
      console.warn('IndexedDB unavailable, falling back to localStorage', request.error);
      resolve(null);
    };

    request.onupgradeneeded = (e) => {
      // This fires if we need to upgrade the schema
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORAGE_CONFIG.storeName)) {
        db.createObjectStore(STORAGE_CONFIG.storeName, { keyPath: 'id' });
        console.log('[Persistence] Created IndexedDB object store:', STORAGE_CONFIG.storeName);
      }
    };

    request.onsuccess = () => {
      const db = request.result;
      idbInstance = db;
      console.log('[Persistence] IndexedDB opened successfully, version:', db.version);
      resolve(db);
    };
  });
}

let state;
let currentPlanningId = null;
let currentView = 12;            // 12 | 6 | 3 | 'custom'
let viewOffset = 0;
let customStartDate = null;      // 'YYYY-MM-DD' quand currentView === 'custom'
let customEndDate = null;

function getPlanningsIndex() {
  try { return JSON.parse(localStorage.getItem(PL_INDEX_KEY)) || []; } catch(e) { return []; }
}
function setPlanningsIndex(idx) { localStorage.setItem(PL_INDEX_KEY, JSON.stringify(idx)); }
function readPlanning(id) {
  try { return JSON.parse(localStorage.getItem(PL_DATA_PREFIX + id)); } catch(e) { return null; }
}
function writePlanning(id, data) {

}
function deletePlanningStorage(id) {
  localStorage.removeItem(PL_DATA_PREFIX + id);
  setPlanningsIndex(getPlanningsIndex().filter(p => p.id !== id));
}
function newPlanningId() { return 'pl_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ===== PHASE 2: STORAGE ABSTRACTION LAYER =====

// Write to IndexedDB (primary), fallback to localStorage
async function savePlanningToStorage(planningData) {
  // Ensure id is set for sync mechanism
  if (!planningData.id && currentPlanningId) {
    planningData.id = currentPlanningId;
  }

  const dataWithSync = {
    ...planningData,
    __sync: {
      ...planningData.__sync,
      lastModified: Date.now(),
      version: (planningData.__sync?.version || 0) + 1,
      syncStatus: 'pending'
    }
  };

  // Try IndexedDB first
  if (idbInstance) {
    return new Promise((resolve) => {
      const tx = idbInstance.transaction(STORAGE_CONFIG.storeName, 'readwrite');
      const store = tx.objectStore(STORAGE_CONFIG.storeName);
      store.put(dataWithSync);
      tx.oncomplete = () => {
        // Also save to localStorage as backup
        if (STORAGE_CONFIG.enableLocalStorage) {
          saveToLocalStorageFallback(dataWithSync);
        }
        resolve(true);
      };
      tx.onerror = () => {
        console.warn('IndexedDB write failed, using localStorage fallback');
        saveToLocalStorageFallback(dataWithSync);
        resolve(false);
      };
    });
  } else {
    // IndexedDB not available, use localStorage
    saveToLocalStorageFallback(dataWithSync);
    return true;
  }
}

// Write last snapshot to localStorage (for emergency fallback)
function saveToLocalStorageFallback(planningData) {
  try {
    const key = `${PL_NS}:planning-${planningData.id}`;
    localStorage.setItem(key, JSON.stringify(planningData));
    // Clean old entries (> 24h)
    cleanOldLocalStorageEntries();
  } catch (e) {
    console.warn('localStorage write failed (quota exceeded?)', e);
  }
}

// Read from IndexedDB or localStorage
async function loadPlanningFromStorage(planningId) {
  // Try IndexedDB first
  if (idbInstance) {
    return new Promise((resolve) => {
      const tx = idbInstance.transaction(STORAGE_CONFIG.storeName, 'readonly');
      const store = tx.objectStore(STORAGE_CONFIG.storeName);
      const request = store.get(planningId);

      request.onsuccess = () => {
        const data = request.result;
        if (data) {
          resolve(data);
        } else {
          // Not in IndexedDB, try localStorage
          loadFromLocalStorageFallback(planningId).then(resolve);
        }
      };

      request.onerror = () => {
        console.warn('IndexedDB read failed, trying localStorage');
        loadFromLocalStorageFallback(planningId).then(resolve);
      };
    });
  } else {
    // IndexedDB unavailable, use localStorage
    return loadFromLocalStorageFallback(planningId);
  }
}

// Read from localStorage fallback
async function loadFromLocalStorageFallback(planningId) {
  try {
    const key = `${PL_NS}:planning-${planningId}`;
    const data = localStorage.getItem(key);
    return data ? JSON.parse(data) : null;
  } catch (e) {
    console.warn('localStorage read failed', e);
    return null;
  }
}

// Clean up old localStorage entries (older than 24 hours)
function cleanOldLocalStorageEntries() {
  const now = Date.now();
  for (let key in localStorage) {
    if (key.startsWith(PL_NS + ':planning-')) {
      try {
        const data = JSON.parse(localStorage.getItem(key));
        if (data.__sync && (now - data.__sync.lastModified) > STORAGE_CONFIG.localStorageRetention) {
          localStorage.removeItem(key);
        }
      } catch (e) {
        // Malformed entry, remove it
        localStorage.removeItem(key);
      }
    }
  }
}

// List all stored plannings (from IndexedDB or localStorage)
async function listStoredPlannings() {
  if (idbInstance) {
    return new Promise((resolve) => {
      const tx = idbInstance.transaction(STORAGE_CONFIG.storeName, 'readonly');
      const store = tx.objectStore(STORAGE_CONFIG.storeName);
      const request = store.getAll();

      request.onsuccess = () => {
        resolve(request.result.map(p => ({ id: p.id, name: p.name, lastModified: p.__sync?.lastModified })));
      };

      request.onerror = () => {
        // Fallback: list from localStorage
        const list = [];
        for (let key in localStorage) {
          if (key.startsWith(PL_NS + ':planning-')) {
            try {
              const data = JSON.parse(localStorage.getItem(key));
              list.push({ id: data.id, name: data.name, lastModified: data.__sync?.lastModified });
            } catch (e) {}
          }
        }
        resolve(list);
      };
    });
  } else {
    // Fallback: list from localStorage
    const list = [];
    for (let key in localStorage) {
      if (key.startsWith(PL_NS + ':planning-')) {
        try {
          const data = JSON.parse(localStorage.getItem(key));
          list.push({ id: data.id, name: data.name, lastModified: data.__sync?.lastModified });
        } catch (e) {}
      }
    }
    return list;
  }
}

function ensurePlanningDataShape(d) {
  if (!d || typeof d !== 'object') return null;
  if (!Array.isArray(d.domains) || !Array.isArray(d.projects)) return null;

  // FIX: Ensure each milestone is a separate object (prevent shared references)
  // Session 4 : Ajouter parentId pour créer hiérarchie domaine → lot
  d.projects.forEach(p => {
    if (Array.isArray(p.milestones)) {
      p.milestones = p.milestones.map(m => ({...m})); // Deep clone each milestone
      // Ajouter ID unique à chaque jalon pour éviter bugs de tri par index
      p.milestones.forEach((m, idx) => {
        if (!m.id) m.id = 'ms-' + p.id + '-' + idx + '-' + Date.now();
      });
    }
    if (!p.labelPos) p.labelPos = 'above';
    // Ajouter parentId : le domaine devient le "parent" (project racine)
    if (!p.parentId && p.domain) {
      p.parentId = p.domain;
    }
  });

  if (!Array.isArray(d.hiddenProjects)) d.hiddenProjects = [];
  // V14 Lot 2 : initialisations calendrier
  if (!Array.isArray(d.closedPeriods)) d.closedPeriods = [];
  if (d.holidaysEnabled === undefined) d.holidaysEnabled = true;
  // V14 Lot 4a (#5) : types personnalisés de phases et jalons
  if (!Array.isArray(d.customPhaseTypes)) d.customPhaseTypes = [];
  if (!Array.isArray(d.customMilestoneTypes)) d.customMilestoneTypes = [];
  // V14 Lot 4b (#7) : seuil d'auto-clôture après MEP (jours calendaires, défaut 30)
  if (d.autoCloseAfterMepDays === undefined) d.autoCloseAfterMepDays = 30;
  // V19 C : gestion des responsables (Session 2)
  if (!Array.isArray(d.responsables)) d.responsables = [];
  // Session 4 : refactoring complet avec rôles et workflow inversé
  if (!Array.isArray(d.roles)) d.roles = [
    { id: 'role-amoa', name: 'AMOA', color: '#3b82f6' },
    { id: 'role-moe', name: 'MOE Chef Projet', color: '#8b5cf6' },
    { id: 'role-moa', name: 'MOA Chef Projet', color: '#ec4899' }
  ];
  // Mettre à jour structure des responsables pour Session 4
  (d.responsables || []).forEach(r => {
    if (r.role === undefined) r.role = null;
    if (!Array.isArray(r.assignedProjects)) r.assignedProjects = [];
    if (!Array.isArray(r.excludedSubprojects)) r.excludedSubprojects = [];
  });

  // ===== PHASE 1: Add sync metadata (internal, not displayed) =====
  if (!d.__sync) {
    d.__sync = {
      planningId: d.id,
      lastModified: Date.now(),
      lastSyncTime: null,
      syncStatus: 'new', // 'new', 'synced', 'pending', 'error', 'conflict'
      version: 1,
      device: typeof navigator !== 'undefined' ?
        navigator.userAgent.split(' ').slice(-2).join(' ') : 'unknown',
      sharePointUrl: null
    };
  } else {
    // Ensure fields exist
    d.__sync.lastModified = d.__sync.lastModified || Date.now();
    d.__sync.syncStatus = d.__sync.syncStatus || 'pending';
    d.__sync.version = d.__sync.version || 1;
    d.__sync.device = d.__sync.device || 'unknown';
  }

  return d;
}

// ===== PHASE 3: BACKGROUND SYNC WITH SHAREPOINT =====

// Auto-sync timer reference
let syncTimerRef = null;

// Start background sync (called in init())
function startAutoSync() {
  if (!STORAGE_CONFIG.enableAutoSync || syncTimerRef) return;

  syncTimerRef = setInterval(async () => {
    if (state && state.id) {
      await syncPlanningWithSharePoint(state);
    }
  }, STORAGE_CONFIG.syncInterval);

  console.log(`[Sync] Auto-sync started (interval: ${STORAGE_CONFIG.syncInterval}ms)`);
}

// Stop background sync (called on beforeunload)
function stopAutoSync() {
  if (syncTimerRef) {
    clearInterval(syncTimerRef);
    syncTimerRef = null;
    console.log('[Sync] Auto-sync stopped');
  }
}

// Main sync function: pull from SharePoint, merge if needed, push if local is newer
async function syncPlanningWithSharePoint(localState) {
  if (!localState?.id || !state.__sync?.sharePointUrl) {
    // This is expected - SharePoint sync is optional and requires configuration
    // Silently return since this is not an error condition
    return;
  }

  const planningId = localState.id;

  try {
    // STEP 1: Fetch remote state from SharePoint
    const remoteState = await fetchFromSharePoint(state.__sync.sharePointUrl);

    if (!remoteState) {
      // File doesn't exist on SharePoint yet → push local
      await pushToSharePoint(localState);
      return;
    }

    // STEP 2: Compare versions and decide what to do
    const shouldPull = resolveConflict(localState.__sync, remoteState.__sync);

    if (shouldPull) {
      // Remote is newer → pull and merge
      console.log(`[Sync] Pulling from SharePoint (remote v${remoteState.__sync.version} > local v${localState.__sync.version})`);
      mergeRemoteIntoLocal(remoteState);

      // Save merged state
      await savePlanningToStorage(state);

    } else {
      // Local is newer or tied → push to SharePoint
      if (localState.__sync.version > remoteState.__sync.version) {
        console.log(`[Sync] Pushing to SharePoint (local v${localState.__sync.version} > remote v${remoteState.__sync.version})`);
        await pushToSharePoint(localState);
      }
    }

    // STEP 3: Mark as synced
    state.__sync.syncStatus = 'synced';
    state.__sync.lastSyncTime = Date.now();
    await savePlanningToStorage(state);
    updateSyncIndicator();

  } catch (error) {
    state.__sync.syncStatus = 'error';
    state.__sync.lastSyncTime = Date.now();
    console.warn(`[Sync] Error syncing planning ${planningId}:`, error.message);
    updateSyncIndicator();
  }
}

// Fetch from SharePoint (uses fetch + CORS if allowed, else falls back to local)
async function fetchFromSharePoint(url) {
  try {
    const response = await fetch(url, {
      method: 'GET',
      headers: { 'Accept': 'application/json' },
      signal: AbortSignal.timeout(STORAGE_CONFIG.syncTimeout)
    });

    if (response.ok) {
      return await response.json();
    } else if (response.status === 404) {
      return null; // File doesn't exist yet
    } else {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch (error) {
    console.warn('[Sync] Could not fetch from SharePoint:', error.message);
    // Treat network error as "no remote file" → will push local
    return null;
  }
}

  // NOTE: This requires either:
  // - A server endpoint that accepts PUT requests
  // - WebDAV support on SharePoint (uncommon)
  // - Manual export/import workflow by user

  // For now, just log and mark as synced
  console.log('[Sync] Push to SharePoint: requires server endpoint (to implement)');

// Resolve conflict: return true if should pull, false if should push
function resolveConflict(localSync, remoteSync) {
  // Version-based: remote newer → pull
  if (remoteSync.version > localSync.version) {
    return true;
  }

  // Same version but remote is newer (by timestamp) → pull
  if (remoteSync.version === localSync.version &&
      remoteSync.lastModified > localSync.lastModified) {
    return true;
  }

  // Local is newer or tied → keep local (last-write-wins)
  return false;
}

// Merge remote state into local (smart merge preserving local edits)
function mergeRemoteIntoLocal(remoteState) {
  // For now: simple replacement (can be enhanced to smart-merge specific fields)
  // In future: merge phases individually, conflicts handled at field level

  Object.assign(state, remoteState);
  state.__sync = {
    ...state.__sync,
    version: Math.max(state.__sync.version, remoteState.__sync.version) + 1
  };
}

// Update sync status display in UI
function updateSyncIndicator() {
  const icon = document.getElementById('sync-status-icon');
  const text = document.getElementById('sync-status-text');
  const timestamp = document.getElementById('sync-timestamp');

  if (!icon || !text) return; // UI elements not ready yet

  const syncStatus = state.__sync?.syncStatus || 'new';
  const lastSync = state.__sync?.lastSyncTime;

  icon.className = syncStatus;
  text.textContent = syncStatus === 'synced' ? 'Synced' :
                     syncStatus === 'pending' ? 'Pending...' :
                     syncStatus === 'error' ? 'Sync error' : 'New';

  if (lastSync && timestamp) {
    const ago = Math.floor((Date.now() - lastSync) / 1000);
    if (ago < 60) {
      timestamp.textContent = 'just now';
    } else if (ago < 3600) {
      timestamp.textContent = `${Math.floor(ago / 60)}m ago`;
    } else {
      timestamp.textContent = `${Math.floor(ago / 3600)}h ago`;
    }
  }
}

// ===== NEW: Load plannings from backend API and sync with localStorage =====
async function syncPlanningsFromAPI() {
  try {
    const apiBaseUrl = window.location.origin;

    // Fetch list of plannings from API
    const listResponse = await fetch(`${apiBaseUrl}/api/plannings`);
    if (!listResponse.ok) throw new Error(`API error: ${listResponse.status}`);

    const plannings = await listResponse.json();
    if (!Array.isArray(plannings) || plannings.length === 0) {
      console.log('[API Sync] No plannings found in API');
      return false;
    }

    // Load each planning's full data
    for (const summary of plannings) {
      try {
        const dataResponse = await fetch(`${apiBaseUrl}/api/planning/${summary.id}`);
        if (!dataResponse.ok) continue;

        const planning = await dataResponse.json();
        if (planning && planning.data) {
          // Write to localStorage using existing writePlanning() function
          const fullData = ensurePlanningDataShape(planning.data);
          writePlanning(summary.id, fullData);

          // Update planning index
          let index = getPlanningsIndex();
          if (!index.find(p => p.id === summary.id)) {
            index.push({
              id: summary.id,
              name: summary.name || 'Unknown Planning',
              updatedAt: new Date(summary.updated_at).getTime()
            });
            setPlanningsIndex(index);
          }

          console.log(`[API Sync] ✅ Loaded planning: ${summary.name} (${summary.id})`);
        }
      } catch (e) {
        console.warn(`[API Sync] Failed to load planning ${summary.id}:`, e.message);
      }
    }

    return true;
  } catch (err) {
    console.warn('[API Sync] Error syncing from API:', err.message);
    return false;
  }
}

// ===== COLLABORATIVE SYNC: Send & Receive Changes =====
let lastPushedVersion = -1;  // Start at -1 to force initial push
let lastPulledVersion = -1;  // Start at -1 to force initial pull
let syncInProgress = false;

async function pushChangesToServer() {
  if (!state || !currentPlanningId || syncInProgress) return;

  try {
    syncInProgress = true;
    const apiBaseUrl = window.location.origin;
    const currentVersion = state.__sync?.version || 0;

    console.log(`[Sync] Checking push: currentVersion=${currentVersion}, lastPushedVersion=${lastPushedVersion}`);

    // Only push if version has changed
    if (currentVersion === lastPushedVersion) {
      console.log('[Sync] No changes to push');
      return;
    }

    console.log(`[Sync] 📤 Pushing v${currentVersion} to server...`);

    const response = await fetch(`${apiBaseUrl}/api/planning/${currentPlanningId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        data: state,
        version: currentVersion,
        device: navigator.userAgent.split(' ').slice(-2).join(' ')
      })
    });

    if (response.ok) {
      const result = await response.json();
      lastPushedVersion = result.version;
      console.log(`[Sync] ✅ Pushed v${result.version} to server`);
    } else if (response.status === 409) {
      // Conflict: someone else modified it
      const conflict = await response.json();
      console.warn('[Sync] ⚠️ Conflict! Server version:', conflict.currentVersion);
      toast(`⚠️ Planning modifié par quelqu'un d'autre. Rechargement...`);
      // Pull latest from server
      await pullChangesFromServer(true);
    } else {
      console.error('[Sync] Push failed:', response.status, response.statusText);
    }
  } catch (err) {
    console.warn('[Sync] Push error:', err.message);
  } finally {
    syncInProgress = false;
  }
}

async function pullChangesFromServer(force = false) {
  if (!state || !currentPlanningId || syncInProgress) return;

  try {
    syncInProgress = true;
    const apiBaseUrl = window.location.origin;

    // Fetch planning data from server
    const response = await fetch(`${apiBaseUrl}/api/planning/${currentPlanningId}`);
    if (!response.ok) {
      console.warn('[Sync] Pull failed:', response.status);
      return;
    }

    const planning = await response.json();
    if (!planning || !planning.data) {
      console.warn('[Sync] Pull: Invalid response');
      return;
    }

    const serverData = planning.data;
    const serverVersion = serverData.__sync?.version || 0;
    const localVersion = state.__sync?.version || 0;

    console.log(`[Sync] Checking pull: serverVersion=${serverVersion}, localVersion=${localVersion}, force=${force}`);

    // Check if server has newer version
    if (serverVersion > localVersion || force) {
      console.log(`[Sync] 🔄 Pulling from server (v${serverVersion} > v${localVersion})`);

      // Merge server data into local state
      Object.assign(state, serverData);
      state.__sync = serverData.__sync;
      lastPulledVersion = serverVersion;

      // Save to storage
      await savePlanningToStorage(state);

      // Re-render UI
      render();
      renderDrawer();

      if (!force) {
        const device = serverData.__sync?.device || 'Someone';
        toast(`🔔 ${device} modifié le planning`);
      }

      console.log(`[Sync] ✅ Pulled v${serverVersion} from server`);
    }
  } catch (err) {
    console.warn('[Sync] Pull error:', err.message);
  } finally {
    syncInProgress = false;
  }
}

let collaborativeSyncInterval = null;

function startCollaborativeSync() {
  if (collaborativeSyncInterval) return;

  // Sync every 5 seconds
  collaborativeSyncInterval = setInterval(async () => {
    if (state && currentPlanningId) {
      // Push local changes
      await pushChangesToServer();
      // Pull remote changes
      await pullChangesFromServer();
    }
  }, 5000);

  console.log('[Sync] 🔄 Collaborative sync started (5s interval)');
}

function stopCollaborativeSync() {
  if (collaborativeSyncInterval) {
    clearInterval(collaborativeSyncInterval);
    collaborativeSyncInterval = null;
    console.log('[Sync] Collaborative sync stopped');
  }
}

async function loadState() {

  let index = getPlanningsIndex();

  if (index.length === 0) {

    if (PL_NS === 'default') {

    writePlanning(activeId, data);

  // V14 Lot 4c : merge de la bibliothèque globale de types personnalisés
  mergeGlobalTypesInto(data);

  if (Array.isArray(data.projects)) {

function saveState() {
  if (!currentPlanningId) return;
  recordHistory(); // V14 Lot 4a : capture snapshot avant écriture pour permettre undo/redo
  saveStateRaw();
  // ===== PHASE 4: Also save to new persistence layer (IndexedDB + localStorage) =====
  if (state && state.id) {
    savePlanningToStorage(state).catch(err => console.error('[Storage] Failed to save:', err));
  }
  // ===== COLLABORATIVE SYNC: Push changes to server =====
  if (state && currentPlanningId) {
    pushChangesToServer().catch(err => console.warn('[Sync] Push failed:', err));
  }
}
function saveStateRaw() {
  if (!currentPlanningId) return;
  writePlanning(currentPlanningId, state);
  const idx = getPlanningsIndex();
  const e = idx.find(p => p.id === currentPlanningId);
  if (e) { e.updatedAt = Date.now(); setPlanningsIndex(idx); }

  if (s) s.textContent = '💾 ' + (e ? e.name + ' — ' : '') + new Date().toLocaleTimeString('fr-FR');
}

/* V14 Lot 4a : système undo/redo — pile de snapshots (état complet sérialisé en JSON).
   recordHistory() est appelé dans saveState(). undo()/redo() restaurent en-place et écrivent
   sans repasser par saveState (sinon on aurait une boucle).                                  */
let _history = [];
let _redoStack = [];
const _HISTORY_MAX = 30;
let _suppressHistory = false;

function recordHistory() {
  if (_suppressHistory) return;
  const snap = JSON.stringify(state);
  if (_history.length === 0 || _history[_history.length - 1] !== snap) {
    _history.push(snap);
    if (_history.length > _HISTORY_MAX) _history.shift();
    _redoStack = []; // toute action invalide la pile redo
    updateUndoButtons();
  }
}
function undo() {
  if (_history.length < 2) { toast('↶ Rien à annuler'); return; }
  _suppressHistory = true;
  const current = _history.pop();
  _redoStack.push(current);
  state = JSON.parse(_history[_history.length - 1]);
  saveStateRaw();
  render();
  if (document.getElementById('drawer').classList.contains('open')) renderDrawer();
  updateUndoButtons();
  _suppressHistory = false;
  toast('↶ Action annulée (' + _history.length + ' restantes)');
}
function redoAction() {
  if (_redoStack.length === 0) { toast('↷ Rien à refaire'); return; }
  _suppressHistory = true;
  const next = _redoStack.pop();
  _history.push(next);
  state = JSON.parse(next);
  saveStateRaw();
  render();
  if (document.getElementById('drawer').classList.contains('open')) renderDrawer();
  updateUndoButtons();
  _suppressHistory = false;
  toast('↷ Action refaite');
}
function updateUndoButtons() {
  const u = document.getElementById('undo-btn');
  const r = document.getElementById('redo-btn');
  if (u) u.disabled = _history.length < 2;
  if (r) r.disabled = _redoStack.length === 0;
}
function clearHistory() {
  _history = [];
  _redoStack = [];
  recordHistory(); // seed initial avec l'état courant
}

function setActivePlanning(id) {
  if (!getPlanningsIndex().find(p => p.id === id)) return false;
  currentPlanningId = id;
  localStorage.setItem(PL_ACTIVE_KEY, id);
  state = ensurePlanningDataShape(readPlanning(id)) || JSON.parse(JSON.stringify(DEFAULT_DATA));
  mergeGlobalTypesInto(state); // V14 Lot 4c : injecter les types globaux dans le planning chargé
  // V14 Lot 4a : reset historique undo/redo lors du changement de planning actif
  if (typeof clearHistory === 'function') clearHistory();
  return true;
}

function getActivePlanningName() {
  const idx = getPlanningsIndex();
  const e = idx.find(p => p.id === currentPlanningId);
  return e ? e.name : 'Planning';
}

// ===== PHASE 5: Initialize persistence layer =====
(async () => {
  // Initialize IndexedDB
  await initIndexedDB();
  console.log('[Persistence] IndexedDB initialized');

  // ===== NEW: Sync plannings from API BEFORE loading state =====
  try {
    const synced = await syncPlanningsFromAPI();
    if (synced) {
      console.log('[Startup] ✅ Plannings loaded from API');
    }
  } catch (err) {
    console.warn('[Startup] ⚠️ API sync failed (will use local data):', err.message);
  }

  // Load state (will now use plannings loaded from API, or fall back to localStorage)
  state = await loadState();

  // FIX: Set state.id to currentPlanningId so sync mechanism can use it
  state.id = currentPlanningId;

  // Try to load updated data from IndexedDB (if available)
  if (idbInstance && currentPlanningId) {
    const idbData = await loadPlanningFromStorage(currentPlanningId);
    if (idbData) {
      console.log('[Persistence] Loaded planning from IndexedDB');
      state = idbData;
      state.id = currentPlanningId; // Ensure id is set
    }
  }

  // Start auto-sync background task
  startAutoSync();

  // ===== NEW: Start collaborative sync (5s polling) =====
  startCollaborativeSync();

  // Setup cleanup on unload
  window.addEventListener('beforeunload', () => {
    stopAutoSync();
    stopCollaborativeSync();
  });

  // Initial sync indicator update
  updateSyncIndicator();

  // ===== PHASE 8: Auto-Export for SharePoint Backups =====

  // Track last exported state to detect real changes
  let lastExportedState = null;

  // Generate backup JSON every time state changes
  function autoExportBackupJSON() {
    if (!state.id && !currentPlanningId) return;

    const planningId = state.id || currentPlanningId;

    // FIX: Ensure __sync exists
    if (!state.__sync) {
      state.__sync = {
        lastModified: Date.now(),
        version: 1,
        device: navigator.userAgent.split('/').pop().slice(0, 20),
        syncStatus: 'pending'
      };
    }

    // Check if state actually changed (compare without __sync)
    const stateWithoutSync = JSON.parse(JSON.stringify(state));
    delete stateWithoutSync.__sync;
    const currentStateStr = JSON.stringify(stateWithoutSync);

    if (lastExportedState === currentStateStr) {
      // No real changes, skip version increment
      return;
    }

    // State has changed, update tracking
    lastExportedState = currentStateStr;
    state.__sync.lastModified = Date.now();
    state.__sync.version = (state.__sync.version || 0) + 1;
    state.__sync.syncStatus = 'pending';

    const backup = {
      data: state,
      metadata: {
        exportedAt: new Date().toISOString(),
        planningName: getActivePlanningName(),
        planningId: planningId,
        version: state.__sync.version,
        device: state.__sync.device || 'unknown'
      }
    };

    // Store in localStorage for Claude Code to read
    const backupKey = `__backup_${planningId}`;
    try {
      localStorage.setItem(backupKey, JSON.stringify(backup));
      console.log(`[Auto-Export] Backup stored for ${planningId} (version ${backup.metadata.version})`);
    } catch (e) {
      console.warn('[Auto-Export] Failed to store backup:', e.message);
    }
  }

  // Also expose for direct access
  window.__planningExport = () => ({
    id: state.id || currentPlanningId,
    name: state.name || 'Planning',
    projects: state.projects || [],
    phases: state.phases || [],
    jalons: state.jalons || [],
    responsables: state.responsables || [],
    roles: state.roles || [],
    users: state.users || [],
    __sync: state.__sync || {
      lastModified: Date.now(),
      version: 1,
      device: navigator.userAgent.split('/').pop().slice(0, 20),
      syncStatus: 'new'
    },
    timestamp: Date.now()
  });

  // Every state change, auto-export backup
  const originalSaveState = saveState;
  window.saveState = function() {
    originalSaveState.call(this);
    autoExportBackupJSON(); // Auto-export to localStorage
  };

  // Also auto-export every minute (fallback if saveState not called frequently)
  const autoExportTimer = setInterval(async () => {
    const planningId = state?.id || currentPlanningId;
    if (planningId) {
      console.log(`[AutoSync] Triggering sync for ${planningId}`);
      autoExportBackupJSON();
      // Also sync to server
      await syncToServer();
    } else {
      console.warn('[AutoSync] No planning ID available');
    }
  }, 60000); // Every minute

  // ===== PHASE 9: Sync to Python Server =====
  // Track last synced version to avoid creating backups for unchanged data
  let lastSyncedVersion = 0;

  // Send backup to Python sync server (no dependencies, zero setup)
  async function syncToServer() {
    const planningId = state?.id || currentPlanningId;
    if (!planningId) {
      console.warn('[Server-Sync] No planning ID, skipping sync');
      return;
    }

    // Check if version has changed since last sync
    const currentVersion = state.__sync?.version || 1;
    if (currentVersion === lastSyncedVersion) {
      console.log(`[Server-Sync] No changes (v${currentVersion}), skipping sync`);
      return;
    }

    console.log(`[Server-Sync] Starting sync for ${planningId}...`);

    try {
      const backup = {
        data: state,
        metadata: {
          exportedAt: new Date().toISOString(),
          planningName: getActivePlanningName(),
          planningId: planningId,
          version: state.__sync?.version || 1,
          device: state.__sync?.device || 'unknown',
          backupCreatedAt: new Date().toISOString()
        }
      };

      // Update lastSyncedVersion before attempting sync
      lastSyncedVersion = backup.metadata.version;

      console.log(`[Server-Sync] Sending backup (v${backup.metadata.version})...`);

      // Send to Python server (if running on localhost:8888)
      const response = await fetch('http://localhost:8888/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(backup)
      }).catch(e => {
        console.warn('[Server-Sync] Fetch error:', e.message);
        return null;
      });

      if (response?.ok) {
        const result = await response.json();
        console.log(`[Server-Sync] ✅ Sent backup to server:`, result.saved);

        // If there's a merge from colleague, pull it
        if (result.merge?.action === 'PULL' && result.merge?.data) {
          state = result.merge.data;
          state.__sync.syncStatus = 'merged';
          await savePlanningToStorage(state);
          toast(`✅ Synced with colleague (v${state.__sync.version})`);
          render();
          renderDrawer();
          console.log(`[Server-Sync] Merged colleague changes`);
        }
      } else {
        console.warn('[Server-Sync] Server returned:', response?.status);
      }
    } catch (e) {
      console.error('[Server-Sync] Error:', e.message);
    }
  }

  // Cleanup on unload
  window.addEventListener('beforeunload', () => {
    clearInterval(autoExportTimer);
  });

  // Re-render with updated state
  render();
  renderDrawer();
})();

// FALLBACK: In case the async init doesn't complete in time, do a simple synchronous load
if (!state) {
  state = loadState();
}

/* V13: export HTML autonome — clone le fichier courant, remplace DEFAULT_DATA par
   les données du planning actif et namespace localStorage différent (pour éviter
   tout conflit avec les autres exports dans le même navigateur du destinataire).  */
function exportStandaloneHtml() {
  const planningName = getActivePlanningName();
  const exportId = 'exp_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
  const safeName = planningName.replace(/[^a-zA-Z0-9_-]+/g, '_').replace(/^_+|_+$/g,'') || 'planning';

  // 1. Récupérer le HTML actuel
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

  // 2. Remplacer DEFAULT_DATA par les données du planning actif
  const dataJson = JSON.stringify(state, null, 2);
  const defReplaced = html.replace(/const DEFAULT_DATA = \{[\s\S]*?\n\};/, `const DEFAULT_DATA = ${dataJson};`);
  if (defReplaced === html) { toast('❌ Échec : DEFAULT_DATA introuvable dans le HTML.'); return; }
  html = defReplaced;

  // 3. Injecter le namespace localStorage unique pour cet export
  //    (placé tout en haut du <script> principal, avant la définition des helpers)
  html = html.replace(/<script>\s*\nconst YEAR = /, `<script>\nwindow.PLANNING_NAMESPACE = '${exportId}';\nconst YEAR = `);

  // 4. Mettre à jour le titre et le subtitle initiaux pour refléter le nom du planning exporté
  html = html.replace(/<title>[^<]*<\/title>/, `<title>${escapeHtml(planningName)}</title>`);
  html = html.replace(/<h1>Planning CCI<\/h1>/, `<h1>${escapeHtml(planningName)}</h1>`);

  // 5. Téléchargement
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Planning_${safeName}_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  toast('📦 HTML autonome téléchargé : ' + a.download);
}

/* Date utils — V13.8 : minuit UTC (au lieu de midi) pour éliminer le décalage visuel
   de ~7% (= 12h sur une semaine) sur tous les jalons et pilules. */
function parseDate(s) { return new Date(s + 'T00:00:00Z'); }
function todayISO() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

/* FIX Session 4+: Validation et nettoyage des dates des phases anciennes (corruption de format)
   Convertit les dates en format DD/MM/YYYY vers YYYY-MM-DD si nécessaire. */
function validateAndCleanPhaseDate(dateStr) {
  if (!dateStr) return null;
  dateStr = String(dateStr).trim();

  // Format ISO YYYY-MM-DD — OK
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const d = parseDate(dateStr);
    if (!isNaN(d.getTime())) return dateStr;  // Valide
  }

  // Format DD/MM/YYYY — convertir vers YYYY-MM-DD
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateStr)) {
    const [day, month, year] = dateStr.split('/');
    const isoDate = year + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    return isoDate;
  }

  // Format invalide — supprimer
  console.warn('Date invalide supprimée:', dateStr);
  return null;
}

/* Valider toutes les phases d'un projet et nettoyer les dates corrompues */
function validateProjectPhases(proj) {
  if (!Array.isArray(proj.phases)) return;
  proj.phases.forEach(phase => {
    if (phase.start) phase.start = validateAndCleanPhaseDate(phase.start) || '2026-01-05';
    if (phase.end) phase.end = validateAndCleanPhaseDate(phase.end) || '2026-01-19';
    // Assurer que end >= start
    if (phase.start && phase.end && phase.end < phase.start) {
      [phase.start, phase.end] = [phase.end, phase.start];  // Swap
    }
  });
}

/* V14 Lot 1 : statut effectif d'une phase — auto-détecte "late" si fin < aujourd'hui et statut ≠ done.
   V14 Lot 4b (#7) : option `project` permet l'auto-clôture si une MEP du projet est dépassée
   depuis plus de N jours (paramétrable via state.autoCloseAfterMepDays, défaut 30).
   Le statut explicite "done" / "risk" / etc. surcharge l'auto-détection. */
function getEffectiveStatus(phase, project) {
  const explicit = phase.status;
  if (explicit === 'done') return 'done';
  if (explicit && explicit !== '') return explicit;

  // V14 Lot 4b (#7) : si le projet a un jalon MEP dont la date est >= N jours dans le passé,
  // toutes les phases du projet sont considérées "Terminé" automatiquement.
  const days = (state.autoCloseAfterMepDays !== undefined && state.autoCloseAfterMepDays !== null)
             ? parseInt(state.autoCloseAfterMepDays) : 30;
  if (project && days > 0 && Array.isArray(project.milestones)) {
    const cutoffDate = new Date();
    cutoffDate.setDate(cutoffDate.getDate() - days);
    const cutoff = cutoffDate.getFullYear() + '-' + String(cutoffDate.getMonth()+1).padStart(2,'0') + '-' + String(cutoffDate.getDate()).padStart(2,'0');
    if (project.milestones.some(m => m.type === 'mep' && m.date && m.date < cutoff)) return 'done';
  }

  const today = todayISO();
  const ended = phase.end && phase.end < today;
  if (ended) return 'late';
  if (phase.start && phase.start <= today) return 'in-progress';
  return 'planned';
}

/* Retourner les sous-projets effectivement assignés à un responsable
   Logique: Si 'MCO' (domainId) assigné, inclure tous ses sous-projets SAUF excludedSubprojects */
function getAssignedSubprojectsForResponsable(respId) {
  const resp = getResponsableById(respId);
  if (!resp) return [];

  const subprojects = new Set();
  resp.assignedProjects.forEach(projId => {
    // projId peut être soit un domainId (ex:'mco') soit un projectId (ex:'lot438')
    // Vérifier si c'est un domaine
    const domain = state.domains?.find(d => d.id === projId);

    if (domain) {
      // C'est un domaine: inclure tous les sous-projets de ce domaine SAUF exclusions
      (state.projects || [])
        .filter(p => p.domain === domain.id)
        .forEach(subproj => {
          if (!resp.excludedSubprojects.includes(subproj.id)) {
            subprojects.add(subproj.id);
          }
        });
    } else {
      // C'est déjà un sous-projet direct
      if (!resp.excludedSubprojects.includes(projId)) {
        subprojects.add(projId);
      }
    }
  });
  return Array.from(subprojects);
}
