/* V14 Lot 4g v2 : approche STRICTEMENT read-only au chargement (zéro écriture localStorage automatique).
   Inclut types personnalisés (Lot 4c) + closedPeriods + holidaysEnabled + autoCloseAfterMepDays. */
const GLOBAL_TYPES_KEY = 'cci-pl-global-types';   // legacy V14.6 (lue en fallback)
const GLOBAL_CONFIG_KEY = 'cci-pl-global-config'; // V14 Lot 4g v2 (clé étendue)

function loadGlobalConfig() {
  try {
    const raw = localStorage.getItem(GLOBAL_CONFIG_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj && typeof obj === 'object') return obj;
    }
  } catch(e) {}
  // Fallback : ancienne clé pour préserver les types personnalisés (V14.6)
  try {
    const oldRaw = localStorage.getItem(GLOBAL_TYPES_KEY);
    if (oldRaw) {
      const o = JSON.parse(oldRaw);
      if (o && typeof o === 'object') return {
        customPhaseTypes: Array.isArray(o.customPhaseTypes) ? o.customPhaseTypes : [],
        customMilestoneTypes: Array.isArray(o.customMilestoneTypes) ? o.customMilestoneTypes : []
      };
    }
  } catch(e) {}
  return {};
}

function saveGlobalConfig() {
  // Appelée UNIQUEMENT sur action utilisateur explicite (pas au chargement).
  if (!state) return; // sécurité
  const obj = {
    customPhaseTypes: Array.isArray(state.customPhaseTypes) ? state.customPhaseTypes : [],
    customMilestoneTypes: Array.isArray(state.customMilestoneTypes) ? state.customMilestoneTypes : [],
    closedPeriods: Array.isArray(state.closedPeriods) ? state.closedPeriods : [],
    holidaysEnabled: state.holidaysEnabled !== false,
    autoCloseAfterMepDays: (typeof state.autoCloseAfterMepDays === 'number') ? state.autoCloseAfterMepDays : 30
  };
  try { localStorage.setItem(GLOBAL_CONFIG_KEY, JSON.stringify(obj)); } catch(e) {}
}

function mergeGlobalConfigInto(stateObj) {
  // STRICTEMENT READ-ONLY. Si une clé est absente de la lib globale, on garde la valeur du state.
  if (!stateObj || typeof stateObj !== 'object') return;
  const g = loadGlobalConfig();
  if (!g || typeof g !== 'object') return;

  if (Array.isArray(g.customPhaseTypes) && g.customPhaseTypes.length > 0) {
    stateObj.customPhaseTypes = Array.isArray(stateObj.customPhaseTypes) ? stateObj.customPhaseTypes : [];
    g.customPhaseTypes.forEach(gt => {
      const idx = stateObj.customPhaseTypes.findIndex(t => t.id === gt.id);
      if (idx >= 0) stateObj.customPhaseTypes[idx] = gt;
      else stateObj.customPhaseTypes.push(gt);
    });
  }
  if (Array.isArray(g.customMilestoneTypes) && g.customMilestoneTypes.length > 0) {
    stateObj.customMilestoneTypes = Array.isArray(stateObj.customMilestoneTypes) ? stateObj.customMilestoneTypes : [];
    g.customMilestoneTypes.forEach(gt => {
      const idx = stateObj.customMilestoneTypes.findIndex(t => t.id === gt.id);
      if (idx >= 0) stateObj.customMilestoneTypes[idx] = gt;
      else stateObj.customMilestoneTypes.push(gt);
    });
  }
  // Lot 4g v2 : surcharger uniquement si la clé est explicitement présente dans g.
  if (Object.prototype.hasOwnProperty.call(g, 'closedPeriods') && Array.isArray(g.closedPeriods)) {
    stateObj.closedPeriods = JSON.parse(JSON.stringify(g.closedPeriods));
  }
  if (Object.prototype.hasOwnProperty.call(g, 'holidaysEnabled') && typeof g.holidaysEnabled === 'boolean') {
    stateObj.holidaysEnabled = g.holidaysEnabled;
  }
  if (Object.prototype.hasOwnProperty.call(g, 'autoCloseAfterMepDays') && typeof g.autoCloseAfterMepDays === 'number') {
    stateObj.autoCloseAfterMepDays = g.autoCloseAfterMepDays;
  }
}

/* V14 Lot 4c : génération de la structure CCI standard (4 phases + 4 jalons cadence auto)
   pour un nouveau sous-projet, à partir d'une date de référence (défaut : aujourd'hui).
   Durées par défaut en jours ouvrés : Cadrage 21, Dev 28, Recette 14, Formation 7. */
function buildStandardCciSubProject(domain, name, refDateISO) {
  const start = refDateISO || todayISO();
  const addDays = (iso, days) => {
    const d = new Date(iso + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + days);
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0');
  };
  // Durées calendaires approximatives (3 sem / 4 sem / 2 sem / 1 sem). Cadence des jalons en jours ouvrés.
  const cadrageEnd  = addDays(start, 21);
  const devEnd      = addDays(cadrageEnd, 28);
  const recetteEnd  = addDays(devEnd, 14);
  const formationEnd= addDays(recetteEnd, 7);
  // Jalons cadence CCI auto : on utilise la fonction existante computeCciCadenceMilestones si dispo, sinon offsets simples.
  const jalons = [];
  if (typeof addBusinessDays === 'function') {
    jalons.push({ type:'livraison', date: devEnd,                   label: 'Livraison REC3' });
    jalons.push({ type:'pmep',      date: addBusinessDays(devEnd, 10), label: 'PMEP' });
    jalons.push({ type:'cab',       date: addBusinessDays(devEnd, 12), label: 'CAB' });
    jalons.push({ type:'mep',       date: addBusinessDays(devEnd, 15), label: 'MEP' });
  } else {
    // Fallback : offsets calendaires
    jalons.push({ type:'livraison', date: devEnd, label: 'Livraison REC3' });
    jalons.push({ type:'pmep',      date: addDays(devEnd, 14), label: 'PMEP' });
    jalons.push({ type:'cab',       date: addDays(devEnd, 17), label: 'CAB' });
    jalons.push({ type:'mep',       date: addDays(devEnd, 21), label: 'MEP' });
  }
  return {
    id: 'p' + Date.now() + Math.random().toString(36).slice(2, 5),
    domain: domain || (state.domains[0]?.id || 'mco'),
    name: name || 'Nouveau sous-projet',
    subtitle: '',
    labelPos: 'above',
    phases: [
      { type: 'cadrage',   start: start,        end: cadrageEnd,   label: '' },
      { type: 'dev',       start: cadrageEnd,   end: devEnd,       label: '' },
      { type: 'recette',   start: devEnd,       end: recetteEnd,   label: '' },
      { type: 'formation', start: recetteEnd,   end: formationEnd, label: '' }
    ],
    milestones: jalons
  };
}

/* V14 Lot 2 : jours fériés français + calcul de jours ouvrés ============================== */
// Calcul de Pâques (algorithme de Meeus/Jones/Butcher) — base pour Ascension, Pentecôte
function easterDate(year) {
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31); // 3 = mars, 4 = avril
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(Date.UTC(year, month - 1, day));
}
function addDaysUTC(d, days) { const r = new Date(d); r.setUTCDate(r.getUTCDate() + days); return r; }
function dateToISO(d) { return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0'); }

/* Génère les jours fériés français pour une année donnée (date ISO YYYY-MM-DD) */
function frenchHolidays(year) {
  const easter = easterDate(year);
  const list = [
    [`${year}-01-01`, 'Jour de l\'an'],
    [dateToISO(addDaysUTC(easter, 1)), 'Lundi de Pâques'],
    [`${year}-05-01`, 'Fête du travail'],
    [`${year}-05-08`, 'Victoire 1945'],
    [dateToISO(addDaysUTC(easter, 39)), 'Ascension'],
    [dateToISO(addDaysUTC(easter, 50)), 'Lundi de Pentecôte'],
    [`${year}-07-14`, 'Fête nationale'],
    [`${year}-08-15`, 'Assomption'],
    [`${year}-11-01`, 'Toussaint'],
    [`${year}-11-11`, 'Armistice 1918'],
    [`${year}-12-25`, 'Noël']
  ];
  return list;
}

/* Renvoie l'ensemble des dates fériées effectives (fériés FR + périodes fermées personnalisées du state) */
function getClosedDateSet() {
  const set = new Map(); // ISO -> label
  // Fériés FR pour l'année courante du planning
  if (state.holidaysEnabled !== false) {
    frenchHolidays(YEAR).forEach(([iso, label]) => set.set(iso, label));
    // Inclure aussi année précédente et suivante pour les calculs autour des bordures
    frenchHolidays(YEAR - 1).forEach(([iso, label]) => set.set(iso, label));
    frenchHolidays(YEAR + 1).forEach(([iso, label]) => set.set(iso, label));
  }
  // Périodes fermées personnalisées
  if (Array.isArray(state.closedPeriods)) {
    state.closedPeriods.forEach(cp => {
      if (!cp.start || !cp.end) return;
      let cur = parseDate(cp.start);
      const end = parseDate(cp.end);
      while (cur <= end) {
        set.set(dateToISO(cur), cp.label || 'Période fermée');
        cur = addDaysUTC(cur, 1);
      }
    });
  }
  return set;
}

function isClosedDay(dateStr, closedSet) {
  return closedSet.has(dateStr);
}
function isWeekend(dateStr) {
  const d = parseDate(dateStr);
  const dow = d.getUTCDay();
  return dow === 0 || dow === 6;
}

/* Ajoute N jours OUVRÉS (excluant week-ends + fermés) à une date ISO */
function addBusinessDays(startISO, businessDaysToAdd) {
  if (!startISO) return startISO;
  const closed = getClosedDateSet();
  let d = parseDate(startISO);
  let added = 0;
  const direction = businessDaysToAdd >= 0 ? 1 : -1;
  const target = Math.abs(businessDaysToAdd);
  while (added < target) {
    d = addDaysUTC(d, direction);
    const iso = dateToISO(d);
    if (!isWeekend(iso) && !closed.has(iso)) added++;
  }
  return dateToISO(d);
}

/* V14 Lot 2 : cadence jalons CCI — délais par défaut, override possible par domaine ou projet */
const DEFAULT_CADENCE = { livraison: 0, pmep: 10, cab: 12, mep: 15 };
function getEffectiveCadence(proj) {
  const base = { ...DEFAULT_CADENCE };
  const dom = proj && state.domains.find(d => d.id === proj.domain);
  if (dom && dom.cadence) Object.assign(base, dom.cadence);
  if (proj && proj.cadence) Object.assign(base, proj.cadence);
  return base;
}

/* Génère/met à jour les 4 jalons CCI à partir de la fin de phase Dev pour un projet donné.
   - Conserve le custom si l'utilisateur a saisi un libellé custom
   - Met à jour la date à partir de la fin de Dev + cadence en jours ouvrés */
function regenerateCciCadenceMilestones(proj) {
  const devPhase = (proj.phases || []).slice().reverse().find(ph => ph.type === 'dev');
  if (!devPhase || !devPhase.end) return false;
  const devEndISO = devPhase.end;
  const cadence = getEffectiveCadence(proj);
  proj.milestones = proj.milestones || [];
  const order = [
    { type: 'livraison', offset: cadence.livraison || 0, defaultLabel: 'Livraison REC3' },
    { type: 'pmep',      offset: cadence.pmep || 10,     defaultLabel: 'PMEP' },
    { type: 'cab',       offset: cadence.cab || 12,      defaultLabel: 'CAB' },
    { type: 'mep',       offset: cadence.mep || 15,      defaultLabel: 'MEP' }
  ];
  order.forEach(o => {
    const targetISO = addBusinessDays(devEndISO, o.offset);
    const dd = targetISO.slice(8,10) + '/' + targetISO.slice(5,7);
    // 1) priorité aux jalons déjà marqués fromCadence ; 2) NE PAS modifier les jalons manuels (fromCadence: false)
    let existing = proj.milestones.find(m => m.type === o.type && m.fromCadence === true);
    if (!existing) {
      // Chercher un jalon du même type, MAIS seulement s'il n'a pas été modifié manuellement
      existing = proj.milestones.find(m => m.type === o.type && m.fromCadence !== false);
    }
    if (!existing) {
      proj.milestones.push({
        id: 'ms-' + proj.id + '-' + o.type + '-' + Date.now(),
        type: o.type,
        date: targetISO,
        label: `${o.defaultLabel} ${dd}`,
        fromCadence: true
      });
    } else {
      existing.date = targetISO;
      existing.fromCadence = true;
      // Rafraîchir le libellé s'il est vide ou s'il suit le pattern auto-généré
      if (!existing.label || /^(Livraison REC3|PMEP|CAB|MEP|Livraison)\s?\d{0,2}\/?\d{0,2}$/i.test(existing.label.trim())) {
        existing.label = `${o.defaultLabel} ${dd}`;
      }
    }
  });
  autoSortProjectItems(proj);
  return true;
}
function dateToFracWeek(dateStr) {
  if (!dateStr) return 0;
  const d = parseDate(dateStr);
  return (d - FIRST_MONDAY) / (7*24*3600*1000); // 0 = Monday wk1
}
function mondayOf(date) {
  const d = new Date(date);
  const day = d.getUTCDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setUTCDate(d.getUTCDate() + diff);
  return d;
}
function dateToWeek(dateStr) {
  if (!dateStr) return 1;
  const d = parseDate(dateStr);
  const monday = mondayOf(d);
  return Math.round((monday - FIRST_MONDAY) / (7*24*3600*1000)) + 1;
}
function weekStart(w) {
  const d = new Date(FIRST_MONDAY);
  d.setUTCDate(d.getUTCDate() + (w-1)*7);
  return d;
}
function formatDay(d) { return String(d.getUTCDate()).padStart(2,'0') + '/' + String(d.getUTCMonth()+1).padStart(2,'0'); }
function formatISO(d) { return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0'); }
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

/* Compute phase lanes (Gantt stacking for overlapping phases) */
function computePhaseLanes(phases) {
  const indexed = phases.map((p, i) => {
    const ws = dateToFracWeek(p.start);
    const we = dateToFracWeek(p.end);
    return { i, ws, we };
  });
  indexed.sort((a, b) => a.ws - b.ws || a.i - b.i);
  const laneEnds = [];
  const assignment = new Array(phases.length);
  indexed.forEach(({i, ws, we}) => {
    let lane = laneEnds.findIndex(end => end <= ws + 0.001);
    if (lane === -1) { laneEnds.push(we); lane = laneEnds.length - 1; }
    else laneEnds[lane] = we;
    assignment[i] = lane;
  });
  return { assignment, laneCount: Math.max(1, laneEnds.length) };
}

/* V10: multiplicateur global de hauteur en mode print-fit (rempli la page exactement) */
window.PRINT_HEIGHT_MULT = 1;

/* V10: multiplicateur de police de pilule effectif (projet > domaine > 1) */
function getEffectiveFontMult(proj) {
  if (proj.fontMult && proj.fontMult > 0) return proj.fontMult;
  const domain = state.domains.find(d => d.id === proj.domain);
  if (domain && domain.fontMult && domain.fontMult > 0) return domain.fontMult;
  return 1;
}

/* V11: multiplicateur de hauteur de pilule effectif (projet > domaine > 1) */
function getEffectiveHeightMult(proj) {
  if (proj.heightMult && proj.heightMult > 0) return proj.heightMult;
  const domain = state.domains.find(d => d.id === proj.domain);
  if (domain && domain.heightMult && domain.heightMult > 0) return domain.heightMult;
  return 1;
}

/* V12: helpers de résolution px / multiplicateur (projet > domaine > défaut) */
function resolveSize(proj, fieldPx, fieldMult, baseSize) {
  if (proj && proj[fieldPx] && proj[fieldPx] > 0) return parseFloat(proj[fieldPx]);
  if (proj && proj[fieldMult] && proj[fieldMult] > 0) return baseSize * parseFloat(proj[fieldMult]);
  const domain = proj ? state.domains.find(d => d.id === proj.domain) : null;
  if (domain && domain[fieldPx] && domain[fieldPx] > 0) return parseFloat(domain[fieldPx]);
  if (domain && domain[fieldMult] && domain[fieldMult] > 0) return baseSize * parseFloat(domain[fieldMult]);
  return baseSize;
}

/* V12 / V14 Lot 4c : jeux de couleurs par défaut. Formation = teinte ambre violacée (distincte des 3 phases techniques). */
function defaultPhasePalette(seedColor) {
  const c = seedColor || '#3b82f6';
  return {
    cadrage:   { bg: lighten(c, 0.25), fg: '#fff' },
    dev:       { bg: c, fg: '#fff' },
    recette:   { bg: lighten(c, 0.45), fg: darken(c, 0.4) },
    formation: { bg: '#a855f7', fg: '#fff' },
    custom:    { bg: lighten(c, 0.1), fg: '#fff' }
  };
}
function hexToRgb(hex) {
  const h = hex.replace('#','');
  const v = h.length === 3 ? h.split('').map(c=>c+c).join('') : h;
  return [parseInt(v.slice(0,2),16), parseInt(v.slice(2,4),16), parseInt(v.slice(4,6),16)];
}
function rgbToHex(r,g,b) { return '#' + [r,g,b].map(x => Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join(''); }
function lighten(hex, amt) { const [r,g,b] = hexToRgb(hex); return rgbToHex(r+(255-r)*amt, g+(255-g)*amt, b+(255-b)*amt); }
function darken(hex, amt)  { const [r,g,b] = hexToRgb(hex); return rgbToHex(r*(1-amt), g*(1-amt), b*(1-amt)); }

/* V12 / V14 Lot 4a : récupérer la couleur effective d'une phase
   Ordre : phase.bgColor explicite > project.phaseColors[type] > custom phase type > seed couleur projet > palette domaine prédéfinie */
function getPhaseColors(proj, phase) {
  if (phase.bgColor) return { bg: phase.bgColor, fg: phase.fgColor || autoTextColor(phase.bgColor) };
  if (proj.phaseColors && proj.phaseColors[phase.type]) {
    const c = proj.phaseColors[phase.type];
    return { bg: c.bg, fg: c.fg || autoTextColor(c.bg) };
  }
  // V14 Lot 4a : types personnalisés ont leur propre couleur définie au niveau du planning
  const customType = (state.customPhaseTypes || []).find(ct => ct.id === phase.type);
  if (customType && customType.color) return { bg: customType.color, fg: customType.fgColor || autoTextColor(customType.color) };
  if (proj.domainSeed) return defaultPhasePalette(proj.domainSeed)[phase.type] || defaultPhasePalette(proj.domainSeed).cadrage;
  const dom = state.domains.find(d => d.id === proj.domain);
  if (dom && dom.seedColor) return defaultPhasePalette(dom.seedColor)[phase.type] || defaultPhasePalette(dom.seedColor).cadrage;
  const palette = PHASE_COLORS[proj.domain] || PHASE_COLORS.ia;
  return palette[phase.type] || palette.cadrage;
}
function autoTextColor(bgHex) {
  try { const [r,g,b] = hexToRgb(bgHex); const lum = (0.299*r + 0.587*g + 0.114*b) / 255; return lum > 0.6 ? '#1f2937' : '#fff'; }
  catch(e) { return '#fff'; }
}

/* V12 / V14 Lot 4a : couleur effective d'un jalon (custom type → couleur du type) */
function getMilestoneColor(ms) {
  if (ms.color) return ms.color;
  const customType = (state.customMilestoneTypes || []).find(ct => ct.id === ms.type);
  if (customType && customType.color) return customType.color;
  return null; // null = utiliser la classe CSS ms-<type> (livraison/pmep/cab/mep/custom)
}

/* Compute milestone lanes (V4: alternance auto haut/bas + empilement sur collision)
   V13.3 : respect du champ `position` par jalon (auto / above / below). Si explicite,
   on force le côté demandé (avec stacking en cas de collision plutôt que bascule). */
function computeMilestoneLanes(milestones, weekW, startW) {
  const items = milestones.map((m, i) => {
    const frac = dateToFracWeek(m.date);
    const centerX = (frac - (startW - 1)) * weekW;
    const estW = Math.max(24, (m.label || '').length * 5.3 + 14);
    return { i, centerX, left: centerX - estW / 2, right: centerX + estW / 2, forced: m.position };
  });
  const order = [...items].sort((a, b) => a.centerX - b.centerX);
  const tracks = { above: [], below: [] };
  const assign = new Array(milestones.length);
  let alt = 0;
  order.forEach(it => {
    let primary, secondary, allowFlip;
    if (it.forced === 'above' || it.forced === 'below') {
      primary = it.forced;
      secondary = primary === 'above' ? 'below' : 'above';
      allowFlip = false; // utilisateur a choisi : on ne bascule pas, on empile
    } else {
      primary = alt % 2 === 0 ? 'above' : 'below';
      secondary = primary === 'above' ? 'below' : 'above';
      allowFlip = true;
      alt++;
    }
    const sides = allowFlip ? [primary, secondary] : [primary];
    let placed = false;
    for (let lvl = 0; !placed && lvl < 8; lvl++) {
      for (const side of sides) {
        const r = tracks[side][lvl];
        if (r === undefined || it.left >= r + 3) {
          tracks[side][lvl] = it.right;
          assign[it.i] = { side, level: lvl };
          placed = true;
          break;
        }
      }
    }
    if (!placed) assign[it.i] = { side: primary, level: 7 };
  });
  return { assign, aboveLevels: tracks.above.length, belowLevels: tracks.below.length };
}

/* RENDER */
function render() {
  ensureResponsables();  // V19 C : migration + normalisation des responsables
  const gantt = document.getElementById('gantt');
  gantt.innerHTML = '';

  // V13.5 : currentView peut être un nombre (3/6/12) ou 'custom' avec dates personnalisées
  let startW, endW;
  if (currentView === 'custom' && customStartDate && customEndDate) {
    startW = Math.max(1, dateToWeek(customStartDate));
    endW = Math.min(TOTAL_WEEKS, dateToWeek(customEndDate));
    if (endW < startW) endW = startW;
  } else {
    const weeksShown = currentView === 12 ? 52 : currentView === 6 ? 26 : currentView === 3 ? 13 : 4; // V17 : 1 mois = 4 sem
    startW = 1 + viewOffset;
    endW = Math.min(TOTAL_WEEKS, startW + weeksShown - 1);
  }
  const actualWeeks = endW - startW + 1;
  const labelW = 210;
  const printMode = document.body.classList.contains('print-fit');
  // V13.4 : largeur du canevas paramétrable pour ajuster l'aspect ratio à A3 paysage.
  // - Pass 1 utilise 1700px (largeur de référence par défaut).
  // - Pass 2 (si nécessaire) utilise window.PRINT_PAGE_W ajusté pour matcher l'aspect ratio A3,
  //   ce qui force Chrome à scaler uniformément → contenu sur 1 page sans déformation.
  let weekW;
  if (printMode) {
    const pageW_css = window.PRINT_PAGE_W || 1700;
    weekW = (pageW_css - labelW) / actualWeeks;
  } else {
    // V13.5: minWeekW basé sur le nombre réel de semaines affichées (pour gérer aussi 'custom')
    const minWeekW = actualWeeks > 40 ? 23 : actualWeeks > 18 ? 46 : 86;
    const viewportEl = document.querySelector('.viewport');
    const availW = (viewportEl ? viewportEl.clientWidth : window.innerWidth) - 48;
    weekW = Math.max(minWeekW, Math.floor((availW - labelW - 4) / actualWeeks));
  }

  gantt.style.setProperty('--weeks', actualWeeks);
  gantt.style.setProperty('--week-w', weekW);

  // V13.5: compact basé sur le nombre réel de semaines affichées (≥ ~40 semaines)
  const compact = actualWeeks > 40;
  const heightMult = printMode ? (window.PRINT_HEIGHT_MULT || 1) : 1;
  if (printMode) {
    gantt.classList.add('compact');
    document.documentElement.style.setProperty('--pill-h', Math.round(17 * heightMult) + 'px');
  } else if (compact) {
    gantt.classList.add('compact');
    document.documentElement.style.setProperty('--pill-h', '22px');
  } else {
    gantt.classList.remove('compact');
    document.documentElement.style.setProperty('--pill-h', '25px');
  }

  // Months header
  const monthRow = document.createElement('div');
  monthRow.className = 'header-row header-months';
  monthRow.innerHTML = `<div class="label">${YEAR}</div>`;
  let curM = -1, mStart = null;
  for (let w = startW; w <= endW; w++) {
    const m = weekStart(w).getUTCMonth();
    if (m !== curM) {
      if (mStart !== null) {
        const isQuarter = curM % 3 === 0;
        monthRow.innerHTML += `<div class="month-cell${isQuarter?' quarter':''}" style="grid-column:${mStart - startW + 2} / span ${w - mStart}">${MONTHS[curM]}</div>`;
      }
      curM = m; mStart = w;
    }
  }
  if (mStart !== null) {
    const isQuarter = curM % 3 === 0;
    monthRow.innerHTML += `<div class="month-cell${isQuarter?' quarter':''}" style="grid-column:${mStart - startW + 2} / span ${endW - mStart + 1}">${MONTHS[curM]}</div>`;
  }
  gantt.appendChild(monthRow);

  // Weeks header — V8: contraste renforcé + numéro de semaine selon densité
  const weekRow = document.createElement('div');
  weekRow.className = 'header-row header-weeks';
  weekRow.innerHTML = '<div class="label">Semaine</div>';
  // Densité d'affichage des numéros : toutes les semaines en 3/6 mois, 1 sur 2 ou 1 sur 4 en 12 mois selon la largeur
  // V13.8 : seuil abaissé de 30 → 22 px pour afficher tous les n° de semaine en 12 mois sur écran 14"
  const showEvery = compact ? (weekW < 22 ? 2 : 1) : 1;
  for (let w = startW; w <= endW; w++) {
    const ws = weekStart(w);
    const day = ws.getUTCDate();
    const isMonthStart = day <= 7;
    const isQuarterStart = isMonthStart && (ws.getUTCMonth() % 3 === 0);
    const showNum = ((w - startW) % showEvery === 0) || isMonthStart;
    const cls = ['week-cell'];
    if (isMonthStart) cls.push('month-start');
    if (isQuarterStart) cls.push('quarter-start');
    const content = showNum ? `S${w}<span style="display:block;font-size:0.78em;font-weight:500;color:var(--text-muted);margin-top:1px">${formatDay(ws)}</span>` : '';
    weekRow.innerHTML += `<div class="${cls.join(' ')}">${content}</div>`;
  }
  gantt.appendChild(weekRow);

  // V12 + V14 Lot 1 : filtrage des projets masqués + recherche multi-critère
  const hidden = new Set(state.hiddenProjects || []);
  const sq = (searchQuery || '').toLowerCase().trim();
  const matchesSearch = (p) => {
    if (!sq) return true;
    const haystacks = [p.name, p.subtitle, p.icon];
    if (Array.isArray(p.phases)) p.phases.forEach(ph => { haystacks.push(ph.label, ph.start, ph.end, ph.type, ph.responsable, ph.note); });
    if (Array.isArray(p.milestones)) p.milestones.forEach(m => { haystacks.push(m.label, m.date, m.type, m.note); });
    return haystacks.some(h => h && String(h).toLowerCase().includes(sq));
  };
  state.domains.forEach(domain => {
    const projects = state.projects.filter(p => p.domain === domain.id && !hidden.has(p.id) && matchesSearch(p));
    if (projects.length === 0) return;
    const domainVars = getDomainVars(domain);

    const domRow = document.createElement('div');
    domRow.className = 'domain-row';
    domRow.style.cssText = domainVars;
    domRow.innerHTML = `<div class="label">${escapeHtml(domain.name)}</div><div></div>`;
    gantt.appendChild(domRow);

    projects.forEach((proj, pIdx) => {
      const { assignment, laneCount } = computePhaseLanes(proj.phases);
      const msLanes = computeMilestoneLanes(proj.milestones, weekW, startW);

      const CHIP_H = printMode ? Math.round(11 * heightMult) : (compact ? 14 : 16);
      const CHIP_STEP = CHIP_H + (printMode ? 1 : 2);
      const CHIP_GAP = printMode ? 1 : 2;
      const PIN_MIN = printMode ? 2 : 3;
      const topSpace = msLanes.aboveLevels > 0 ? msLanes.aboveLevels * CHIP_STEP + CHIP_GAP + PIN_MIN + (printMode ? 1 : 2) : (printMode ? 2 : 4);
      const bottomSpace = msLanes.belowLevels > 0 ? msLanes.belowLevels * CHIP_STEP + CHIP_GAP + PIN_MIN + (printMode ? 1 : 2) : (printMode ? 2 : 4);
      // V11/V12: hauteur de pilule effective (px direct ou multiplicateur), laneH ajusté
      const baseBasePillH = printMode ? Math.round(17 * heightMult) : (compact ? 22 : 25);
      const baseLaneH = printMode ? Math.round(18 * heightMult) : (compact ? 26 : 30);
      const laneGap = baseLaneH - baseBasePillH;
      const pillH = Math.round(resolveSize(proj, 'pillHeightPx', 'heightMult', baseBasePillH));
      const laneH = pillH + laneGap;
      const rowH = topSpace + laneCount * laneH + bottomSpace - (laneCount - 1) * 5;
      const phasesBlockH = laneCount * laneH - (laneCount - 1) * 5;
      const pillsTop = topSpace;
      const pillsBottom = topSpace + phasesBlockH;

      const row = document.createElement('div');
      row.className = 'project-row' + (pIdx % 2 === 1 ? ' alt' : '');
      // V12: couleur de fond personnalisée du projet (override la couleur du domaine)
      let rowCss = domainVars;
      if (proj.bgColor) rowCss += `--proj-bg:${proj.bgColor};`;
      if (proj.textColor) rowCss += `--proj-text:${proj.textColor};`;
      row.style.cssText = rowCss;
      row.style.height = rowH + 'px';

      // Label — V12: police titre/sous-titre paramétrables, retour à la ligne automatique
      const label = document.createElement('div');
      label.className = 'label';
      const titlePx = resolveSize(proj, 'titleFontPx', 'titleFontMult', compact ? 10.5 : 11);
      const subPx = resolveSize(proj, 'subtitleFontPx', 'subtitleFontMult', compact ? 9 : 9.5);
      const printLabelScale = printMode ? 0.92 : 1;
      // V14 Lot 1 : icône optionnelle devant le nom
      const iconHtml = proj.icon ? `<span class="proj-icon">${escapeHtml(proj.icon)}</span>` : '';
      label.innerHTML =
        `<span class="name" style="font-size:${(titlePx*printLabelScale).toFixed(1)}px">${iconHtml}${escapeHtml(proj.name)}</span>` +
        (proj.subtitle ? `<span class="subtitle" style="font-size:${(subPx*printLabelScale).toFixed(1)}px">${escapeHtml(proj.subtitle)}</span>` : '');
      row.appendChild(label);

      // Week gridlines
      const grid = document.createElement('div');
      grid.className = 'week-grid';
      for (let w = startW; w <= endW; w++) {
        const d = weekStart(w);
        const isMonthStart = d.getUTCDate() <= 7;
        const line = document.createElement('div');
        line.className = 'gridline' + (isMonthStart ? ' month-start' : '');
        line.style.left = ((w - startW) * weekW) + 'px';
        grid.appendChild(line);
      }
      // Month shading (alternating)
      let stripeStart = null, stripeM = null;
      for (let w = startW; w <= endW; w++) {
        const m = weekStart(w).getUTCMonth();
        if (m !== stripeM) {
          if (stripeStart !== null && stripeM % 2 === 1) {
            const stripe = document.createElement('div');
            stripe.className = 'month-stripe';
            stripe.style.left = ((stripeStart - startW) * weekW) + 'px';
            stripe.style.width = ((w - stripeStart) * weekW) + 'px';
            grid.appendChild(stripe);
          }
          stripeM = m; stripeStart = w;
        }
      }
      if (stripeStart !== null && stripeM % 2 === 1) {
        const stripe = document.createElement('div');
        stripe.className = 'month-stripe';
        stripe.style.left = ((stripeStart - startW) * weekW) + 'px';
        stripe.style.width = ((endW - stripeStart + 1) * weekW) + 'px';
        grid.appendChild(stripe);
      }
      // V14 Lot 2 : zones fériés / périodes fermées (rendues UNE FOIS par row pour réutilisation)
      const closedSet = getClosedDateSet();
      if (closedSet.size > 0) {
        for (let w = startW; w <= endW; w++) {
          const wkStart = weekStart(w);
          for (let dd = 0; dd < 7; dd++) {
            const dayDate = new Date(wkStart);
            dayDate.setUTCDate(dayDate.getUTCDate() + dd);
            const iso = dateToISO(dayDate);
            const label = closedSet.get(iso);
            if (!label) continue;
            const dayFrac = (w - 1) + dd / 7;
            const dayLeft = (dayFrac - (startW - 1)) * weekW;
            const dayWidth = weekW / 7;
            const z = document.createElement('div');
            // Distinction visuelle : périodes fermées custom = hachures, fériés = teinte rouge légère
            const isCustom = state.closedPeriods && state.closedPeriods.some(cp => iso >= cp.start && iso <= cp.end);
            z.className = isCustom ? 'closed-zone' : 'holiday-zone';
            z.style.left = dayLeft + 'px';
            z.style.width = dayWidth + 'px';
            z.title = label;
            grid.appendChild(z);
          }
        }
      }
      row.appendChild(grid);

      // Phases — V12: couleurs personnalisables par projet/phase, taille en px
      proj.phases.forEach((phase, pi) => {
        const wsF = dateToFracWeek(phase.start);
        const weF = dateToFracWeek(phase.end);
        // Cohérence: startW/endW = numéros de semaine (1-52), wsF/weF = fractions (0-51)
        // Semaine N = frac [N-1, N), donc: semaine startW commence à frac (startW-1)
        // Afficher une phase si elle chevauche [startW-1, endW)
        if (weF <= (startW - 1) || wsF >= endW) return;
        const visStart = Math.max(wsF, startW - 1);
        const visEnd = Math.min(weF, endW);
        const left = labelW + (visStart - (startW - 1)) * weekW + 1;
        const width = Math.max(weekW * 0.3, (visEnd - visStart) * weekW - 2);

        const lane = assignment[pi] || 0;
        const top = topSpace + lane * laneH;

        const el = document.createElement('div');
        el.className = 'phase';
        const c = getPhaseColors(proj, phase);
        el.style.background = c.bg;
        el.style.color = c.fg;
        el.style.left = left + 'px';
        el.style.width = width + 'px';
        el.style.top = top + 'px';
        // V14 Lot 4c : Formation est un type intégré ; les types personnalisés ont leur libellé propre
        let defFull = {cadrage:'Cadrage', dev:'Développement', recette:'Recette', formation:'Formation'}[phase.type] || '';
        let defShort = {cadrage:'Cad.', dev:'Dev.', recette:'Rec.', formation:'Form.'}[phase.type] || '';
        if (!defFull) {
          const ct = (state.customPhaseTypes || []).find(t => t.id === phase.type);
          if (ct) { defFull = ct.label || phase.type; defShort = (ct.label || phase.type).slice(0, 5); }
        }
        let displayLabel, baseFs;
        if (phase.label) {
          displayLabel = phase.label;
          baseFs = (width < 45 && phase.label.length > 6) ? (compact ? 8 : 9) : (compact ? 10 : 10.5);
        } else {
          displayLabel = width < 60 ? defShort : defFull;
          baseFs = width < 35 ? (compact ? 8 : 9) : (compact ? 10 : 10.5);
        }
        // V12 / V13.7 : taille effective avec override possible au niveau phase individuelle
        const printFontBoost = printMode ? Math.min(1.25, Math.max(1, heightMult * 0.92)) : 1;
        const phaseFontPx = (phase.fontPx && phase.fontPx > 0) ? parseFloat(phase.fontPx)
                          : resolveSize(proj, 'pillFontPx', 'fontMult', baseFs);
        const phaseHeightPx = (phase.heightPx && phase.heightPx > 0) ? Math.round(parseFloat(phase.heightPx))
                            : pillH;
        el.style.fontSize = (phaseFontPx * printFontBoost).toFixed(1) + 'px';
        el.style.height = phaseHeightPx + 'px';
        el.style.borderRadius = (phaseHeightPx / 2) + 'px';
        if (phaseHeightPx !== pillH) {
          el.style.top = (top + (pillH - phaseHeightPx) / 2) + 'px';
        }
        // V13.7 / V13.10 : si la pilule est vraiment trop étroite pour contenir le texte,
        // déporter le libellé à l'extérieur. Détection moins sensible (seuil 0.6 au lieu de 0.85,
        // longueur min 6 au lieu de 4) — évite de déporter pour des pilules confortables comme
        // "Développement" sur 4-5 semaines.
        const estimatedTextW = displayLabel.length * phaseFontPx * 0.55 + 12; // +12 padding pilule
        const tooNarrow = displayLabel.length > 5 && width < estimatedTextW * 0.6;
        if (tooNarrow) {
          el.textContent = ''; // pilule vide, juste la couleur
          // Décider haut/bas selon la place dispo : par défaut sous la pilule
          const outside = document.createElement('div');
          outside.className = 'phase-outside-label';
          outside.textContent = displayLabel;
          outside.style.fontSize = (phaseFontPx * printFontBoost).toFixed(1) + 'px';
          outside.style.left = (left + width/2) + 'px';
          // Position : sous la pilule par défaut (espace bottomSpace réservé pour les jalons "below" peut entrer en collision, mais minoritaire)
          outside.style.top = (top + phaseHeightPx + 3) + 'px';
          outside.title = el.title;
          row.appendChild(outside);
        } else {
          el.textContent = displayLabel;
        }
        // V14 Lot 1 / Lot 4b (#7) : statut + avancement (proj passé pour l'auto-close MEP+X)
        const effStatus = getEffectiveStatus(phase, proj);
        if (effStatus && effStatus !== 'planned') el.dataset.status = effStatus;
        const progress = (phase.progress !== undefined && phase.progress !== null && phase.progress !== '') ? Math.max(0, Math.min(100, parseFloat(phase.progress))) : null;
        if (progress !== null && !isNaN(progress)) {
          const prog = document.createElement('div');
          prog.className = 'phase-progress';
          prog.style.width = progress + '%';
          el.appendChild(prog);
        }
        // V17/V18 : tooltip enrichi avec responsable + note
        el.title = `${phase.label || defFull}\n${phase.start} → ${phase.end}\nStatut : ${STATUS_LABELS[effStatus] || effStatus}${progress !== null ? '\nAvancement : ' + progress + ' %' : ''}${phase.responsable ? '\nResponsable : ' + phase.responsable : ''}${phase.note ? '\n\n📝 ' + phase.note : ''}`;
        // V18 : indicateur visuel 📝 si la phase a une note
        if (phase.note) {
          const noteIcon = document.createElement('span');
          noteIcon.className = 'phase-note-icon';
          noteIcon.textContent = '📝';
          noteIcon.setAttribute('aria-hidden', 'true');
          el.appendChild(noteIcon);
        }
        el.addEventListener('click', () => editProject(proj.id));
        row.appendChild(el);
      });

      // Milestones — V6: chip hors pilule + losange à la base du chip + pin fin jusqu'au bord de la pilule
      const diaSize = compact ? 7 : 8;
      proj.milestones.forEach((ms, mi) => {
        const frac = dateToFracWeek(ms.date);
        if (frac < (startW - 1) || frac > endW) return;
        const centerX = labelW + (frac - (startW - 1)) * weekW;
        const a = msLanes.assign[mi];

        // V12: couleur personnalisée du jalon (override la classe CSS)
        const msColor = getMilestoneColor(ms);
        const msTextColor = ms.textColor || (msColor ? autoTextColor(msColor) : null);

        // Chip
        const chip = document.createElement('div');
        chip.className = 'ms-chip ms-' + ms.type;
        chip.textContent = ms.label || '';
        chip.style.left = centerX + 'px';
        if (msColor) { chip.style.background = msColor; if (msTextColor) chip.style.color = msTextColor; }
        let chipTop;
        if (a.side === 'above') {
          chipTop = pillsTop - CHIP_GAP - (a.level + 1) * CHIP_STEP + 2;
        } else {
          chipTop = pillsBottom + CHIP_GAP + a.level * CHIP_STEP;
        }
        chip.style.top = chipTop + 'px';
        // V18 : tooltip enrichi + classe has-note pour afficher le badge 📝
        chip.title = `${ms.label}\n${ms.date}${ms.note ? '\n\n📝 ' + ms.note : ''}`;
        if (ms.note) chip.classList.add('has-note');
        chip.addEventListener('click', () => editProject(proj.id));
        row.appendChild(chip);

        // Losange à la base du chip (côté pilule), centré horizontalement sur la date
        const diamond = document.createElement('div');
        diamond.className = 'ms-diamond ms-' + ms.type;
        const diaHalf = diaSize / 2;
        let diaCenterY;
        if (a.side === 'above') {
          diaCenterY = chipTop + CHIP_H + diaHalf;
        } else {
          diaCenterY = chipTop - diaHalf;
        }
        diamond.style.left = (centerX - diaHalf) + 'px';
        diamond.style.top = (diaCenterY - diaHalf) + 'px';
        diamond.title = `${ms.label}\n${ms.date}`;
        if (msColor) diamond.style.background = msColor;
        diamond.addEventListener('click', () => editProject(proj.id));
        row.appendChild(diamond);

        // Pin (trait fin du losange au bord de la pilule)
        const pin = document.createElement('div');
        pin.className = 'ms-pin ms-' + ms.type;
        pin.style.left = (centerX - 0.75) + 'px';
        if (msColor) pin.style.background = msColor;
        if (a.side === 'above') {
          const pinTop = diaCenterY + diaHalf;
          pin.style.top = pinTop + 'px';
          pin.style.height = Math.max(PIN_MIN, pillsTop - pinTop) + 'px';
        } else {
          const pinBottom = diaCenterY - diaHalf;
          pin.style.top = pillsBottom + 'px';
          pin.style.height = Math.max(PIN_MIN, pinBottom - pillsBottom) + 'px';
        }
        row.appendChild(pin);
      });

      gantt.appendChild(row);

      // V12 / V13.4 : extension dynamique pour les libellés wrappés, en print ET screen.
      // (V13.4 abandonne la compression pass 2 en faveur d'un élargissement horizontal du canevas
      // pour respecter l'aspect ratio A3 paysage → plus besoin de désactiver l'extension.)
      requestAnimationFrame(() => {
        const labelInner = label.scrollHeight + 12;
        if (labelInner > rowH) row.style.height = labelInner + 'px';
      });
    });
  });

  // Today line
  const today = new Date();
  const todayFrac = (today - FIRST_MONDAY) / (7*24*3600*1000);
  if (todayFrac >= (startW - 1) && todayFrac <= endW) {
    const line = document.createElement('div');
    line.className = 'today-line';
    line.style.left = (labelW + (todayFrac - (startW - 1)) * weekW) + 'px';
    gantt.appendChild(line);
  }

  updateSubtitle();
}

function getDomainVars(domainOrId) {
  const dom = typeof domainOrId === 'string' ? state.domains.find(d => d.id === domainOrId) : domainOrId;
  if (!dom) return '';
  // V12: si le domaine a des couleurs personnalisées, on les utilise directement
  if (dom.bgColor || dom.bgColorAlt || dom.strongColor || dom.seedColor) {
    const seed = dom.seedColor || '#3b82f6';
    const bg = dom.bgColor || lighten(seed, 0.92);
    const bgAlt = dom.bgColorAlt || lighten(seed, 0.86);
    const strong = dom.strongColor || darken(seed, 0.2);
    return `--domain-bg:${bg};--domain-bg-alt:${bgAlt};--domain-strong:${strong};`;
  }
  const v = dom.id;
  // Si l'id correspond à une palette CSS prédéfinie, on l'utilise ; sinon couleurs neutres
  const known = ['mco','ceos','cfpi','nse','easy','digi','o2c','ia','einv'];
  if (known.includes(v)) return `--domain-bg:var(--${v}-bg);--domain-bg-alt:var(--${v}-bg-alt);--domain-strong:var(--${v}-strong);`;
  return `--domain-bg:#f8fafc;--domain-bg-alt:#f1f5f9;--domain-strong:#475569;`;
}

function updateSubtitle() {
  let startW, endW, txt;
  if (currentView === 'custom' && customStartDate && customEndDate) {
    startW = Math.max(1, dateToWeek(customStartDate));
    endW = Math.min(TOTAL_WEEKS, dateToWeek(customEndDate));
    if (endW < startW) endW = startW;
    txt = `${YEAR} — 📅 Personnalisé (${customStartDate} → ${customEndDate} · sem. ${startW} → ${endW})`;
  } else {
    const weeksShown = currentView === 12 ? 52 : currentView === 6 ? 26 : currentView === 3 ? 13 : 4; // V17 : 1 mois = 4 sem
    startW = 1 + viewOffset;
    endW = Math.min(TOTAL_WEEKS, startW + weeksShown - 1);
    if (currentView === 12) txt = `${YEAR} — Vue annuelle 52 semaines`;
    else txt = `${YEAR} — ${currentView} mois (sem. ${startW} → ${endW} · ${formatDay(weekStart(startW))} → ${formatDay(weekStart(endW))})`;
  }
  const plName = getActivePlanningName();
  if (plName) txt = `📋 ${plName} · ${txt}`;
  document.getElementById('subtitle').textContent = txt;
  // V13.5: nav prev/next inutiles en vue annuelle ou personnalisée
  const showNav = currentView !== 12 && currentView !== 'custom';
  document.getElementById('nav-prev').style.display = showNav ? '' : 'none';
  document.getElementById('nav-next').style.display = showNav ? '' : 'none';
  document.getElementById('nav-prev').disabled = viewOffset === 0;
  document.getElementById('nav-next').disabled = endW >= TOTAL_WEEKS;
  // Synchroniser le visuel du composant date-range
  const cr = document.querySelector('.custom-range');
  if (cr) cr.classList.toggle('active', currentView === 'custom');
}

/* V14 Lot 3 : tableau de bord — calcule des KPIs, avancement par domaine, listes contextuelles */
function renderSynthesisTab() {
  const today = todayISO();
  const todayD = parseDate(today);
  const days = (n) => { const d = new Date(todayD); d.setUTCDate(d.getUTCDate() + n); return dateToISO(d); };
  const horizon30 = days(30), horizon60 = days(60), horizon90 = days(90);
  const projects = state.projects || [];

  // === Calculs ===
  let phasesLate = 0, phasesRisk = 0, phasesInProgress = 0, phasesDone = 0, phasesTotal = 0;
  const lateProjects = new Map();   // id -> { proj, lateCount }
  const riskPhases = [];            // {proj, phase}
  const upcomingMs = { '30': [], '60': [], '90': [] };
  const allNotes = [];              // V18 : {proj, phase ou ms, type 'phase' ou 'ms', text, ref date}

  // Avancement par domaine : moyenne des % avancement (ou statut → %) des phases du domaine
  const domainStats = {};
  state.domains.forEach(d => { domainStats[d.id] = { name: d.name, totalProg: 0, count: 0, projCount: 0, color: d.seedColor || null }; });

  projects.forEach(p => {
    const dom = domainStats[p.domain];
    if (dom) dom.projCount++;
    (p.phases || []).forEach(ph => {
      phasesTotal++;
      const eff = getEffectiveStatus(ph, p); // V14 Lot 4b (#7) : passer proj pour auto-close MEP+X
      if (eff === 'late') { phasesLate++; lateProjects.set(p.id, { proj: p, lateCount: (lateProjects.get(p.id)?.lateCount || 0) + 1 }); }
      if (eff === 'risk') { phasesRisk++; riskPhases.push({ proj: p, phase: ph }); }
      if (eff === 'in-progress') phasesInProgress++;
      if (eff === 'done') phasesDone++;
      // Avancement effectif : prog explicite si saisi, sinon dérivé du statut
      let progVal;
      if (ph.progress !== undefined && ph.progress !== null && ph.progress !== '') progVal = parseFloat(ph.progress);
      else if (eff === 'done') progVal = 100;
      else if (eff === 'in-progress') progVal = 50;
      else if (eff === 'late') progVal = 75;
      else progVal = 0;
      if (dom) { dom.totalProg += progVal; dom.count++; }
      // V18 : collecte des notes de phase
      if (ph.note && ph.note.trim()) {
        allNotes.push({ proj: p, kind: 'phase', label: ph.label || ({cadrage:'Cadrage',dev:'Développement',recette:'Recette',formation:'Formation'}[ph.type] || ph.type), date: ph.start, text: ph.note });
      }
    });
    (p.milestones || []).forEach(m => {
      if (m.date && m.date >= today) {
        if (m.date <= horizon30) upcomingMs['30'].push({ proj: p, ms: m });
        if (m.date <= horizon60) upcomingMs['60'].push({ proj: p, ms: m });
        if (m.date <= horizon90) upcomingMs['90'].push({ proj: p, ms: m });
      }
      // V18 : collecte des notes de jalon (toutes dates)
      if (m.note && m.note.trim()) {
        allNotes.push({ proj: p, kind: 'ms', label: m.label || m.type, date: m.date, text: m.note });
      }
    });
  });
  // V18 : tri des notes par date
  allNotes.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

  ['30','60','90'].forEach(k => upcomingMs[k].sort((a, b) => a.ms.date.localeCompare(b.ms.date)));

  // === HTML ===
  const msColorMap = { livraison: '#0d9488', pmep: '#312e81', cab: '#65a30d', mep: '#1e3a8a', custom: '#7c3aed' };

  let html = `<div class="synthesis-tab">
    <p style="font-size:11px; color:var(--text-soft); margin: 0 0 12px 0">
      Vue d'ensemble du planning « <b>${escapeHtml(getActivePlanningName())}</b> » au ${today}.
      Recalculé en temps réel à chaque ouverture du tiroir.
    </p>

    <div class="kpi-grid">
      <div class="kpi info" data-action="kpi-goto" data-target="avancement" title="Voir l'avancement par projet"><div class="k-val">${state.domains.length}</div><div class="k-lab">Projets</div></div>
      <div class="kpi info" data-action="kpi-goto" data-target="avancement" title="Voir l'avancement par projet"><div class="k-val">${projects.length}</div><div class="k-lab">Sous-projets</div></div>
      <div class="kpi"><div class="k-val">${phasesTotal}</div><div class="k-lab">Phases au total</div></div>
      <div class="kpi ${phasesLate > 0 ? 'alert' : ''}" data-action="kpi-goto" data-target="late" title="Voir les sous-projets en retard"><div class="k-val">${phasesLate}</div><div class="k-lab">En retard</div></div>
      <div class="kpi ${phasesRisk > 0 ? 'warn' : ''}" data-action="kpi-goto" data-target="risk" title="Voir les phases à risque"><div class="k-val">${phasesRisk}</div><div class="k-lab">À risque</div></div>
      <div class="kpi ok"><div class="k-val">${phasesDone}</div><div class="k-lab">Terminées</div></div>
      <div class="kpi info" data-action="kpi-goto" data-target="ms30" title="Voir les jalons à J+30"><div class="k-val">${upcomingMs['30'].length}</div><div class="k-lab">Jalons J+30</div></div>
      <div class="kpi info" data-action="kpi-goto" data-target="ms90" title="Voir les jalons J+31 à J+90"><div class="k-val">${upcomingMs['60'].length}</div><div class="k-lab">Jalons J+60</div></div>
      <div class="kpi info" data-action="kpi-goto" data-target="ms90" title="Voir les jalons J+31 à J+90"><div class="k-val">${upcomingMs['90'].length}</div><div class="k-lab">Jalons J+90</div></div>
      ${allNotes.length > 0 ? `<div class="kpi info" data-action="kpi-goto" data-target="notes" title="Voir les notes et commentaires"><div class="k-val">${allNotes.length}</div><div class="k-lab">📝 Notes</div></div>` : ''}
    </div>

    <div class="section-h" id="syn-section-avancement">📈 Avancement par projet</div>
    ${state.domains.filter(d => domainStats[d.id].count > 0).map(d => {
      const s = domainStats[d.id];
      const pct = s.count > 0 ? Math.round(s.totalProg / s.count) : 0;
      const color = s.color || (PHASE_COLORS[d.id] && PHASE_COLORS[d.id].dev && PHASE_COLORS[d.id].dev.bg) || '#3b82f6';
      return `<div class="domain-prog">
        <div class="d-name">${escapeHtml(d.name)} <span style="font-size:9px; color:var(--text-soft); font-weight:500">(${s.projCount} proj.)</span></div>
        <div class="d-bar"><div class="d-fill" style="width:${pct}%; --d-color:${color}; background:${color}"></div></div>
        <div class="d-pct">${pct} %</div>
      </div>`;
    }).join('')}
    ${state.domains.filter(d => domainStats[d.id].count > 0).length === 0 ? '<div class="empty">Aucun projet à afficher — créez-en un dans 📋 Sous-projets ou chargez un modèle dans 💼 Mes plannings.</div>' : ''}

    <div class="section-h" id="syn-section-late">🔴 Sous-projets en retard <span class="badge">${lateProjects.size}</span></div>
    <ul class="item-list">
      ${lateProjects.size === 0 ? '<li class="empty">Aucun projet en retard 🎉</li>' :
        [...lateProjects.values()].map(({proj, lateCount}) => {
          const dom = state.domains.find(d => d.id === proj.domain);
          return `<li data-action="goto-project" data-project-id="${proj.id}">
            <span class="it-tag" style="background:#ef4444">${lateCount} en retard</span>
            <span class="it-name">${proj.icon ? escapeHtml(proj.icon)+' ' : ''}${escapeHtml(proj.name)}</span>
            <span class="it-sub">${dom ? escapeHtml(dom.name) : ''}</span>
          </li>`;
        }).join('')}
    </ul>

    <div class="section-h" id="syn-section-risk">🟡 Phases à risque <span class="badge">${riskPhases.length}</span></div>
    <ul class="item-list">
      ${riskPhases.length === 0 ? '<li class="empty">Aucune phase à risque marquée.</li>' :
        riskPhases.map(({proj, phase}) => {
          const lab = phase.label || ({cadrage:'Cadrage', dev:'Développement', recette:'Recette', formation:'Formation'}[phase.type] || phase.type);
          return `<li data-action="goto-project" data-project-id="${proj.id}">
            <span class="it-date">${phase.end || phase.start || '—'}</span>
            <span class="it-tag" style="background:#f59e0b">⚠️</span>
            <span class="it-name">${escapeHtml(proj.name)}</span>
            <span class="it-sub">${escapeHtml(lab)}</span>
          </li>`;
        }).join('')}
    </ul>

    <div class="section-h" id="syn-section-ms30">📌 Prochains jalons (30 jours) <span class="badge">${upcomingMs['30'].length}</span></div>
    <ul class="item-list">
      ${upcomingMs['30'].length === 0 ? '<li class="empty">Pas de jalon prévu dans les 30 jours.</li>' :
        upcomingMs['30'].slice(0, 20).map(({proj, ms}) => {
          const tagColor = ms.color || msColorMap[ms.type] || '#7c3aed';
          const tagLabel = ({livraison:'Livr.', pmep:'PMEP', cab:'CAB', mep:'MEP', custom:'•'}[ms.type] || ms.type);
          return `<li data-action="goto-project" data-project-id="${proj.id}">
            <span class="it-date">${ms.date}</span>
            <span class="it-tag" style="background:${tagColor}">${tagLabel}</span>
            <span class="it-name">${escapeHtml(ms.label || tagLabel)}</span>
            <span class="it-sub">${escapeHtml(proj.name)}</span>
          </li>`;
        }).join('')}
      ${upcomingMs['30'].length > 20 ? `<li class="empty">… et ${upcomingMs['30'].length - 20} autres jalons</li>` : ''}
    </ul>

    <div class="section-h" id="syn-section-ms90">📅 Jalons J+31 → J+90 <span class="badge">${upcomingMs['90'].length - upcomingMs['30'].length}</span></div>
    <ul class="item-list">
      ${(() => {
        const list = upcomingMs['90'].filter(x => x.ms.date > horizon30);
        if (list.length === 0) return '<li class="empty">Pas de jalon supplémentaire entre J+30 et J+90.</li>';
        return list.slice(0, 15).map(({proj, ms}) => {
          const tagColor = ms.color || msColorMap[ms.type] || '#7c3aed';
          const tagLabel = ({livraison:'Livr.', pmep:'PMEP', cab:'CAB', mep:'MEP', custom:'•'}[ms.type] || ms.type);
          return `<li data-action="goto-project" data-project-id="${proj.id}">
            <span class="it-date">${ms.date}</span>
            <span class="it-tag" style="background:${tagColor}">${tagLabel}</span>
            <span class="it-name">${escapeHtml(ms.label || tagLabel)}</span>
            <span class="it-sub">${escapeHtml(proj.name)}</span>
          </li>`;
        }).join('') + (list.length > 15 ? `<li class="empty">… et ${list.length - 15} autres jalons</li>` : '');
      })()}
    </ul>

    <div class="section-h" id="syn-section-notes">📝 Notes &amp; commentaires <span class="badge">${allNotes.length}</span></div>
    <ul class="item-list">
      ${allNotes.length === 0 ? '<li class="empty">Aucune note saisie. Pour ajouter une note : ouvrir un sous-projet → ⚙ Plus d’options → champ Note pour les phases, ou bouton ✎ pour les jalons.</li>' :
        allNotes.map(n => `<li data-action="goto-project" data-project-id="${n.proj.id}">
          <span class="it-date">${n.date || '—'}</span>
          <span class="it-tag" style="background:${n.kind === 'ms' ? '#7c3aed' : '#3b82f6'}">${n.kind === 'ms' ? 'jalon' : 'phase'}</span>
          <span class="it-name">${escapeHtml(n.label)} <span style="color:var(--text-soft); font-weight:400; font-size:10.5px">— ${escapeHtml(n.text.length > 80 ? n.text.slice(0, 80) + '…' : n.text)}</span></span>
          <span class="it-sub">${escapeHtml(n.proj.name)}</span>
        </li>`).join('')}
    </ul>
  </div>`;
  return html;
}

      Le calendrier centralise les <b>jours non ouvrés</b> du planning : jours fériés français et périodes fermées (vacances, ponts, fermetures CCI). Ces dates sont utilisées par la cadence auto des jalons et grisées sur le Gantt.

    <div class="tpl-card">
      <h4>🇫🇷 Jours fériés français ${YEAR} <span style="font-size:10px; color:var(--text-soft); font-weight:500">— 🌐 global</span></h4>

function renderSettingsTab() {

  let html = `<div class="planning-tab">
    <div class="settings-subtabs">

  if (activeSettingsSubtab === 'cadence') html += renderSettingsCadence();

/* V12: helper pour générer un sélecteur "S/M/L/XL + px personnalisé" */
function sizeField(label, fieldMult, fieldPx, opts, currentMult, currentPx, allowInherit, placeholderPx) {
  const optsHtml = opts.map(o => `<option value="${o.v}" ${currentMult==o.v?'selected':''}>${o.t}</option>`).join('');
  const inheritOpt = allowInherit ? `<option value="" ${!currentMult?'selected':''}>↺ Hériter</option>` : '';
  return `<div class="field">
    <label>${label}</label>
    <div class="pair">
      <select data-field="${fieldMult}">${inheritOpt}${optsHtml}</select>
      <input type="number" min="6" max="80" step="0.5" data-field="${fieldPx}" value="${currentPx||''}" placeholder="${placeholderPx||'px'}" title="Saisir une taille en pixels (prend le pas sur le sélecteur)">
    </div>
  </div>`;
}

function colorField(label, field, currentColor, allowEmpty) {
  return `<div class="field">
    <label>${label}</label>
    <div class="pair color-control">
      <input type="color" data-field="${field}" value="${currentColor || '#3b82f6'}">
      <input type="text" data-field="${field}" value="${currentColor || ''}" placeholder="#hex" maxlength="9">
      ${allowEmpty ? `<button type="button" class="swatch clear" data-action="clear-color" data-target="${field}" title="Réinitialiser"></button>` : ''}
    </div>
  </div>`;
}

                <td style="width:120px"><input type="date" value="${m.date}" data-field="date"></td>
                <td style="width:80px"><select data-field="position" title="Position du libellé pour ce jalon">
                  <option value="" ${!m.position?'selected':''}>↕ Auto</option>
                  <option value="above" ${m.position==='above'?'selected':''}>↑ Haut</option>
                  <option value="below" ${m.position==='below'?'selected':''}>↓ Bas</option>
                </select></td>
                <td style="width:50px">
                  <input type="color" data-field="color" value="${m.color || '#3b82f6'}" title="${m.color || 'couleur du type'}">
                </td>
                <td style="width:36px"><button class="icon-btn note-btn ${m.note ? 'has-note' : ''}" data-action="edit-ms-note" data-ms-id="${m.id}" title="${m.note ? escapeHtml(m.note) : 'Ajouter une note'}" aria-label="Note du jalon">${m.note ? '📝' : '✎'}</button></td>
                <td style="width:24px"><button class="icon-btn" data-action="delete-milestone" aria-label="Supprimer ce jalon">×</button></td>
              </tr>`).join('')}
          </tbody>
        </table>
        <div style="display:flex; gap:6px; margin-top:8px">
          <button class="add-row" data-action="add-milestone" style="flex:1">+ Ajouter un jalon</button>
          <button class="btn" data-action="generate-cadence" title="Génère/met à jour les 4 jalons CCI (Livraison REC3 / PMEP / CAB / MEP) à partir de la fin de la phase Dev, en jours ouvrés selon la cadence du domaine">✨ Générer cadence CCI</button>
        </div>
      </div>`;
    });
  });
  html += `<button class="add-row" data-action="add-project" style="padding:14px">+ Ajouter un projet</button>`;
  return html;
}

      <ol>
        <li><span class="step-num">1</span>Cliquez <b>➕ Nouveau planning</b> — choisissez la source : Vide / Mono-projet / Multi-domaines / CCI 2026 / Dupliquer le planning actif</li>
        <li><span class="step-num">2</span>Donnez un <b>nom</b> (ex. "Projet Alpha 2026"). Le nom apparaît dans la barre supérieure (📋 Nom · 2026 — Vue annuelle…).</li>

        <li><span class="step-num">5</span>⎘ <b>Dupliquer</b> / 🗑 <b>Supprimer</b> via les icônes en bout de ligne</li>
      </ol>
      <div class="info">ℹ️ Le planning <b>actif</b> (▶ devant son nom) est celui que vous voyez dans le Gantt et qui sera exporté en PDF / HTML autonome.</div>

    <section id="h-share">
      <h3>📦 Partage avec les collègues</h3>
      <div class="warn">⚠️ <b>SharePoint bloque le rendu HTML</b> depuis 2017 (sécurité anti-XSS). Vous ne pouvez pas ouvrir un .html directement depuis SharePoint dans Chrome — il sera systématiquement téléchargé.</div>

      <p><b>Solution recommandée — combinaison OneDrive Sync + JSON</b> :</p>
      <ol>
        <li><span class="step-num">1</span>Le fichier HTML est <b>synchronisé via OneDrive Sync</b> sur tous les postes (clic droit sur la bibliothèque SharePoint → "Synchroniser"). Il apparaît localement sous <code>OneDrive - [Organisation]</code>.</li>
        <li><span class="step-num">2</span>Chacun ouvre l'HTML <b>depuis le dossier OneDrive Sync</b> (file:///… → Chrome accepte de l'ouvrir car c'est un fichier local)</li>
        <li><span class="step-num">3</span>Pour <b>partager les données</b> d'un planning : ⬇ Exporter JSON → dépôt sur SharePoint → collègue ⬆ Importer JSON</li>
        <li><span class="step-num">4</span>Pour <b>partager clé-en-main</b> (collègue ouvre, voit déjà les données) : utilisez le bouton 📦 <b>Exporter le planning actif en HTML autonome</b> dans l'onglet "Mes plannings"</li>
      </ol>

      <div class="mock">
        <div class="mock-title">Workflow type</div>
        <div style="font-size:10.5px; line-height:1.7">
          <b>Émetteur</b> : Édite → ⬇ Exporter JSON → dépôt SharePoint <span class="arrow">→</span><br>
          <b>Collègue</b> : Télécharge JSON → ouvre son HTML local → ⬆ Importer JSON → édite à son tour <span class="arrow">→</span><br>
          <b>Renvoie</b> : ⬇ Exporter JSON → dépôt SharePoint (versioning géré par SharePoint)
        </div>
      </div>

      <div class="tip">💡 Pour un partage clé-en-main : 📦 <b>HTML autonome</b> (un seul fichier contenant déjà les données). Le collègue n'a qu'à l'ouvrir, sans étape d'import.</div>
    </section>

    <section id="h-pdf">
      <h3>📄 Export PDF 1 page</h3>
      <p>Bouton <b>📄 PDF 1 page</b> dans la barre supérieure. Génère un PDF tenant sur une seule page A3 paysage.</p>
      <ol>
        <li><span class="step-num">1</span>Cliquez 📄 PDF 1 page (le planning se redessine en mode oversize, c'est attendu)</li>

    <section id="h-tips">
      <h3>⌨️ Astuces &amp; raccourcis</h3>
      <ul>
        <li><b>Vues 3 / 6 / 12 mois</b> : changez la granularité temporelle sans perdre vos données</li>
        <li><b>Ligne bleue verticale</b> : indique la date du jour (visible si elle tombe dans la fenêtre affichée)</li>
        <li><b>Mode sombre</b> : 🌙 Sombre — utile pour les écrans à faible luminosité</li>
        <li><b>Sauvegarde automatique</b> : chaque modification est enregistrée instantanément (vérifiez l'horodatage en bas du tiroir)</li>
        <li><b>Onglet JSON</b> : édition brute des données pour utilisateurs avancés (ne pas modifier sans backup au préalable via ⬇ Exporter JSON)</li>
        <li><b>Plusieurs plannings</b> : utilisez "Mes plannings" pour ne pas écraser un planning quand vous travaillez sur un autre</li>
      </ul>
      <div class="info">ℹ️ Toutes les données sont stockées <b>dans votre navigateur uniquement</b>. Si vous changez de poste ou de navigateur, exportez un JSON avant et réimportez sur le nouveau poste.</div>
    </section>

    <section id="h-responsables">
      <h3>👥 Responsables — workflow inversé (Session 4)</h3>
      <p><b>Session 4</b> : Nouvelle approche — au lieu d'assigner des responsables phase par phase, vous <b>assignez les projets/sous-projets aux responsables</b> de manière centralisée. Plus efficace, moins de clics !</p>

      <p><b>Étape 1 : Configurer les rôles (optionnel)</b></p>
      <ol>
        <li><span class="step-num">1</span>Allez à <b>✏️ Éditer</b> → onglet <b>"👥 Ressources"</b></li>
        <li><span class="step-num">2</span>Section <b>🏷️ Configuration des Rôles</b> — vous verrez 3 rôles par défaut : <i>AMOA</i>, <i>MOE Chef Projet</i>, <i>MOA Chef Projet</i></li>
        <li><span class="step-num">3</span>(Optionnel) Cliquez <b>➕ Nouveau rôle</b> pour ajouter des rôles personnalisés (ex. <i>Chef Produit</i>, <i>Prestataire</i>)</li>
      </ol>

      <p><b>Étape 2 : Créer les responsables</b></p>
      <ol>
        <li><span class="step-num">1</span>Section <b>👥 Gestion des Responsables</b> — Cliquez <b>➕ Nouveau responsable</b></li>
        <li><span class="step-num">2</span>Saisissez le <b>prénom</b> (ex. <i>Jean</i>, <i>Marie</i>)</li>
        <li><span class="step-num">3</span>Le responsable apparaît dans une fiche « collapsible » (▶)</li>
      </ol>

      <p><b>Étape 3 : Assigner les projets/sous-projets (cœur de Session 4)</b></p>
      <ol>
        <li><span class="step-num">1</span>Cliquez sur la fiche du responsable (▶) pour la <b>développer</b> (▼)</li>
        <li><span class="step-num">2</span><b>Champ « Rôle / Service »</b> : sélectionnez un rôle (AMOA, MOE, MOA, ou custom)</li>
        <li><span class="step-num">3</span><b>Multi-select « Projets assignés »</b> : sélectionnez <u>les PROJETS</u> (racine) auxquels ce responsable participe</li>
        <li><span class="step-num">4</span>Cliquez <b>Appliquer</b> pour confirmer</li>
        <li><span class="step-num">5</span><b>Sous-projets (si présents)</b> : un second multi-select « Sous-projets » apparaît. Par défaut, <u>TOUS</u> les sous-projets du projet parent sont sélectionnés.</li>
        <li><span class="step-num">6</span><b>Pour exclure</b> un sous-projet (ex. Jean responsable de MCO sauf 4.3.8) : décochez-le et cliquez <b>Appliquer</b></li>
      </ol>

      <p><b>Exemple : Jean responsable de MCO (sauf 4.3.8)</b></p>
      <ul>
        <li>Jean → Projets : <i>MCO</i> ✓ (tous les autres décochez)</li>
        <li>Jean → Sous-projets : 4.3.9 ✓, 4.3.12 ✓, 4.3.14 ✓, ... (4.3.8 ✗ décoché = exclu)</li>
        <li>Affichage : <b>« Jean - AMOA - MCO (4.3.9 / 4.3.12 / 4.3.14 ...) »</b></li>
        <li>➜ Tous les phases de 4.3.9, 4.3.12, 4.3.14 afficheront « Jean - AMOA » automatiquement</li>
      </ul>

      <p><b>Modèle d'héritage (important!)</b></p>
      <div class="info">
        ℹ️ <b>Si Jean est assigné au projet MCO :</b> Il couvre automatiquement <u>TOUS</u> ses sous-projets (4.3.8, 4.3.9, 4.3.12...) SAUF ceux explicitement exclus.<br>
        <b>Avantage</b> : Pas besoin de sélectionner chaque sous-projet un par un. Un seul clic « MCO » → 8 sous-projets couverts!
      </div>

      <p><b>Éditer un responsable</b></p>
      <ul>
        <li><b>✏️ Éditer nom</b> : changez le prénom (Jean → Jean D.)</li>
        <li><b>Rôle / Service</b> : modifiez le rôle (AMOA → MOE, etc.)</li>
        <li><b>Projets / Sous-projets</b> : mettez à jour les assignations dynamiquement (pas besoin de re-créer)</li>
      </ul>

      <p><b>Supprimer un responsable</b></p>
      <ul>
        <li>Cliquez <b>🗑️ Supprimer</b></li>
        <li>Confirmation affiche les projets qu'il couvraient</li>
        <li>Les phases resteront <b>sans responsable</b> (elles ne disparaissent pas!)</li>
      </ul>

      <div class="tip">💡 <b>Conseil</b> : Utilisez ce nouveau workflow pour gérer rapidement les équipes (ex. Jean = AMOA sur tous les MCO, Marie = MOE Chef Projet sur Lot 4). Une seule opération d'assignment, plus d'ajout phase-par-phase!</div>
    </section>

    <section id="h-resources">
      <h3>👥 Ressources — charge par responsable</h3>
      <p>Nouvel onglet <b>V17</b> qui montre la répartition de la charge entre les personnes responsables des phases.</p>

      <p><b>Comment renseigner un responsable</b> :</p>
      <ol>
        <li><span class="step-num">1</span>Ouvrez un sous-projet (cliquer ✏️ Éditer → onglet Sous-projets)</li>
        <li><span class="step-num">2</span>Cliquez sur <b>⚙ Plus d'options</b> au-dessus du tableau Phases</li>
        <li><span class="step-num">3</span>Sur la ligne de la phase concernée, remplissez le champ <b>Responsable</b> (ex. <i>Marie D.</i>, <i>Équipe Front</i>, <i>Jean L. + Pierre M.</i>)</li>
        <li><span class="step-num">4</span>Au fil de votre saisie, un menu d'auto-complétion propose les responsables déjà connus dans le planning (évite les fautes de frappe / doublons)</li>
      </ol>

      <p><b>Ce que l'onglet 👥 Ressources affiche</b> :</p>
      <ul>
        <li><b>Compteurs en tête</b> : nombre de responsables, phases assignées, phases sans responsable</li>
        <li><b>Graphique mensuel</b> : pour chaque responsable, une barre par mois représentant le nombre de phases actives ce mois-là. Surcharge (≥ 4 phases simultanées) signalée en orange.</li>
        <li><b>Détail dépliable</b> : sous chaque responsable, la liste complète des phases avec dates, statut, sous-projet concerné</li>
      </ul>

      <div class="tip">💡 Cliquez sur une ligne du détail pour ouvrir directement le sous-projet correspondant. Idéal pour drillera depuis une vue d'équipe vers l'édition.</div>

      <div class="info">ℹ️ Le responsable est un <b>champ libre</b> (texte). Pour une gestion plus rigoureuse à grande échelle, vous pourriez à terme normaliser via une liste centrale d'équipiers (évolution future possible).</div>
    </section>

    <section id="h-notes">
      <h3>📝 Notes &amp; commentaires</h3>
      <p>Nouveau dans <b>V18</b> : ajoutez des notes libres sur n'importe quelle phase ou jalon pour conserver le contexte métier (blocages, validations, alertes, points d'attention).</p>

      <p><b>Sur une phase</b> :</p>
      <ol>
        <li><span class="step-num">1</span>Ouvrir le sous-projet (✏️ Éditer)</li>
        <li><span class="step-num">2</span>Cliquer sur <b>⚙ Plus d'options</b> au-dessus du tableau Phases</li>
        <li><span class="step-num">3</span>Dans la ligne secondaire de la phase, remplir le champ <b>📝 Note / commentaire</b> (multi-ligne)</li>
      </ol>

      <p><b>Sur un jalon</b> :</p>
      <ol>
        <li><span class="step-num">1</span>Dans la colonne <b>Note</b> du tableau Jalons, cliquer sur l'icône <b>✎</b> (jalon sans note) ou <b>📝</b> (jalon avec note existante)</li>
        <li><span class="step-num">2</span>Saisir / modifier la note dans la fenêtre, puis valider (vider pour supprimer la note)</li>
      </ol>

      <p><b>Visibilité sur le Gantt</b> :</p>
      <ul>
        <li>Une <b>petite icône 📝</b> apparaît en haut à droite des pilules / chips qui ont une note</li>
        <li>Au <b>survol</b>, le tooltip affiche la note complète</li>
        <li>Dans <b>📊 Synthèse</b>, une section <b>« 📝 Notes &amp; commentaires »</b> liste toutes les notes triées par date</li>
        <li>La <b>recherche</b> globale inclut le texte des notes — utile pour retrouver « projet bloqué », « budget validé », etc.</li>
      </ul>

      <div class="tip">💡 Usage typique CoProj : noter sur chaque jalon clé l'état de validation client, les risques identifiés, ou les dépendances externes. Ces notes apparaissent ensuite dans le PDF (via le tooltip n'est pas exporté, mais l'icône 📝 sert d'indicateur visuel des points sensibles).</div>
    </section>

    <section id="h-a11y">
      <h3>♿ Accessibilité</h3>
      <p>L'application respecte le standard <b>WCAG 2.1 niveau AA</b> depuis la V16 (essentiel pour les missions services publics, banque, et clients réglementés).</p>

      <p><b>Navigation au clavier</b> : intégralement utilisable sans souris.</p>
      <ul>
        <li><span class="keys"><kbd>Tab</kbd></span> / <span class="keys"><kbd>Maj</kbd>+<kbd>Tab</kbd></span> : naviguer entre tous les contrôles</li>
        <li>Un <b>cadre bleu visible</b> apparaît autour du contrôle actif (focus-visible cohérent)</li>
        <li><span class="keys"><kbd>Espace</kbd></span> ou <span class="keys"><kbd>Entrée</kbd></span> : activer un bouton</li>
        <li><span class="keys"><kbd>Cmd</kbd>+<kbd>Z</kbd></span> / <span class="keys"><kbd>Cmd</kbd>+<kbd>Maj</kbd>+<kbd>Z</kbd></span> : annuler / refaire</li>
        <li><span class="keys"><kbd>P</kbd></span> : mode présentation</li>
        <li><span class="keys"><kbd>Échap</kbd></span> : quitter le mode présentation</li>
      </ul>

      <p><b>Lecteur d'écran</b> (VoiceOver Mac, NVDA Windows) :</p>
      <ul>
        <li>Tous les boutons icône-seule ont un <b>libellé vocal</b> (<code>aria-label</code>) — « Annuler », « Refaire », « Période précédente », etc.</li>
        <li>Les onglets du tiroir utilisent <code>role="tab"</code> et <code>aria-selected</code> — annoncés correctement</li>
        <li>Le tiroir d'édition annonce son ouverture/fermeture (<code>aria-hidden</code> dynamique)</li>
        <li>Les notifications (toasts) sont annoncées via <code>aria-live="polite"</code></li>
      </ul>

      <p><b>Animations &amp; mouvement</b> :</p>
      <ul>
        <li>L'animation rouge clignotante des phases « En retard » est limitée à <b>3 itérations</b> (au lieu d'infinies) puis se stabilise — évite la fatigue visuelle et les troubles vestibulaires</li>
        <li>Si vous activez <b>« Réduire les animations »</b> dans les préférences système (macOS : Réglages → Accessibilité → Affichage ; Windows : Paramètres → Accessibilité → Effets visuels), <b>toutes les animations sont désactivées</b> automatiquement</li>
      </ul>

      <p><b>Contraste &amp; lisibilité</b> :</p>
      <ul>
        <li>Texte principal : ratio <b>7.4:1</b> sur fond clair (dépasse AAA = 7:1)</li>
        <li>Texte secondaire (libellés discrets) : ratio <b>4.65:1</b> (passe AA = 4.5:1)</li>
        <li>Boutons primaires : bleu #2563eb sur fond blanc = ratio 7.3:1</li>
      </ul>

      <div class="tip">💡 Pour <b>vérifier la conformité</b> chez votre client final : utilisez l'extension Chrome <b>Lighthouse</b> ou <b>axe DevTools</b>, ou demandez un audit RGAA officiel.</div>
    </section>

    <section id="h-sync">
      <h3>🔄 Synchronisation & Collaboration</h3>

      <p><b>Vue d'ensemble</b> : L'application utilise un système automatique de synchronisation et de persistence pour permettre aux collègues de collaborer sur le même planning, même si les ordis ne sont pas allumés en permanence.</p>

      <h4>📦 Trois niveaux de stockage</h4>

/* V12: onglet Affichage — filtre multi-projets persisté */
function renderFilterTab() {
  const hidden = new Set(state.hiddenProjects || []);
  let html = `<div class="filter-tab">
    <p style="font-size:11px; color:var(--text-soft); margin: 0 0 10px 0">
      Cochez les projets à afficher dans le planning. La sélection est <b>persistée</b> (conservée au rechargement). L'export PDF utilise la sélection en cours.
    </p>
    <div class="filter-actions">
      <button class="btn" data-action="filter-all">☑ Tout cocher</button>
      <button class="btn" data-action="filter-none">☐ Tout décocher</button>
      <button class="btn" data-action="filter-invert">⇄ Inverser</button>
    </div>`;
  state.domains.forEach(domain => {
    const projects = state.projects.filter(p => p.domain === domain.id);
    if (projects.length === 0) return;
    const visibleCount = projects.filter(p => !hidden.has(p.id)).length;
    // V14 Lot 4a (#9) : état de la case mère du projet (= domaine)
    // - all checked → coché
    // - all unchecked → décoché
    // - mix → indéterminé (set via JS post-render)
    const allChecked = visibleCount === projects.length;
    const allUnchecked = visibleCount === 0;
    const masterState = allChecked ? 'all' : (allUnchecked ? 'none' : 'mixed');
    html += `<div class="domain-block" data-domain-block="${domain.id}">
      <h4>
        <span>${escapeHtml(domain.name)}</span>
        <span style="font-size:10px; color:var(--text-soft); font-weight:500">${visibleCount}/${projects.length} affichés</span>
      </h4>
      <div class="filter-row" style="background:rgba(59,130,246,0.06); border-radius:6px; padding:5px 8px; margin-bottom:6px">
        <input type="checkbox" data-action="toggle-domain" data-domain-id="${domain.id}" data-master-state="${masterState}" ${allChecked ? 'checked' : ''} id="flt-master-${domain.id}">
        <label for="flt-master-${domain.id}" style="font-weight:600; color:var(--today)">${allChecked ? '☑ Tout désélectionner' : (allUnchecked ? '☐ Tout sélectionner' : '◪ Tout sélectionner')} (${escapeHtml(domain.name)})</label>
      </div>`;
    projects.forEach(p => {
      const isVisible = !hidden.has(p.id);
      html += `<div class="filter-row" style="padding-left:16px">
        <input type="checkbox" data-action="toggle-project" data-project-id="${p.id}" ${isVisible ? 'checked' : ''} id="flt-${p.id}">
        <label for="flt-${p.id}">${escapeHtml(p.name)}${p.subtitle ? ` <span class="ms-count">— ${escapeHtml(p.subtitle)}</span>` : ''}</label>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

let _currentEditingRespId = null;

function ensureResponsableModal() {
  let modal = document.getElementById('modal-new-resp');
  if (!modal) {
    // Créer modale de création en dehors du drawer
    modal = document.createElement('div');
    modal.id = 'modal-new-resp';
    modal.className = 'modal';
    document.body.appendChild(modal);

    // Attacher click handler à la modale (une seule fois, pas recréé)
    modal.addEventListener('click', e => {
      // Fermer modale si clic sur le backdrop (en dehors modal-content)
      if (e.target === modal) {
        modal.classList.remove('open');
        return;
      }

      const actionBtn = e.target.closest('[data-action]');
      if (actionBtn) {
        const action = actionBtn.dataset.action;
        if (action === 'resp-create-confirm') {
          const name = document.getElementById('modal-resp-name')?.value?.trim();
          const role = document.getElementById('modal-resp-role')?.value || null;
          if (!name) {
            alert('Veuillez entrer un prénom');
            return;
          }
          const resp = {
            id: 'resp-' + Date.now(),
            name: name,
            role: role || null,
            assignedProjects: [],
            excludedSubprojects: []
          };
          state.responsables.push(resp);
          modal.classList.remove('open');
          saveState(); render(); renderDrawer();
        }
      }
    });
  }
  // Mettre à jour le contenu avec les rôles actuels
  modal.innerHTML = `
    <div class="modal-content">
      <h3>➕ Nouveau responsable</h3>
      <div class="resp-form-group">
        <label>Prénom</label>
        <input type="text" id="modal-resp-name" placeholder="Ex: Jean, Marie..." style="width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:12px;">
      </div>

        <label>Rôle / Service (optionnel)</label>
        <select id="modal-resp-role" style="width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:4px; font-size:12px;">
          <option value="">-- Aucun --</option>
          ${(state.roles || []).map(r => `<option value="${r.id}">${escapeHtml(r.name)}</option>`).join('')}
        </select>
      </div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="document.getElementById('modal-new-resp').classList.remove('open')">Annuler</button>
        <button class="btn-primary" data-action="resp-create-confirm">Créer</button>
      </div>
    </div>
  `;
}

/* Modale d'édition d'un responsable existant */
function ensureEditRespModal() {
  let modal = document.getElementById('modal-edit-resp');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-edit-resp';
    modal.className = 'modal';
    document.body.appendChild(modal);

    modal.addEventListener('click', e => {
      if (e.target === modal) {
        modal.classList.remove('open');
        _currentEditingRespId = null;
        return;
      }

      const actionBtn = e.target.closest('[data-action]');
      if (actionBtn) {
        const action = actionBtn.dataset.action;
        if (action === 'resp-edit-confirm') {
          const name = document.getElementById('modal-edit-resp-name')?.value?.trim();
          const role = document.getElementById('modal-edit-resp-role')?.value || null;
          const resp = getResponsableById(_currentEditingRespId);
          if (!resp || !name) {
            alert('Erreur: prénom vide');
            return;
          }
          resp.name = name;
          resp.role = role;
          modal.classList.remove('open');
          _currentEditingRespId = null;
          saveState(); render(); renderDrawer();
        }
      }
    });
  }

  const resp = getResponsableById(_currentEditingRespId);
  if (!resp) return;

  modal.innerHTML = `
    <div class="modal-content">
      <h3>✏️ Éditer responsable</h3>
      <div class="resp-form-group">
        <label>Prénom</label>

      </div>

}

                        ✓ <strong>${subprojsIncluded.length} Sous-projet(s) inclus${subprojsInDomain.length > 0 ? `/${subprojsInDomain.length}` : ''}</strong>
                        ${subprojsIncluded.length > 0 ? `<br><em style="color:var(--text-soft);">${subprojsIncluded.map(sp => escapeHtml(sp.name)).join(', ')}</em>` : ''}
