                      </div>
                    </div>`;
                  }).join('')}
                </div>
              `}
            </div>

            <div class="resp-form-group">
              <label>Rôle / Service</label>
              <select data-role-select data-resp-id="${resp.id}" data-action="resp-edit-role">
                <option value="">-- Aucun --</option>
                ${(state.roles || []).map(r => `<option value="${r.id}" ${resp.role === r.id ? 'selected' : ''}>${escapeHtml(r.name)}</option>`).join('')}
              </select>
            </div>

            <div class="resp-form-group">
              <label style="font-weight:bold; color:var(--text);">1️⃣ Projets à assigner</label>
              <p style="font-size:10px; color:var(--text-soft); margin:0 0 6px 0;">Sélectionnez le(s) projet(s) (MCO, CEOS, CFPI, etc.)</p>
              <select multiple data-projects-select data-resp-id="${resp.id}" style="min-height:80px;">
                ${(state.domains || []).map(d => `
                  <option value="${d.id}" ${resp.assignedProjects.includes(d.id) ? 'selected' : ''}>${escapeHtml(d.name)}</option>
                `).join('')}
              </select>
              <button data-action="assign-projects" data-resp-id="${resp.id}" style="margin-top:6px; padding:6px 8px; font-size:11px; background:var(--border); border:none; border-radius:4px; cursor:pointer;">✓ Appliquer et afficher les Sous-projets</button>
            </div>

            ${resp.assignedProjects.length > 0 ? `
              <div class="resp-form-group">
                <label style="font-weight:bold; color:var(--text);">2️⃣ Sous-projets à inclure</label>
                <p style="font-size:10px; color:var(--text-soft); margin:0 0 6px 0;">Cochez/décochez les Sous-projets (4.3.12, 4.3.13, etc.) pour les inclure/exclure</p>
                <select multiple data-subprojects-select data-resp-id="${resp.id}" style="min-height:100px;">
                  ${(() => {
                    // Afficher les sous-projets (projets avec parentId) des domaines assignés, groupés par domaine
                    const subprojsInAssignedDomains = (state.projects || [])
                      .filter(p => p.parentId && resp.assignedProjects.includes(p.parentId))
                      .sort((a, b) => {
                        // Trier par domaine puis par nom
                        const adom = state.domains.find(d => d.id === a.parentId)?.name || '';
                        const bdom = state.domains.find(d => d.id === b.parentId)?.name || '';
                        return adom.localeCompare(bdom) || (a.name || '').localeCompare(b.name || '');
                      });

                    return subprojsInAssignedDomains.map(subproj => {
                      const domain = state.domains.find(d => d.id === subproj.parentId);
                      const isExcluded = resp.excludedSubprojects.includes(subproj.id);
                      return `<option value="${subproj.id}" ${!isExcluded ? 'selected' : ''}>${domain ? domain.name + ' • ' : ''}${escapeHtml(subproj.name)}</option>`;
                    }).join('');
                  })()}
                </select>
                <button data-action="assign-subprojects" data-resp-id="${resp.id}" style="margin-top:6px; padding:6px 8px; font-size:11px; background:var(--border); border:none; border-radius:4px; cursor:pointer;">✓ Appliquer et enregistrer</button>
              </div>
            ` : ''}

            ${resp.excludedSubprojects.length > 0 ? `
              <div style="padding:8px; background:var(--border-soft); border-radius:4px; font-size:11px; color:var(--text-soft);">
                <strong>Exclusions:</strong> ${resp.excludedSubprojects.map(id => {
                  const p = state.projects.find(x => x.id === id);
                  return p ? p.name : id;
                }).join(', ')}
              </div>
            ` : ''}
          </div>
        </div>
        `;
      }).join('')}
    </div>

    <!-- KPIs -->
    <div class="kpi-grid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); margin-top: 20px;">
      <div class="kpi info"><div class="k-val">${state.responsables?.length || 0}</div><div class="k-lab">Responsables</div></div>
      <div class="kpi ok"><div class="k-val">${state.roles?.length || 3}</div><div class="k-lab">Rôles configurés</div></div>
    </div>

    <div class="info" style="font-size:10.5px; color:var(--text-soft); background: var(--bg); padding: 8px 10px; border-radius: 6px; margin-top: 14px;">
      ℹ️ <b>Workflow Session 4:</b> 1) Créez des responsables, 2) Assignez-les à des projets/sous-projets, 3) Les responsables apparaissent automatiquement sur leurs phases assignées. Vous n'avez plus besoin de les ajouter phase par phase.
    </div>
  </div>`;
  return html;
}

/* V12 / V13.7 / V14 : champs numériques (px / %) à parser comme float, vide => suppression */
const NUM_FIELDS = new Set([
  'fontMult','heightMult','pillFontPx','pillHeightPx',
  'titleFontMult','titleFontPx','subtitleFontMult','subtitleFontPx',
  'fontPx','heightPx', // V13.7 : override police/hauteur au niveau phase
  'progress'           // V14 Lot 1 : avancement % par phase
]);
const COLOR_FIELDS = new Set(['bgColor','textColor','seedColor','bgColorAlt','strongColor','color','fgColor']);

function setOrDelete(obj, field, value) {
  if (value === '' || value === null || value === undefined) delete obj[field];
  else if (NUM_FIELDS.has(field)) {
    const n = parseFloat(value); if (!isNaN(n) && n > 0) obj[field] = n; else delete obj[field];
  }
  else obj[field] = value;
}

/* V13: stocker les références des handlers pour pouvoir les détacher
   et éviter l'accumulation à chaque renderDrawer() (clic = N actions au lieu de 1). */
let _drawerHandlers = null;

function attachDrawerHandlers() {
  const body = document.getElementById('drawer-body');
  if (_drawerHandlers) {
    body.removeEventListener('input', _drawerHandlers.onChange);
    body.removeEventListener('change', _drawerHandlers.onChange);
    body.removeEventListener('click', _drawerHandlers.onClick);
    _drawerHandlers = null;
  }
  // V14 Lot 4a (#9) : appliquer l'état indéterminé aux cases mères du filtre
  body.querySelectorAll('input[data-action="toggle-domain"][data-master-state="mixed"]').forEach(cb => {
    cb.indeterminate = true;
  });

  const onChange = e => {
    const t = e.target;
    // V13 : renommer un planning depuis l'onglet "Mes plannings"
    if (t.dataset.action === 'pl-rename') {
      const row = t.closest('[data-pl-id]');
      if (!row) return;
      const id = row.dataset.plId;
      const idx = getPlanningsIndex();
      const e2 = idx.find(p => p.id === id);
      if (e2) { e2.name = t.value.trim() || e2.name; e2.updatedAt = Date.now(); setPlanningsIndex(idx); }
      const s = document.getElementById('save-status');
      if (s && id === currentPlanningId) s.textContent = '💾 ' + e2.name + ' — ' + new Date().toLocaleTimeString('fr-FR');
      return;
    }
    if (!t.dataset.field) return;
    const field = t.dataset.field;
    let value = t.value;

    // V12: synchroniser color picker <-> texte hex
    if (t.type === 'color' || (t.type === 'text' && COLOR_FIELDS.has(field) && /^#?[0-9a-fA-F]{3,8}$/.test(value))) {
      if (t.type === 'text' && value && !value.startsWith('#')) value = '#' + value;
    }

    if (activeTab === 'projects') {
      const projDiv = t.closest('[data-project-idx]');
      if (!projDiv) return;
      const pIdx = parseInt(projDiv.dataset.projectIdx);
      const p = state.projects[pIdx];
      const phaseRow = t.closest('[data-phase-idx]');
      const msRow = t.closest('[data-ms-id]');
      if (phaseRow) {
        const phase = p.phases[parseInt(phaseRow.dataset.phaseIdx)];
        setOrDelete(phase, field, value);
        // V14 Lot 1 : auto-tri si on a modifié une date
        if (field === 'start' || field === 'end') autoSortProjectItems(p);
      } else if (msRow) {
        const ms = p.milestones.find(m => m.id === msRow.dataset.msId);
        if (ms) {
          setOrDelete(ms, field, value);
          // FIX: Si on modifie manuellement date/label/type d'un jalon, marquer comme non-généré par cadence
          if (field === 'date' || field === 'label' || field === 'type') {
            ms.fromCadence = false;
          }
          if (field === 'date') {
            autoSortProjectItems(p);
          }
        }
      } else {
        setOrDelete(p, field, value);
      }
      // Synchroniser le champ texte du color picker à côté
      if (t.type === 'color') {
        const sibling = t.parentElement.querySelector(`input[type="text"][data-field="${field}"]`);
        if (sibling) sibling.value = value;
      }
    } else if (activeTab === 'domains') {
      const row = t.closest('[data-domain-idx]');
      if (!row) return;
      const d = state.domains[parseInt(row.dataset.domainIdx)];
      setOrDelete(d, field, value);
      if (t.type === 'color') {
        const sibling = t.parentElement.querySelector(`input[type="text"][data-field="${field}"]`);
        if (sibling) sibling.value = value;
      }
    } else if (activeTab === 'calendar' || activeTab === 'settings') {
      // V14 Lot 2 / 4c : périodes fermées (calendar) + cadence + types perso + auto-close (settings)
      const cpRow = t.closest('[data-cp-idx]');
      const domCadRow = t.closest('[data-domain-cad-idx]');
      const cptRow = t.closest('[data-cpt-idx]'); // V14 Lot 4a : types phase custom
      const cmtRow = t.closest('[data-cmt-idx]'); // V14 Lot 4a : types jalon custom
      if (cpRow) {
        const cp = state.closedPeriods[parseInt(cpRow.dataset.cpIdx)];
        cp[field] = value;
        saveGlobalConfig(); // V14 Lot 4g v2 : période fermée globale
      } else if (domCadRow && field.startsWith('cadence.')) {
        const dom = state.domains[parseInt(domCadRow.dataset.domainCadIdx)];
        dom.cadence = dom.cadence || {};
        const subField = field.split('.')[1];
        const num = parseFloat(value);
        if (isNaN(num)) delete dom.cadence[subField];
        else dom.cadence[subField] = num;
        if (Object.keys(dom.cadence).length === 0) delete dom.cadence;
      } else if (cptRow) {
        const ct = state.customPhaseTypes[parseInt(cptRow.dataset.cptIdx)];
        if (field === 'id') ct.id = value.replace(/[^a-zA-Z0-9_-]/g, '').toLowerCase() || 'type';
        else ct[field] = value;
        saveGlobalTypes(); // V14 Lot 4c : sync bibliothèque globale
      } else if (cmtRow) {
        const ct = state.customMilestoneTypes[parseInt(cmtRow.dataset.cmtIdx)];
        if (field === 'id') ct.id = value.replace(/[^a-zA-Z0-9_-]/g, '').toLowerCase() || 'jalon';
        else ct[field] = value;
        saveGlobalTypes(); // V14 Lot 4c : sync bibliothèque globale
      } else if (field === 'autoCloseAfterMepDays') {
        // V14 Lot 4b (#7) / Lot 4g v2 : seuil global à tous les plannings
        const num = parseInt(value);
        state.autoCloseAfterMepDays = isNaN(num) ? 30 : Math.max(0, Math.min(365, num));
        saveGlobalConfig(); // V14 Lot 4g v2
      }
    }
    saveState();
    render();
  };
  body.addEventListener('input', onChange);
  body.addEventListener('change', onChange);

  const onClick = e => {
    // Session 4 : toggleCard pour les cartes responsables/rôles
    // BUT: n'activer le toggle QUE si on clique sur le header, pas sur les inputs/buttons du contenu
    const cardHeader = e.target.closest('.resp-card-header');
    if (cardHeader && !e.target.closest('select, input, button, [data-action]')) {
      const card = cardHeader.closest('.resp-card');
      if (card) {
        const content = card.querySelector('.resp-card-content');
        const toggle = cardHeader.querySelector('.toggle');
        if (content && toggle) {
          content.classList.toggle('expanded');
          toggle.textContent = content.classList.contains('expanded') ? '▼' : '▶';
          e.preventDefault();
          return;
        }
      }
    }

    // V14.5 fix : chercher l'ancêtre porteur de data-action (sinon clic sur enfant span/icon ignoré)
    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    const action = actionEl.dataset.action;
    if (!action) return;
    e.preventDefault();

    // ===== Onglet Synthèse (V14 Lot 3) — clic sur un item ouvre le projet en édition =====
    if (action === 'goto-project') {
      const li = actionEl.closest('[data-project-id]');
      if (li) editProject(li.dataset.projectId);
      return;
    }
    // V14 Lot 4d : navigation entre sous-onglets de Paramètres
    if (action === 'settings-subtab') {
      activeSettingsSubtab = actionEl.dataset.subtab || 'cadence';
      renderDrawer();
      return;
    }
    // V14 Lot 4b (#2) : KPI cliquable → scroll vers la section + flash de surbrillance
    if (action === 'kpi-goto') {
      const target = actionEl.dataset.target;
      const sectionEl = document.getElementById('syn-section-' + target);
      if (sectionEl) {
        sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        sectionEl.classList.remove('kpi-target-flash'); // reset si déjà flashé
        // Force reflow pour redéclencher l'animation
        void sectionEl.offsetWidth;
        sectionEl.classList.add('kpi-target-flash');
        setTimeout(() => sectionEl.classList.remove('kpi-target-flash'), 1700);
      }
      return;
    }
    // V14 Lot 4a (#6) : toggle ligne secondaire (Statut / % / Police / Hauteur) — n'altère pas le state
    if (action === 'toggle-advanced') {
      const projDiv = actionEl.closest('.project-edit');
      if (projDiv) projDiv.classList.toggle('show-advanced');
      return;
    }

    // ===== Onglet Calendrier (V14 Lot 2 / Lot 4g v2 globaux) =====
    if (action === 'toggle-holidays') {
      state.holidaysEnabled = state.holidaysEnabled === false ? true : false;
      saveGlobalConfig(); // V14 Lot 4g v2 : préférence globale
      saveState(); render(); renderDrawer(); return;
    }
    if (action === 'add-closed-period') {
      state.closedPeriods = state.closedPeriods || [];
      state.closedPeriods.push({ label: 'Nouvelle période', start: '', end: '' });
      saveGlobalConfig(); // V14 Lot 4g v2
      saveState(); render(); renderDrawer(); return;
    }
    if (action === 'delete-closed-period') {
      const i = parseInt(actionEl.closest('[data-cp-idx]').dataset.cpIdx);
      state.closedPeriods.splice(i, 1);
      saveGlobalConfig(); // V14 Lot 4g v2
      saveState(); render(); renderDrawer(); return;
    }
    // V14 Lot 4a (#5) / V14 Lot 4c : types personnalisés (avec sync bibliothèque globale)
    if (action === 'add-phase-type') {
      state.customPhaseTypes = state.customPhaseTypes || [];
      state.customPhaseTypes.push({ id: 'type'+Date.now().toString(36), label: 'Nouveau type', color: '#3b82f6' });
      saveGlobalTypes();
      saveState(); render(); renderDrawer(); return;
    }
    if (action === 'delete-phase-type') {
      const i = parseInt(actionEl.closest('[data-cpt-idx]').dataset.cptIdx);
      const t = state.customPhaseTypes[i];
      if (!confirm('Supprimer le type de phase « ' + (t?.label || t?.id || '?') + ' » ? Cette suppression est globale (tous vos plannings perdent ce type ; les phases existantes de ce type restent mais perdent leur couleur dédiée).')) return;
      state.customPhaseTypes.splice(i, 1);
      saveGlobalTypes();
      saveState(); render(); renderDrawer(); return;
    }
    if (action === 'add-milestone-type') {
      state.customMilestoneTypes = state.customMilestoneTypes || [];
      state.customMilestoneTypes.push({ id: 'jalon'+Date.now().toString(36), label: 'Nouveau jalon', color: '#7c3aed' });
      saveGlobalTypes();
      saveState(); render(); renderDrawer(); return;
    }
    if (action === 'delete-milestone-type') {
      const i = parseInt(actionEl.closest('[data-cmt-idx]').dataset.cmtIdx);
      const t = state.customMilestoneTypes[i];
      if (!confirm('Supprimer le type de jalon « ' + (t?.label || t?.id || '?') + ' » ? Cette suppression est globale (tous vos plannings perdent ce type).')) return;
      state.customMilestoneTypes.splice(i, 1);
      saveGlobalTypes();
      saveState(); render(); renderDrawer(); return;
    }

    if (action === 'generate-cadence') {
      const projDiv = e.target.closest('[data-project-idx]');
      if (!projDiv) return;
      const proj = state.projects[parseInt(projDiv.dataset.projectIdx)];
      const ok = regenerateCciCadenceMilestones(proj);
      if (!ok) { toast('❌ Aucune phase « Développement » avec date de fin sur ce projet'); return; }
      saveState(); render(); renderDrawer();
      toast('✨ Cadence CCI générée pour : ' + proj.name);
      return;
    }

    // ===== Onglet Mes plannings =====
    if (action === 'pl-new') {
      const source = e.target.dataset.source;
      const nameInput = document.getElementById('new-pl-name');
      const name = (nameInput && nameInput.value.trim()) ||
        ({blank:'Nouveau planning vide', blank_mono:'Nouveau (mono-projet)', blank_multi:'Nouveau (multi-projet)', cci2026:'Planning CCI 2026', duplicate:'Copie de ' + getActivePlanningName()}[source] || 'Nouveau planning');
      let data;
      if (source === 'blank') {
        data = { domains: [{id:'projet', name:'Projet', seedColor:'#3b82f6'}], projects: [], hiddenProjects: [] };
      } else if (source === 'duplicate') {
        data = JSON.parse(JSON.stringify(state));
      } else if (source === 'cci2026') {
        data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      } else if (TEMPLATES[source]) {
        // V14 Lot 4c : utilise build() (data fraîche depuis aujourd'hui) si dispo, sinon data statique
        data = TEMPLATES[source].build ? TEMPLATES[source].build() : JSON.parse(JSON.stringify(TEMPLATES[source].data));
      } else {
        return;
      }
      ensurePlanningDataShape(data);
      const id = newPlanningId();
      writePlanning(id, data);
      const idx = getPlanningsIndex();
      idx.push({ id, name, updatedAt: Date.now() });
      setPlanningsIndex(idx);
      setActivePlanning(id);
      render(); renderDrawer(); toast('✅ Planning créé : ' + name); return;
    }
    if (action === 'pl-load') {
      const id = e.target.closest('[data-pl-id]').dataset.plId;
      if (setActivePlanning(id)) { render(); renderDrawer(); toast('▶ Chargé : ' + getActivePlanningName()); }
      return;
    }
    if (action === 'pl-duplicate') {
      const srcId = e.target.closest('[data-pl-id]').dataset.plId;
      const srcData = readPlanning(srcId);
      if (!srcData) return;
      const idx = getPlanningsIndex();
      const src = idx.find(p => p.id === srcId);
      const id = newPlanningId();
      const name = 'Copie de ' + (src ? src.name : 'planning');
      writePlanning(id, JSON.parse(JSON.stringify(srcData)));
      idx.push({ id, name, updatedAt: Date.now() });
      setPlanningsIndex(idx);
      renderDrawer(); toast('⎘ Dupliqué : ' + name); return;
    }
    if (action === 'pl-delete') {
      const id = e.target.closest('[data-pl-id]').dataset.plId;
      const idx = getPlanningsIndex();
      if (idx.length <= 1) { toast('❌ Impossible de supprimer le dernier planning'); return; }
      const item = idx.find(p => p.id === id);
      if (!confirm('Supprimer « ' + (item ? item.name : 'ce planning') + ' » ?\n\nCette action est irréversible (sauf via Annuler ↶ juste après).')) return;
      deletePlanningStorage(id);
      // Si on supprime l'actif, basculer sur un autre
      if (id === currentPlanningId) {
        const remaining = getPlanningsIndex();
        setActivePlanning(remaining[0].id);
      }
      render(); renderDrawer(); toast('🗑 Supprimé'); return;
    }
    if (action === 'pl-export-json') {
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Planning_${getActivePlanningName().replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); toast('✅ JSON exporté'); return;
    }
    if (action === 'pl-import-json') {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.json';
      inp.onchange = ev => {
        const file = ev.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = re => {
          try {
            const parsed = ensurePlanningDataShape(JSON.parse(re.target.result));
            if (!parsed) throw new Error('Structure invalide');
            if (!confirm('Remplacer le planning actif « ' + getActivePlanningName() + ' » par le contenu de ce JSON ?')) return;
            state = parsed; saveState(); render(); renderDrawer(); toast('✅ JSON importé');
          } catch(err) { toast('❌ ' + err.message); }
        };
        reader.readAsText(file);
      };
      inp.click(); return;
    }
    if (action === 'pl-export-html') {
      exportStandaloneHtml(); return;
    }

    // ===== Onglet Affichage (filtre) =====
    if (action === 'toggle-project') {
      const id = e.target.dataset.projectId;
      const set = new Set(state.hiddenProjects || []);
      if (e.target.checked) set.delete(id); else set.add(id);
      state.hiddenProjects = [...set];
      saveState(); render(); renderDrawer(); return;
    }
    if (action === 'toggle-domain') {
      // V14 Lot 4a (#9) : case mère projet — bascule l'affichage de TOUS les sous-projets de ce projet
      const domainId = e.target.dataset.domainId;
      const masterState = e.target.dataset.masterState; // 'all', 'none', 'mixed'
      const set = new Set(state.hiddenProjects || []);
      const subProjects = state.projects.filter(p => p.domain === domainId);
      if (masterState === 'all') {
        // tous visibles → tout masquer
        subProjects.forEach(p => set.add(p.id));
      } else {
        // none ou mixed → tout afficher
        subProjects.forEach(p => set.delete(p.id));
      }
      state.hiddenProjects = [...set];
      saveState(); render(); renderDrawer(); return;
    }
    if (action === 'filter-all') { state.hiddenProjects = []; saveState(); render(); renderDrawer(); return; }
    if (action === 'filter-none') { state.hiddenProjects = state.projects.map(p => p.id); saveState(); render(); renderDrawer(); return; }
    if (action === 'filter-invert') {
      const set = new Set(state.hiddenProjects || []);
      state.hiddenProjects = state.projects.filter(p => !set.has(p.id)).map(p => p.id);
      saveState(); render(); renderDrawer(); return;
    }

    // ===== Onglet Modèles =====
    if (action === 'tpl-export') {
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Planning_modele_${new Date().toISOString().slice(0,10)}.json`;
      a.click(); toast('✅ Modèle exporté'); return;
    }
    if (action === 'tpl-import') {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = '.json';
      inp.onchange = ev => {
        const file = ev.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = re => {
          try {
            const parsed = JSON.parse(re.target.result);
            if (!parsed.domains || !parsed.projects) throw new Error('Structure invalide');
            if (!Array.isArray(parsed.hiddenProjects)) parsed.hiddenProjects = [];
            if (!confirm('Charger ce modèle ? Les données actuelles seront remplacées.')) return;
            state = parsed; saveState(); render(); renderDrawer(); toast('✅ Modèle importé');
          } catch(err) { toast('❌ Fichier JSON invalide : ' + err.message); }
        };
        reader.readAsText(file);
      };
      inp.click(); return;
    }
    if (action === 'tpl-load') {
      const tpl = actionEl.dataset.tpl;
      if (!confirm(`Charger le modèle « ${tpl === 'cci2026' ? 'CCI 2026' : TEMPLATES[tpl]?.name} » ? Les données actuelles seront remplacées.`)) return;
      if (tpl === 'cci2026') {
        state = JSON.parse(JSON.stringify(DEFAULT_DATA));
      } else if (TEMPLATES[tpl]) {
        // V14 Lot 4c : build() pour data fraîche
        state = TEMPLATES[tpl].build ? TEMPLATES[tpl].build() : JSON.parse(JSON.stringify(TEMPLATES[tpl].data));
      }
      if (!Array.isArray(state.hiddenProjects)) state.hiddenProjects = [];
      mergeGlobalTypesInto(state); // V14 Lot 4c : injecter aussi les types globaux
      saveState(); render(); renderDrawer(); toast('✅ Modèle chargé'); return;
    }

    // ===== Réinit. couleur =====
    if (action === 'clear-color') {
      const target = e.target.dataset.target;
      const projDiv = e.target.closest('[data-project-idx]');
      const domDiv = e.target.closest('[data-domain-idx]');
      const phaseRow = e.target.closest('[data-phase-idx]');
      const msRow = e.target.closest('[data-ms-id]');
      if (phaseRow && projDiv) {
        const p = state.projects[parseInt(projDiv.dataset.projectIdx)];
        delete p.phases[parseInt(phaseRow.dataset.phaseIdx)][target];
      } else if (msRow && projDiv) {
        const p = state.projects[parseInt(projDiv.dataset.projectIdx)];
        const ms = p.milestones.find(m => m.id === msRow.dataset.msId);
        if (ms) delete ms[target];
      } else if (projDiv) {
        delete state.projects[parseInt(projDiv.dataset.projectIdx)][target];
      } else if (domDiv) {
        delete state.domains[parseInt(domDiv.dataset.domainIdx)][target];
      }
      saveState(); render(); renderDrawer(); return;
    }

    // ===== Projets / phases / jalons =====
    if (action === 'add-project') {
      // V14 Lot 4c / 4d : nouveau sous-projet pré-rempli avec structure CCI standard,
      // ajouté au DERNIER projet existant (= bas de liste éditeur ET Gantt) — cohérent avec l'attente UX.
      const lastSp = state.projects[state.projects.length - 1];
      const dom = (lastSp && lastSp.domain) || state.domains[state.domains.length - 1]?.id || state.domains[0]?.id || 'mco';
      state.projects.push(buildStandardCciSubProject(dom, 'Nouveau sous-projet'));
    } else if (action === 'delete-project') {
      const i = parseInt(e.target.closest('[data-project-idx]').dataset.projectIdx);
      if (confirm('Supprimer « ' + state.projects[i].name + ' » ?\n\nCette action est irréversible (sauf via Annuler ↶ juste après).')) state.projects.splice(i, 1);
      else return;
    } else if (action === 'move-project-up' || action === 'move-project-down') {
      // V14 Lot 4a (#10) : réordonnancement des sous-projets dans state.projects
      const i = parseInt(e.target.closest('[data-project-idx]').dataset.projectIdx);
      const dir = action === 'move-project-up' ? -1 : 1;
      const j = i + dir;
      if (j < 0 || j >= state.projects.length) return; // bord atteint
      const tmp = state.projects[i];
      state.projects[i] = state.projects[j];
      state.projects[j] = tmp;
    } else if (action === 'add-phase') {
      const i = parseInt(e.target.closest('[data-project-idx]').dataset.projectIdx);
      const proj = state.projects[i];
      // FIX: Créer la nouvelle phase APRÈS la dernière phase existante (pas en janvier)
      const lastPhase = proj.phases && proj.phases.length > 0 ? proj.phases[proj.phases.length - 1] : null;
      let newStart = '2026-08-04'; // Défaut si pas de phase existante
      let newEnd = '2026-08-18';
      if (lastPhase && lastPhase.end) {
        const lastEnd = new Date(lastPhase.end + 'T00:00:00Z');
        lastEnd.setUTCDate(lastEnd.getUTCDate() + 1); // Commencer le lendemain
        newStart = lastEnd.getUTCFullYear() + '-' + String(lastEnd.getUTCMonth()+1).padStart(2,'0') + '-' + String(lastEnd.getUTCDate()).padStart(2,'0');
        const endDate = new Date(lastEnd);
        endDate.setUTCDate(endDate.getUTCDate() + 14); // Durée par défaut 14 jours
        newEnd = endDate.getUTCFullYear() + '-' + String(endDate.getUTCMonth()+1).padStart(2,'0') + '-' + String(endDate.getUTCDate()).padStart(2,'0');
      }
      proj.phases.push({type:'recette', start:newStart, end:newEnd, label:''}); // type:'recette' par défaut au lieu de 'cadrage'
      // NE PAS appeler autoSortProjectItems() car cela change les indices et casse le formulaire
    } else if (action === 'delete-phase') {
      const pIdx = parseInt(e.target.closest('[data-project-idx]').dataset.projectIdx);
      state.projects[pIdx].phases.splice(parseInt(e.target.closest('[data-phase-idx]').dataset.phaseIdx), 1);
    } else if (action === 'add-milestone') {
      const i = parseInt(e.target.closest('[data-project-idx]').dataset.projectIdx);
      const proj = state.projects[i];
      state.projects[i].milestones.push({
        id: 'ms-' + proj.id + '-' + Date.now(),
        type:'mep',
        date:'2026-06-01',
        label:'Nouveau jalon'
      });
      autoSortProjectItems(state.projects[i]); // V14 Lot 1
    } else if (action === 'delete-milestone') {
      const pIdx = parseInt(actionEl.closest('[data-project-idx]').dataset.projectIdx);
      const msId = actionEl.closest('[data-ms-id]').dataset.msId;
      const mIdx = state.projects[pIdx].milestones.findIndex(m => m.id === msId);
      if (mIdx !== -1) state.projects[pIdx].milestones.splice(mIdx, 1);
    } else if (action === 'edit-ms-note') {
      // V18 : édition de la note d'un jalon via prompt natif (simple et accessible)
      const pIdx = parseInt(actionEl.closest('[data-project-idx]').dataset.projectIdx);
      const msId = actionEl.closest('[data-ms-id]').dataset.msId;
      const ms = state.projects[pIdx].milestones.find(m => m.id === msId);
      if (!ms) return;
      const current = ms.note || '';
      const next = prompt('📝 Note pour le jalon « ' + (ms.label || ms.type) + ' » :\n(laisser vide pour supprimer la note)', current);
      if (next === null) return; // Annulé
      if (next.trim() === '') delete ms.note;
      else ms.note = next.trim();
    } else if (action === 'move-domain-up' || action === 'move-domain-down') {
      // V14 Lot 4a fix #5 : réordonnancement des projets globaux dans state.domains
      const i = parseInt(actionEl.closest('[data-domain-idx]').dataset.domainIdx);
      const dir = action === 'move-domain-up' ? -1 : 1;
      const j = i + dir;
      if (j < 0 || j >= state.domains.length) return;
      const tmp = state.domains[i];
      state.domains[i] = state.domains[j];
      state.domains[j] = tmp;
    } else if (action === 'add-domain') {
      state.domains.push({id:'dom'+Date.now(), name:'Nouveau projet', seedColor:'#3b82f6'});
    } else if (action === 'delete-domain') {
      const i = parseInt(e.target.closest('[data-domain-idx]').dataset.domainIdx);
      if (state.projects.some(p => p.domain === state.domains[i].id)) {
        alert('Ce domaine est utilisé par des projets.'); return;
      }
      state.domains.splice(i, 1);

    // V19 C : Gestion des responsables
    /* Session 4 : Rôles CRUD */
    } else if (action === 'role-new') {
      const name = prompt('Nouveau rôle (ex: Chef Produit):');
      if (!name || !name.trim()) return;
      const role = {
        id: 'role-' + Date.now(),
        name: name.trim(),
        color: '#6b7280'
      };
      state.roles.push(role);

    } else if (action === 'role-edit') {
      const roleId = actionEl.dataset.roleId;
      const role = getRoleById(roleId);
      if (!role) return;
      const newName = prompt('Éditer le rôle:', role.name);
      if (newName && newName.trim()) {
        role.name = newName.trim();
      }

    } else if (action === 'role-delete') {
      const roleId = actionEl.dataset.roleId;
      const role = getRoleById(roleId);
      if (!role) return;
      // Compter combien de responsables utilisent ce rôle
      const count = (state.responsables || []).filter(r => r.role === roleId).length;
      let msg = `Supprimer le rôle "${role.name}" ?\n\n`;
      if (count > 0) {
        msg += `⚠️ Utilisé par ${count} responsable(s). Ils perdront leur rôle.\n\n`;
      }
      if (!confirm(msg + 'Confirmer ?')) return;
      state.roles = state.roles.filter(r => r.id !== roleId);
      (state.responsables || []).forEach(r => {
        if (r.role === roleId) r.role = null;
      });

    /* Session 4 : Responsables - nouvelle structure avec héritage */
    } else if (action === 'resp-new') {
      console.log('✅ resp-new handler called');
      const modal = document.getElementById('modal-new-resp');
      console.log('Modal trouvé:', modal ? '✅' : '❌');
      if (modal) {
        document.getElementById('modal-resp-name').value = '';
        document.getElementById('modal-resp-role').value = '';
        modal.classList.add('open');
        console.log('✅ Modal ouvert, class open ajoutée');
      } else {
        console.log('❌ Modal NOT FOUND - id="modal-new-resp"');
      }

    } else if (action === 'resp-create-confirm') {
      const name = document.getElementById('modal-resp-name')?.value?.trim();
      const role = document.getElementById('modal-resp-role')?.value || null;
      if (!name) {
        alert('Veuillez entrer un prénom');
        return;
      }
      const resp = {
        id: 'resp-' + Date.now(),
        name: name,
        role: role || null,
        assignedProjects: [],
        excludedSubprojects: []
      };
      state.responsables.push(resp);
      const modal = document.getElementById('modal-new-resp');
      if (modal) modal.classList.remove('open');
      saveState(); render(); renderDrawer();

    } else if (action === 'resp-edit-name') {
      const respId = actionEl.dataset.respId;
      const resp = getResponsableById(respId);
      if (!resp) return;
      _currentEditingRespId = respId;
      ensureEditRespModal();
      document.getElementById('modal-edit-resp').classList.add('open');

    } else if (action === 'resp-edit-role') {
      const respId = actionEl.dataset.respId;
      const resp = getResponsableById(respId);
      if (!resp) return;
      const card = actionEl.closest('[data-resp-id]');
      const select = card?.querySelector('select[data-role-select]');
      if (select) {
        resp.role = select.value || null;
        saveState(); render(); renderDrawer();
      }

    } else if (action === 'assign-projects') {
      const respId = actionEl.dataset.respId;
      const resp = getResponsableById(respId);
      if (!resp) return;
      // Chercher le card parent (resp-card contient le bouton)
      const card = actionEl.closest('.resp-card');
      const select = card?.querySelector('select[data-projects-select]');
      if (select) {
        resp.assignedProjects = Array.from(select.selectedOptions).map(o => o.value);
        resp.excludedSubprojects = []; // Réinitialiser les exclusions quand les projets changent
        saveState(); render();
        // ❌ NE PAS appeler renderDrawer() car cela ferme la modal
        // À la place, on va recharger juste le contenu du responsable dans le card
        // Pour que l'utilisateur puisse directement ajouter les lots
        const respTabContent = document.getElementById('tab-resources');
        if (respTabContent) respTabContent.innerHTML = renderResourcesTab();
      }
      return; // Important: retourner pour éviter le renderDrawer() final

    } else if (action === 'assign-subprojects') {
      const respId = actionEl.dataset.respId;
      const resp = getResponsableById(respId);
      if (!resp) return;
      // Chercher le card parent (resp-card contient le bouton)
      const card = actionEl.closest('.resp-card');
      const select = card?.querySelector('select[data-subprojects-select]');
      if (select) {
        const selectedIds = Array.from(select.selectedOptions).map(o => o.value);
        // Les exclusions sont les lots qui DEVRAIENT être inclus mais ne sont PAS sélectionnés
        const allAvailableLots = (state.projects || [])
          .filter(p => p.parentId && resp.assignedProjects.includes(p.parentId));
        resp.excludedSubprojects = allAvailableLots
          .map(lot => lot.id)
          .filter(id => !selectedIds.includes(id));
        saveState(); render();
        // ❌ NE PAS appeler renderDrawer() - mettre à jour le contenu du tab à la place
        const respTabContent = document.getElementById('tab-resources');
        if (respTabContent) respTabContent.innerHTML = renderResourcesTab();
      }
      return; // Important: retourner pour éviter le renderDrawer() final

    } else if (action === 'resp-delete') {
      const respId = actionEl.dataset.respId;
      const resp = getResponsableById(respId);
      if (!resp) return;

      const projNames = resp.assignedProjects
        .map(id => state.projects?.find(p => p.id === id)?.name)
        .filter(Boolean);

      let msg = `Supprimer "${resp.name}" ?\n\n`;
      if (projNames.length > 0) {
        msg += `⚠️ Assigné à:\n${projNames.map(n => `  • ${n}`).join('\n')}\n\n`;
      }
      msg += 'Les projets resteront sans responsable.\n';

      if (!confirm(msg + 'Confirmer ?')) return;

      state.responsables = state.responsables.filter(r => r.id !== respId);
      saveState(); render(); renderDrawer();

    } else return;
    saveState(); render(); renderDrawer();
  };

  body.addEventListener('click', onClick);
  _drawerHandlers = { onChange, onClick };
}

  const endEl = document.getElementById('custom-end');
  const sv = startEl.value, ev = endEl.value;
  if (!sv || !ev) return;

  document.documentElement.dataset.view = 'custom';
  viewOffset = 0;
  document.querySelectorAll('.view-switch button').forEach(x => x.classList.remove('active'));

}

// V17 : navigation prev/next adaptée à la vue (1/3/6/12 mois)
function _viewStep() {
  if (currentView === 6) return 13;
  if (currentView === 3) return 4;
  return 2; // view === 1
}
function _viewMax() {
  const w = currentView === 6 ? 26 : currentView === 3 ? 13 : 4;
  return TOTAL_WEEKS - w;
}
document.getElementById('nav-prev').addEventListener('click', () => {
  viewOffset = Math.max(0, viewOffset - _viewStep()); render();
});
document.getElementById('nav-next').addEventListener('click', () => {
  viewOffset = Math.min(_viewMax(), viewOffset + _viewStep()); render();
});

      }).length;

// V14 Lot 1 / V14.2 : mode présentation (toggle + raccourci P)
function togglePresentationMode() {
  document.body.classList.toggle('presentation-mode');
  const btn = document.getElementById('presentation-btn');
  const topbar = document.querySelector('.topbar');
  if (document.body.classList.contains('presentation-mode')) {
    btn.textContent = '🛑 Quitter présentation';
    btn.classList.add('primary');
    topbar.classList.remove('revealed');
    toast('🎬 Mode présentation actif — souris en haut pour révéler les boutons. Touche P pour quitter.');
  } else {
    btn.textContent = '🎬 Présentation';
    btn.classList.remove('primary');
    topbar.classList.remove('revealed');
  }
}
// V14.2 : révélation/masquage de la topbar par déplacement souris (avec hystérésis pour éviter le clignotement)
document.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('presentation-mode')) return;
  const topbar = document.querySelector('.topbar');
  const topbarH = topbar.offsetHeight || 56;
  if (e.clientY < 18) topbar.classList.add('revealed');
  else if (e.clientY > topbarH + 24) topbar.classList.remove('revealed');
});
document.getElementById('presentation-btn').addEventListener('click', togglePresentationMode);
document.addEventListener('keydown', (e) => {
  // V14 Lot 4a : Cmd/Ctrl + Z = undo, + Maj = redo (interceptés MÊME quand on est dans un champ
  // de l'éditeur de planning, sinon le navigateur ferait juste un undo de texte au lieu d'undo planning)
  if ((e.metaKey || e.ctrlKey) && (e.key === 'z' || e.key === 'Z')) {
    // Sauf si on est en train de taper dans un input texte/textarea (laisse l'undo natif du champ)
    const inField = e.target.matches('input[type="text"], input[type="number"], input[type="date"], input[type="search"], textarea');
    if (!inField) {
      if (e.shiftKey) redoAction(); else undo();
      e.preventDefault();
      return;
    }
  }
  if (e.target.matches('input, textarea, select')) return;
  if (e.key === 'p' || e.key === 'P') { togglePresentationMode(); e.preventDefault(); }
  if (e.key === 'Escape' && document.body.classList.contains('presentation-mode')) togglePresentationMode();
});

document.getElementById('apply-changes').addEventListener('click', () => {

    try {
      const parsed = JSON.parse(document.getElementById('raw-json').value);
      if (!parsed.domains || !parsed.projects) throw new Error('Structure invalide');
      state = parsed; saveState(); toast('✅ JSON appliqué');
    } catch(e) { toast('❌ JSON invalide : ' + e.message); return; }
  }
  render(); renderDrawer();
});
document.getElementById('export-pdf').addEventListener('click', () => {
  closeDrawer(); setTimeout(() => window.print(), 300);
});
document.getElementById('export-pdf-fit').addEventListener('click', () => {
  closeDrawer();
  // V13.5.2 : on respecte la vue actuellement affichée (12/6/3 mois OU plage personnalisée).
  // Plus de reset forcé qui faisait afficher l'année entière indépendamment du filtre.
  document.body.classList.add('print-fit');
  window.PRINT_HEIGHT_MULT = 1;
  render(); // pass 1
  setTimeout(() => {
    const gantt = document.getElementById('gantt');
    // V13.6 : approche unifiée pour TOUS les cas (filtré, custom, full year, peu de projets).
    // 1) On ajuste la LARGEUR du canevas pour qu'elle ait l'aspect ratio A3 paysage (par rapport à ch1)
    // 2) Si contenu trop court : on STRETCH la hauteur via mult pour remplir
    // 3) Pass final : zoom CSS pour fit exact dans la page (résorbe arrondis et rAF)
    const A3_RATIO = 297 / 210;        // 1.414
    const MIN_W = 1300;                 // largeur min pour garder les semaines lisibles
    const ch1 = gantt.scrollHeight;
    const firstProj = gantt.querySelector('.project-row');
    const fixedH = firstProj ? firstProj.offsetTop : 80;
    const idealCw = ch1 * A3_RATIO;     // largeur idéale pour matcher l'aspect A3
    let cwTarget, mult;
    if (idealCw >= MIN_W) {
      // Contenu suffisamment haut : on ajuste juste la largeur
      cwTarget = idealCw;
      mult = 1;
    } else {
      // Contenu trop court : largeur min + on stretch la hauteur
      cwTarget = MIN_W;
      const targetCh = MIN_W / A3_RATIO;
      const variableH = ch1 - fixedH;
      const targetVar = targetCh - fixedH;
      mult = Math.max(1, Math.min(2.0, targetVar / variableH));
    }
    window.PRINT_PAGE_W = Math.round(cwTarget);
    window.PRINT_HEIGHT_MULT = mult;
    render(); // pass 2

    // V13.7 : pass 3 — re-mesurer après pass 2 (rAF/arrondis peuvent avoir changé ch)
    // et stretcher la hauteur pour matcher exactement l'aspect ratio A3 (résorbe espace blanc).
    setTimeout(() => {
      const cw2_p2 = gantt.scrollWidth;
      const ch2_p2 = gantt.scrollHeight;
      const desiredCh = cw2_p2 / A3_RATIO;
      if (ch2_p2 < desiredCh * 0.97 && mult < 2.5) {
        const variableH = ch2_p2 - fixedH;
        const targetVar = desiredCh - fixedH;
        const adjustedMult = mult * (targetVar / variableH);
        window.PRINT_HEIGHT_MULT = Math.min(2.5, adjustedMult);
        render(); // pass 3
      }
    }, 30);
    setTimeout(() => {
      const cw2 = gantt.scrollWidth;
      const ch2 = gantt.scrollHeight;
      // V13.6 : zoom CSS final pour fit pixel-perfect dans la page A3 paysage.
      // Chrome respecte zoom (contrairement à transform:scale) → page break inside avoid garantit 1 page.
      const PAGE_W = 1587; // A3 paysage CSS px (96 DPI)
      const PAGE_H = 1122;
      const zoom = Math.min(PAGE_W / cw2, PAGE_H / ch2);
      document.body.style.setProperty('--print-scale', zoom.toFixed(4));
      toast(`📄 Canvas ${cw2}×${ch2}px · zoom ${zoom.toFixed(2)} → fit A3 exact`);
      setTimeout(() => {
        window.print();
        setTimeout(() => {
          document.body.classList.remove('print-fit');
          document.body.style.removeProperty('--print-scale');
          document.body.style.removeProperty('--print-target-w');
          document.body.style.removeProperty('--print-target-h');
          window.PRINT_HEIGHT_MULT = 1;
          window.PRINT_PAGE_W = null; // V13.4 : reset largeur logique
          // V13.5.2 : pas de restauration de vue (on n'a pas changé la vue), juste un re-render
          render();
        }, 700);
      }, 250);
    }, 200);
  }, 300);
});
// V14 Lot 4e : boutons export-json / import-json / reset retirés du topbar
// (Export/Import disponibles dans Mes plannings → Partage. Réinitialisation disponible
// dans Mes plannings → Modèles → 📊 Charger CCI 2026.)
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2500);
}

render();

// Session 4: Create modal outside drawer on page load
ensureResponsableModal();

// V8: re-render à chaque redimensionnement (largeur de semaine adaptative)
let _resizeT;
window.addEventListener('resize', () => {
  clearTimeout(_resizeT);
  _resizeT = setTimeout(render, 120);
});
</script>
